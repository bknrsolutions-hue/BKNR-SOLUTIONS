name: CI - Develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: ci-develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: svbk_test
          POSTGRES_PASSWORD: svbk_test
          POSTGRES_DB: svbk_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U svbk_test -d svbk_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SVBK_SKIP_STARTUP_TASKS: "1"
      SESSION_SECRET_KEY: ci-only-session-secret
      SVBK_TEST_DATABASE_URL: postgresql://svbk_test:svbk_test@127.0.0.1:5432/svbk_erp_test
      DATABASE_URL: postgresql://svbk_test:svbk_test@127.0.0.1:5432/svbk_erp_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Initialize isolated test database
        working-directory: backend
        run: python scripts/init_test_database.py

      - name: Run backend automated tests
        working-directory: backend
        run: |
          mkdir -p test-results
          pytest \
            --junitxml=test-results/pytest.xml \
            --cov=app \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/htmlcov

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: develop-backend-test-reports
          path: backend/test-results
          if-no-files-found: warn

  frontend-tests:
    name: Frontend Tests and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: develop-frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn
