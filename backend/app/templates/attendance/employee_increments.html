<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Increment – BKNR ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#143465;
  --accent:#3b82f6;
  --border:#d6dde7;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#64748b;
}
*{box-sizing:border-box;font-family:'Inter',sans-serif;}
body{margin:0;background:var(--bg);color:var(--text);}
.header{padding:16px 24px;background:#fff;border-bottom:1px solid var(--border);}
.header h2{margin:0;color:var(--primary);font-weight:800;}
.section{margin:20px;background:#fff;padding:24px;border-radius:14px;border:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media(max-width:900px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;}
input,select{
  padding:10px 12px;border-radius:8px;
  border:1px solid var(--border);font-size:13px;
}
input[readonly]{background:#f1f5f9;font-weight:700;color:var(--primary);}
.actions{margin-top:22px;display:flex;justify-content:flex-end;}
button{
  padding:10px 26px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;
  font-weight:800;cursor:pointer;
}
button:hover{background:#2563eb;}
</style>
</head>

<body>

<div class="header">
  <h2>Employee Salary Increment</h2>
</div>

<form method="post" action="/attendance/employee-increment">
<div class="section">

  <div class="form-grid">

    <div class="field">
      <label>Employee ID</label>
      <input name="employee_id" required placeholder="BKNR00001">
    </div>

    <div class="field">
      <label>Increment Type</label>
      <select name="increment_type" required>
        <option value="">Select</option>
        <option value="FIXED">Fixed Amount</option>
        <option value="PERCENTAGE">Percentage</option>
      </select>
    </div>

    <div class="field">
      <label>Increment Value</label>
      <input type="number" name="increment_value" required>
    </div>

    <div class="field">
      <label>Effective From</label>
      <input type="date" name="effective_from" required>
    </div>

    <div class="field">
      <label>Reason</label>
      <input name="reason">
    </div>

    <div class="field">
      <label>Approved By</label>
      <input name="approved_by">
    </div>

  </div>

  <div class="actions">
    <button type="submit">SAVE INCREMENT</button>
  </div>

</div>
</form>

</body>
</html>
