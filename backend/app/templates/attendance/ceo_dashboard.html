<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0f172a; --blue: #2563eb; --emerald: #10b981; --amber: #f59e0b; --slate: #f8fafc; }
        body { margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        .header { background: var(--navy); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 25px; max-width: 1600px; margin: auto; }

        /* CEO KPI STRIP */
        .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .kpi-card h4 { margin: 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card h2 { margin: 10px 0 0; font-size: 28px; font-weight: 800; }
        .kpi-card.highlight { border-top: 4px solid var(--blue); }

        /* ANALYTICS GRID */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        .panel { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 20px; }
        .panel-title { font-weight: 800; font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* DEPLOYMENT TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .dept-tag { background: #eff6ff; color: var(--blue); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 12px; }
        
        /* STATUS INDICATORS */
        .live-indicator { width: 10px; height: 10px; background: var(--emerald); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.1); opacity: 0.5; } 100% { transform: scale(0.95); opacity: 1; } }
    </style>
<link rel="stylesheet" href="/static/css/global-loader.css">
<link rel="stylesheet" href="/static/css/bknr-standard.css">
<link rel="stylesheet" href="/static/css/bknr-columns.css">
<link rel="stylesheet" href="/static/css/dashboard-ui.css">
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0; font-size: 1.2rem;"> GROUP | <span style="font-weight:400; color:#94a3b8;">Operations Command</span></h2>
    </div>
    <div style="text-align: right;">
        <div id="liveClock" style="font-weight:700; font-size: 1.1rem;"></div>
        <div style="font-size: 10px; color: var(--emerald);"><span class="live-indicator"></span> SYSTEM LIVE</div>
    </div>
</div>

<div class="container">
    
    <div class="kpi-row">
        <div class="kpi-card highlight">
            <h4>Total Registered</h4>
            <h2 id="m-total">--</h2>
        </div>
        <div class="kpi-card" style="border-top: 4px solid var(--emerald);">
            <h4>Present Today</h4>
            <h2 id="m-present">--</h2>
            <small id="m-percent" style="color: var(--emerald); font-weight: 700;"></small>
        </div>
        <div class="kpi-card" style="border-top: 4px solid var(--amber);">
            <h4>Inside Gate Now</h4>
            <h2 id="m-inside">--</h2>
        </div>
        <div class="kpi-card" style="border-top: 4px solid var(--blue);">
            <h4>Double Duty Alerts</h4>
            <h2 id="m-double">--</h2>
        </div>
        <div class="kpi-card">
            <h4>Workforce Health</h4>
            <h2 style="color: var(--emerald);">98.2%</h2>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-layer-group"></i> Departmental Deployment Matrix</div>
            <table>
                <thead>
                    <tr>
                        <th>Department Name</th>
                        <th>On-Floor Count</th>
                        <th>Duty Efficiency</th>
                        <th>Current Status</th>
                    </tr>
                </thead>
                <tbody id="dept-rows">
                    </tbody>
            </table>
        </div>

        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-bolt"></i> Live Gate Feed</div>
            <div id="live-feed" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
        </div>
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            // Fetch the aggregated metrics from the API
            const res = await fetch("/api/ceo-metrics");
            const data = await res.json();

            // Update KPI Cards
            document.getElementById('m-total').innerText = data.total_master;
            document.getElementById('m-present').innerText = data.present_today;
            document.getElementById('m-percent').innerText = data.attendance_percentage + "% Attendance";
            document.getElementById('m-inside').innerText = data.inside_now;
            document.getElementById('m-double').innerText = data.double_duty;

            // Update Dept Table
            const deptTable = document.getElementById('dept-rows');
            deptTable.innerHTML = data.departments.map(d => `
                <tr>
                    <td><span class="dept-tag">${d.name}</span></td>
                    <td style="font-weight:800;">${d.count}</td>
                    <td><div style="width:100px; height:8px; background:#f1f5f9; border-radius:10px; overflow:hidden;">
                        <div style="width:85%; height:100%; background:var(--blue);"></div>
                    </div></td>
                    <td><span style="color:var(--emerald); font-weight:700; font-size:12px;">● STABLE</span></td>
                </tr>
            `).join('');

        } catch (e) { console.error("Dashboard Sync Error:", e); }
    }

    // Live Feed Simulation / Connection
    async function fetchLiveFeed() {
        const res = await fetch("/attendance/today_all");
        const data = await res.json();
        const feed = document.getElementById('live-feed');
        
        // Take last 5 movements across all employees
        const recent = data.slice(0, 5); 
        feed.innerHTML = recent.map(r => `
            <div style="padding: 10px; border-left: 3px solid var(--blue); background: var(--slate); border-radius: 4px;">
                <div style="font-size: 12px; font-weight: 800;">${r.employee_name}</div>
                <div style="font-size: 10px; color: #64748b;">${r.department} • <span style="color:var(--blue)">${r.status}</span></div>
            </div>
        `).join('');
    }

    setInterval(() => {
        document.getElementById("liveClock").innerText = new Date().toLocaleString('en-IN', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }, 1000);

    updateDashboard();
    fetchLiveFeed();
    setInterval(updateDashboard, 30000); // Sync every 30s
</script>

<script src="/static/js/global-loader.js"></script>
</body>
</html>
