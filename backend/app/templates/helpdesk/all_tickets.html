<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Admin Helpdesk | BKNR ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-color: #f3f4f6;
        --panel-bg: #ffffff;
        --border-color: #e5e7eb;
        --primary-text: #111827;
        --secondary-text: #6b7280;
        --accent: #0f172a; 
        --accent-hover: #1e293b;
        --accent-blue: #2563eb;
        --admin-msg: #f8fafc;
        --user-msg: #eff6ff;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
    }
    
    [data-theme="dark"] {
        --bg-color: #020617;
        --panel-bg: #0f172a;
        --border-color: #1e293b;
        --primary-text: #f8fafc;
        --secondary-text: #94a3b8;
        --accent: #e2e8f0;
        --accent-hover: #cbd5e1;
        --accent-blue: #3b82f6;
        --admin-msg: #1e293b;
        --user-msg: rgba(59, 130, 246, 0.1);
    }

    * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
    body { background: var(--bg-color); color: var(--primary-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { padding: 12px 24px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.02);}
    .header h2 { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--primary-text); text-transform: uppercase; letter-spacing: 0.5px;}
    .header-stats { display: flex; gap: 12px; font-size: 11px; font-weight: 700; color: var(--secondary-text); }
    .header-stats span { background: var(--bg-color); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-color); }

    .main-container { flex: 1; display: flex; overflow: hidden; margin: 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--panel-bg); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

    .ticket-list-panel { width: 350px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--panel-bg); }
    .search-box { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
    [data-theme="dark"] .search-box { background: #0f172a; }
    .search-box input, .search-box select { width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--panel-bg); color: var(--primary-text); outline: none; font-size: 12px; font-weight: 500; transition: border 0.2s;}
    .search-box select:focus, .search-box input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    
    .tickets-container { flex: 1; overflow-y: auto; }
    .ticket-card { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; gap: 8px; }
    .ticket-card:hover { background: var(--bg-color); }
    .ticket-card.active { background: var(--user-msg); border-left: 3px solid var(--accent-blue); }
    
    .ticket-header { display: flex; justify-content: space-between; align-items: center; }
    .ticket-id { font-size: 11px; font-weight: 800; color: var(--primary-text); }
    .ticket-date { font-size: 10px; color: var(--secondary-text); font-weight: 600;}
    .ticket-subject { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--accent-blue); }
    .ticket-meta { font-size: 11px; color: var(--secondary-text); display: flex; justify-content: space-between; align-items: center; }
    .company-badge { background: var(--panel-bg); padding: 2px 6px; border-radius: 4px; font-weight: 700; border: 1px solid var(--border-color); font-size: 9px; text-transform: uppercase;}
    
    .status-badge { font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: 800; width: fit-content; text-transform: uppercase; letter-spacing: 0.5px;}
    .status-OPEN { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5;}
    .status-IN_PROGRESS { background: #fef3c7; color: #d97706; border: 1px solid #fcd34d;}
    .status-RESOLVED { background: #dcfce7; color: #16a34a; border: 1px solid #86efac;}

    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); position: relative; }
    .chat-header { padding: 14px 20px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    .chat-header-info h3 { font-size: 15px; margin: 0; color: var(--primary-text); font-weight: 700;}
    .chat-header-meta { font-size: 11px; color: var(--secondary-text); margin-top: 6px; display: flex; gap: 12px; align-items: center; font-weight: 500;}
    .mobile-back-btn { display: none; background: transparent; border: none; color: var(--primary-text); font-size: 16px; cursor: pointer; margin-right: 12px; }

    .admin-actions { display: flex; gap: 8px; align-items: center; }
    .status-select { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--primary-text); font-size: 11px; font-weight: 700; outline: none; cursor: pointer; }
    .btn-update { background: var(--accent); color: var(--panel-bg); border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
    .btn-update:hover { background: var(--accent-hover); }

    .chat-box { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background-color: var(--bg-color); background-image: radial-gradient(var(--border-color) 1px, transparent 1px); background-size: 20px 20px; }
    .msg { max-width: 75%; padding: 14px 18px; border-radius: 8px; font-size: 13px; line-height: 1.5; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .msg-admin { background: var(--admin-msg); align-self: flex-end; border: 1px solid var(--border-color); color: var(--primary-text); border-bottom-right-radius: 0;}
    .msg-user { background: var(--user-msg); align-self: flex-start; border: 1px solid rgba(59, 130, 246, 0.2); color: var(--primary-text); border-bottom-left-radius: 0;}
    
    .msg-time { font-size: 9px; color: var(--secondary-text); display: block; text-align: right; margin-top: 8px; font-weight: 600;}
    .msg-sender { font-size: 10px; font-weight: 800; margin-bottom: 6px; display: block; letter-spacing: 0.5px;}
    .msg-user .msg-sender { color: var(--accent-blue); }
    .msg-admin .msg-sender { color: var(--secondary-text); }

    .quick-replies-container { padding: 12px 20px; background: var(--panel-bg); border-top: 1px solid var(--border-color); display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; }
    .quick-replies-container::-webkit-scrollbar { height: 0px; }
    .quick-reply-chip { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--primary-text); padding: 8px 14px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .quick-reply-chip:hover { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

    .chat-input-area { padding: 16px 20px; background: var(--panel-bg); display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border-color);}
    .chat-input-area input { flex: 1; padding: 12px 16px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--primary-text); outline: none; font-size: 13px; font-weight: 500; transition: border 0.2s;}
    .chat-input-area input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
    .btn-send { background: var(--accent-blue); color: white; border: none; width: 42px; height: 42px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; }
    .btn-send:hover { background: #1d4ed8; }

    .closed-ticket-banner {
        padding: 16px; background: var(--bg-color); text-align: center; color: var(--danger);
        font-weight: 700; font-size: 12px; border-top: 1px solid var(--border-color);
        display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .closed-ticket-banner i { font-size: 20px; opacity: 0.8; margin-bottom: 4px; }
    .closed-ticket-banner span { color: var(--secondary-text); font-size: 10px; font-weight: 500; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--secondary-text); text-align: center; }
    .empty-state i { font-size: 40px; margin-bottom: 16px; opacity: 0.2; color: var(--primary-text); }
    .hidden { display: none !important; }

    @media (max-width: 850px) {
        .main-container { margin: 0; border-radius: 0; border-left: none; border-right: none; border-bottom: none; flex-direction: column; height: calc(100vh - 55px); }
        .ticket-list-panel { width: 100%; border-right: none; }
        .chat-panel { display: none; width: 100%; height: 100%; }
        .chat-panel.active-mobile { display: flex; }
        .ticket-list-panel.hidden-mobile { display: none; }
        .mobile-back-btn { display: block; }
        .admin-actions { flex-direction: column; align-items: flex-end; gap: 4px; }
        .chat-header { padding: 12px; }
        .chat-header-meta { flex-wrap: wrap; gap: 6px; }
    }
</style>
</head>
<body data-theme="dark">

<div class="header">
    <h2><i class="fa-solid fa-layer-group"></i> Support Hub</h2>
    <div class="header-stats">
        <span id="stat-open"><i class="fa-solid fa-circle-exclamation" style="color:var(--danger);"></i> Open: 0</span>
        <span id="stat-resolved"><i class="fa-solid fa-check-circle" style="color:var(--success);"></i> Resolved: 0</span>
    </div>
</div>

<div class="main-container">
    <div class="ticket-list-panel" id="listPanel">
        <div class="search-box">
            <input type="text" id="searchTickets" placeholder="🔍 Search tickets, subjects..." onkeyup="filterTickets()">
            <select id="filterStatus" onchange="filterTickets()">
                <option value="ALL">All Statuses</option>
                <option value="OPEN">Open</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="RESOLVED">Resolved</option>
            </select>
        </div>
        <div class="tickets-container" id="ticketList"></div>
    </div>

    <div class="chat-panel" id="chatPanel">
        <div class="empty-state" id="emptyState">
            <i class="fa-regular fa-comments"></i>
            <h3>No Ticket Selected</h3>
            <p style="font-size: 12px; margin-top: 8px;">Select a ticket from the queue to view details and respond.</p>
        </div>

        <div id="chatView" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <div style="display:flex; align-items: center;">
                    <button class="mobile-back-btn" onclick="closeChatMobile()"><i class="fa-solid fa-arrow-left"></i></button>
                    <div class="chat-header-info">
                        <h3 id="chatSubject">Loading...</h3>
                        <div class="chat-header-meta">
                            <span id="chatTicketId" style="font-weight:800; color:var(--primary-text);">TKT-XXX</span>
                            <span>•</span>
                            <span id="chatUserEmail" class="email-holder"><i class="fa-regular fa-envelope"></i> user@email.com</span>
                            <span>•</span>
                            <span id="chatCompany" class="company-badge">CMP</span>
                        </div>
                    </div>
                </div>
                <div class="admin-actions">
                    <select id="updateStatusSelect" class="status-select">
                        <option value="OPEN">OPEN</option>
                        <option value="IN_PROGRESS">IN PROGRESS</option>
                        <option value="RESOLVED">RESOLVED</option>
                    </select>
                    <button class="btn-update" onclick="updateTicketStatus()">Update Status</button>
                </div>
            </div>
            
            <div class="chat-box" id="chatBox"></div>
            
            <div id="chatControls">
                <div class="quick-replies-container">
                    <div class="quick-reply-chip" onclick="useQuickReply('Hello, we are currently investigating this issue. Please give us a moment.')">Investigating</div>
                    <div class="quick-reply-chip" onclick="useQuickReply('Could you please provide more details or screenshots to help us understand better?')">Need Details</div>
                    <div class="quick-reply-chip" onclick="useQuickReply('This has been escalated to our engineering team. We will update you shortly.')">Escalated</div>
                </div>
                <div class="chat-input-area">
                    <input type="hidden" id="activeTicketId">
                    <input type="text" id="replyInput" placeholder="Type an official response..." onkeypress="handleEnter(event)">
                    <button class="btn-send" onclick="sendAdminReply()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="closedBanner" class="closed-ticket-banner hidden">
                <i class="fa-solid fa-lock"></i>
                This ticket is permanently closed.
                <span>Users must raise a new ticket for further assistance.</span>
            </div>

        </div>
    </div>
</div>

<script>
const allTickets = {{ (tickets_json if tickets_json is defined else []) | tojson | safe }};

function renderTicketList(tickets) {
    const listEl = document.getElementById("ticketList");
    listEl.innerHTML = "";
    document.getElementById("stat-open").innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color:var(--danger);"></i> Open: ${allTickets.filter(t=>t.status==='OPEN').length}`;
    document.getElementById("stat-resolved").innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--success);"></i> Resolved: ${allTickets.filter(t=>t.status==='RESOLVED').length}`;

    if(tickets.length === 0) {
        listEl.innerHTML = `<div style="padding: 40px 20px; text-align: center; color: var(--secondary-text); font-size: 13px;"><i class="fa-solid fa-inbox" style="font-size:30px; margin-bottom:12px; opacity:0.3;"></i><br>Queue is empty.</div>`;
        return;
    }

    tickets.forEach(t => {
        const safeSubject = (t.subject || "").replace(/'/g, "\\'").replace(/"/g, '\\"');
        const safeEmail = (t.user_email || "").replace(/'/g, "\\'");
        listEl.innerHTML += `
            <div class="ticket-card" id="ticket-card-${t.id}" onclick="openAdminChat(${t.id}, '${t.ticket_number}', '${safeSubject}', '${t.status}', '${safeEmail}', '${t.company_id}')">
                <div class="ticket-header">
                    <span class="ticket-id">${t.ticket_number}</span>
                    <span class="ticket-date">${t.date}</span>
                </div>
                <div class="ticket-subject">${t.subject}</div>
                <div class="ticket-meta">
                    <span class="status-badge status-${t.status}">${t.status.replace('_', ' ')}</span>
                    <span class="company-badge"><i class="fa-regular fa-building"></i> ${t.company_id}</span>
                </div>
            </div>
        `;
    });
}

function filterTickets() {
    const q = document.getElementById("searchTickets").value.toLowerCase();
    const stat = document.getElementById("filterStatus").value;
    const filtered = allTickets.filter(t => {
        const matchesQuery = t.ticket_number.toLowerCase().includes(q) || 
                             t.subject.toLowerCase().includes(q) || 
                             t.user_email.toLowerCase().includes(q) ||
                             t.company_id.toLowerCase().includes(q);
        const matchesStat = stat === "ALL" || t.status === stat;
        return matchesQuery && matchesStat;
    });
    renderTicketList(filtered);
}

function openAdminChat(ticketId, ticketNum, subject, status, email, company) {
    document.getElementById("emptyState").classList.add("hidden");
    const chatView = document.getElementById("chatView");
    chatView.classList.remove("hidden");
    
    if(window.innerWidth <= 850) {
        document.getElementById("listPanel").classList.add("hidden-mobile");
        document.getElementById("chatPanel").classList.add("active-mobile");
    }
    
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`ticket-card-${ticketId}`).classList.add('active');

    document.getElementById("chatSubject").innerText = subject;
    document.getElementById("chatTicketId").innerText = ticketNum;
    document.querySelector(".email-holder").innerHTML = `<i class="fa-regular fa-envelope"></i> ${email}`;
    document.getElementById("chatUserEmail").dataset.val = email; // Store for fetching
    document.getElementById("chatCompany").innerHTML = `<i class="fa-regular fa-building"></i> ${company}`;
    
    document.getElementById("activeTicketId").value = ticketId;
    document.getElementById("updateStatusSelect").value = status;
    
    toggleChatLock(status);
    fetchMessages(ticketId, email);
}

function closeChatMobile() {
    document.getElementById("listPanel").classList.remove("hidden-mobile");
    document.getElementById("chatPanel").classList.remove("active-mobile");
}

function toggleChatLock(status) {
    if (status === "RESOLVED") {
        document.getElementById("chatControls").classList.add("hidden");
        document.getElementById("closedBanner").classList.remove("hidden");
    } else {
        document.getElementById("chatControls").classList.remove("hidden");
        document.getElementById("closedBanner").classList.add("hidden");
    }
}

async function fetchMessages(ticketId, userEmail) {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = `<div style="text-align:center; color: var(--secondary-text); font-size: 12px; margin-top:20px;"><i class="fa-solid fa-circle-notch fa-spin"></i> Retrieving thread...</div>`;
    
    try {
        const response = await fetch(`/admin/get_messages/${ticketId}`);
        const data = await response.json();
        
        chatBox.innerHTML = "";
        if(data.messages && data.messages.length > 0) {
            data.messages.forEach(m => {
                const isAdmin = (m.sender_type === "ADMIN" || m.sender_type === "SUPPORT");
                const msgClass = isAdmin ? "msg-admin" : "msg-user";
                const senderName = isAdmin ? "BKNR Support" : userEmail;
                const icon = isAdmin ? '<i class="fa-solid fa-headset"></i>' : '<i class="fa-regular fa-user"></i>';
                
                chatBox.innerHTML += `
                    <div class="msg ${msgClass}">
                        <span class="msg-sender">${icon} ${senderName}</span>
                        ${m.message}
                        <span class="msg-time">${m.time}</span>
                    </div>
                `;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        } else {
            chatBox.innerHTML = `<div style="text-align:center; color: var(--secondary-text); font-size: 12px; margin-top:20px;">No messages found in this thread.</div>`;
        }
    } catch(e) {
        chatBox.innerHTML = `<div style="text-align:center; color: var(--danger); font-size: 12px; margin-top:20px;">Failed to load server data.</div>`;
    }
}

function useQuickReply(text) {
    const input = document.getElementById('replyInput');
    input.value = text;
    input.focus();
}

async function sendAdminReply() {
    const ticketId = document.getElementById("activeTicketId").value;
    const inputEl = document.getElementById("replyInput");
    const message = inputEl.value.trim();
    
    if(!message || !ticketId) return;
    inputEl.value = ""; 
    
    const chatBox = document.getElementById("chatBox");
    const nowTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    chatBox.innerHTML += `
        <div class="msg msg-admin" style="opacity: 0.7;">
            <span class="msg-sender"><i class="fa-solid fa-headset"></i> BKNR Support</span>
            ${message}
            <span class="msg-time">${nowTime}</span>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    const formData = new FormData();
    formData.append("ticket_id", ticketId);
    formData.append("message", message);

    try {
        await fetch("/admin/send_message", { method: "POST", body: formData });
        const email = document.getElementById("chatUserEmail").dataset.val;
        fetchMessages(ticketId, email); // Reload silently to ensure sync
    } catch(e) {
        alert("Transmission failed. Please check network.");
    }
}

function handleEnter(e) {
    if(e.key === "Enter") sendAdminReply();
}

async function updateTicketStatus() {
    const ticketId = document.getElementById("activeTicketId").value;
    const newStatus = document.getElementById("updateStatusSelect").value;
    if(!ticketId) return;

    const formData = new FormData();
    formData.append("ticket_id", ticketId);
    formData.append("status", newStatus);

    try {
        const res = await fetch("/admin/update_ticket_status", { method: "POST", body: formData });
        if(res.ok) {
            const ticketObj = allTickets.find(t => t.id == ticketId);
            if(ticketObj) ticketObj.status = newStatus;
            filterTickets();
            
            document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById(`ticket-card-${ticketId}`);
            if(card) card.classList.add('active');
            
            toggleChatLock(newStatus);
            
            // Reload messages to show the backend-generated auto-reply!
            const email = document.getElementById("chatUserEmail").dataset.val;
            fetchMessages(ticketId, email);
            
        } else {
            alert("Failed to update status.");
        }
    } catch(e) {
        alert("Server error during status update.");
    }
}

window.onload = () => {
    try {
        const parentTheme = window.parent.document.documentElement.getAttribute("data-theme");
        if(parentTheme) document.body.setAttribute("data-theme", parentTheme);
    } catch(e) {}
    renderTicketList(allTickets);
};

window.addEventListener('resize', () => {
    if(window.innerWidth > 850) {
        document.getElementById("listPanel").classList.remove("hidden-mobile");
        if(document.getElementById("chatView").classList.contains("hidden") === false) {
            document.getElementById("chatPanel").classList.add("active-mobile");
        }
    }
});
</script>
</body>
</html>
