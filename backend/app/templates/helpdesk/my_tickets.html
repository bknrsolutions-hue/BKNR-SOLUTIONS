<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Complaints | BKNR ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-color: #eef6ff;
        --panel-bg: #ffffff;
        --border-color: #e2e8f0;
        --primary-text: #1e293b;
        --secondary-text: #64748b;
        --accent: #2563eb;
        --user-msg: #dcf8c6;
        --admin-msg: #ffffff;
        --header-height: 60px;
    }
    
    [data-theme="dark"] {
        --bg-color: #0f172a;
        --panel-bg: #1e293b;
        --border-color: #334155;
        --primary-text: #f8fafc;
        --secondary-text: #94a3b8;
        --accent: #3b82f6;
        --user-msg: #064e3b;
        --admin-msg: #334155;
    }

    * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
    body { background: var(--bg-color); color: var(--primary-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { height: var(--header-height); padding: 0 16px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .btn-new { background: var(--accent); color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
    .btn-new:hover { opacity: 0.9; }

    /* Main Layout */
    .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }

    /* Left Sidebar: Ticket List */
    .ticket-list-panel { width: 350px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--panel-bg); transition: transform 0.3s ease; z-index: 10; }
    
    .search-box { padding: 12px; border-bottom: 1px solid var(--border-color); }
    .search-box input { width: 100%; padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--primary-text); outline: none; font-size: 13px; }
    
    .tickets-container { flex: 1; overflow-y: auto; }
    .ticket-card { padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 6px; }
    .ticket-card:hover { background: var(--bg-color); }
    .ticket-card.active { background: rgba(59, 130, 246, 0.05); border-left: 3px solid var(--accent); }
    
    .ticket-header { display: flex; justify-content: space-between; align-items: center; }
    .ticket-id { font-size: 12px; font-weight: 800; color: var(--secondary-text); }
    .ticket-date { font-size: 11px; color: var(--secondary-text); }
    .ticket-subject { font-size: 14px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: 700; width: fit-content; letter-spacing: 0.5px; }
    .status-OPEN { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
    .status-IN_PROGRESS { background: rgba(217, 119, 6, 0.1); color: #d97706; border: 1px solid rgba(217, 119, 6, 0.2); }
    .status-RESOLVED { background: rgba(22, 163, 74, 0.1); color: #16a34a; border: 1px solid rgba(22, 163, 74, 0.2); }

    /* Right Sidebar: Chat Panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); position: relative; }
    
    .chat-header { padding: 12px 16px; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; min-height: 60px; }
    
    /* Mobile Back Button */
    .btn-back { display: none; background: transparent; border: none; color: var(--primary-text); font-size: 18px; cursor: pointer; padding: 4px; }
    
    .chat-header-info { flex: 1; overflow: hidden; }
    .chat-header-info h3 { font-size: 15px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { font-size: 11px; color: var(--secondary-text); margin-top: 4px; display: flex; align-items: center; gap: 8px; }

    /* Chat Area */
    .chat-box { 
        flex: 1; 
        padding: 16px; 
        overflow-y: auto; 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        background-color: var(--bg-color);
        background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
        background-size: 20px 20px;
    }
    
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .msg-user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-admin { background: var(--admin-msg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
    .msg-time { font-size: 10px; color: var(--secondary-text); display: block; text-align: right; margin-top: 6px; opacity: 0.8; }

    /* Input Area */
    .chat-input-area { padding: 12px 16px; background: var(--panel-bg); border-top: 1px solid var(--border-color); display: flex; gap: 10px; align-items: flex-end; }
    .input-wrapper { flex: 1; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 16px; min-height: 40px; display: flex; flex-direction: column; align-items: stretch; gap: 6px; }
    .input-wrapper input { flex: 1; border: none; background: transparent; color: var(--primary-text); outline: none; font-size: 14px; }
    .input-wrapper-inner { display: flex; align-items: center; gap: 8px; width: 100%; }
    .btn-attach { background: none; border: none; color: var(--secondary-text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; transition: color 0.2s; }
    .btn-attach:hover { color: var(--accent); }
    
    .btn-send { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

    /* Empty State */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--secondary-text); text-align: center; padding: 20px; }
    .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 16px; font-weight: 600; }

    /* Modal (Right-side Drawer Popup) */
    .modal-overlay { 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(0,0,0,0.6); 
        backdrop-filter: blur(4px); 
        display: none; 
        align-items: center; 
        justify-content: flex-end; 
        z-index: 1000; 
    }
    .modal { 
        background: var(--panel-bg); 
        width: 100%; 
        max-width: 420px; 
        height: calc(100% - 24px); 
        margin-right: 12px; 
        border-radius: 12px; 
        padding: 24px; 
        box-shadow: -5px 0 25px rgba(0,0,0,0.25); 
        border: 1px solid var(--border-color);
        display: flex; 
        flex-direction: column;
        transform: translateX(100%); 
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
    }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-size: 18px; margin: 0; }
    .btn-close-modal { background: transparent; border: none; color: var(--secondary-text); font-size: 20px; cursor: pointer; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--primary-text); margin-bottom: 8px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--primary-text); outline: none; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    
    .btn-submit-full { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }

    .hidden { display: none !important; }

    /* 📱 MOBILE RESPONSIVE 📱 */
    @media (max-width: 768px) {
        .main-container { flex-direction: column; }
        
        .ticket-list-panel { width: 100%; height: 100%; border-right: none; position: absolute; top: 0; left: 0; }
        
        .chat-panel { width: 100%; height: 100%; position: absolute; top: 0; left: 100%; transition: transform 0.3s ease; z-index: 20; }
        
        /* When chat is active */
        .main-container.chat-active .chat-panel { transform: translateX(-100%); }
        
        .btn-back { display: block; }
        .empty-state { display: none; } /* Hide empty state on mobile, list is full screen */
        
        /* Adjust header for mobile */
        .header h2 { font-size: 15px; }
        .btn-new span { display: none; } /* Hide text, show only icon on small screens */
        .btn-new { padding: 8px; border-radius: 50%; width: 36px; height: 36px; justify-content: center; }
        
        .modal { padding: 20px; }
    }
</style>
<link rel="stylesheet" href="/static/css/bknr-standard.css">
</head>
<body data-theme="dark">

<div class="header">
    <h2><i class="fa-solid fa-headset"></i> Support</h2>
    <button class="btn-new" onclick="openModal()"><i class="fa-solid fa-plus"></i> <span>New Complaint</span></button>
</div>

<div class="main-container" id="mainContainer">
    <div class="ticket-list-panel" id="listPanel">
        <div class="search-box">
            <input type="text" id="searchTickets" placeholder="Search complaints..." onkeyup="filterTickets()">
        </div>
        <div class="tickets-container" id="ticketList"></div>
    </div>

    <div class="chat-panel" id="chatPanel">
        <div class="empty-state" id="emptyState">
            <i class="fa-regular fa-comments"></i>
            <h3>Select a ticket to view conversation</h3>
            <p style="font-size: 13px; margin-top: 8px;">Or create a new complaint from the top right.</p>
        </div>

        <div id="chatView" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button class="btn-back" onclick="closeChatMobile()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="chat-header-info">
                    <h3 id="chatSubject">Loading...</h3>
                    <div class="chat-meta">
                        <span id="chatTicketId" style="font-weight:700; color:var(--primary-text);">TKT-XXX</span>
                        <span id="chatStatusBadge" class="status-badge">OPEN</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-box" id="chatBox"></div>
            
            <div class="chat-input-area">
                <input type="hidden" id="activeTicketId">
                <div class="input-wrapper">
                    <div id="filePreviewContainer" class="hidden" style="display: flex; align-items: center; justify-content: space-between; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); padding: 4px 8px; border-radius: 8px; font-size: 12px; color: var(--accent); width: 100%;">
                        <span id="filePreviewName" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;"></span>
                        <button type="button" onclick="clearFileSelection()" style="background:none; border:none; color:#ef4444; cursor:pointer;"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                    <div class="input-wrapper-inner">
                        <button class="btn-attach" type="button" onclick="document.getElementById('chatFileInput').click()"><i class="fa-solid fa-paperclip"></i></button>
                        <input type="file" id="chatFileInput" style="display: none;" onchange="handleFileSelect()">
                        <input type="text" id="replyInput" placeholder="Type a message..." onkeypress="handleEnter(event)" autocomplete="off">
                    </div>
                </div>
                <button class="btn-send" onclick="sendReply()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="ticketModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Raise a Complaint</h3>
            <button class="btn-close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form action="/support/create_ticket" method="POST">
            <div class="form-group">
                <label>Issue Summary</label>
                <input type="text" name="subject" required placeholder="E.g., Stock mismatch in cold room">
            </div>
            <div class="form-group">
                <label>Detailed Message</label>
                <textarea name="message" rows="4" required placeholder="Please describe your issue in detail..."></textarea>
            </div>
            <button type="submit" class="btn-submit-full">Submit Ticket</button>
        </form>
    </div>
</div>

<script>
const myTickets = {{ (tickets_json if tickets_json is defined else []) | tojson | safe }};

function renderTicketList(tickets) {
    const listEl = document.getElementById("ticketList");
    listEl.innerHTML = "";
    
    if(tickets.length === 0) {
        listEl.innerHTML = `
            <div style="padding: 40px 20px; text-align: center; color: var(--secondary-text);">
                <i class="fa-solid fa-inbox" style="font-size: 32px; margin-bottom: 12px; opacity: 0.5;"></i>
                <div style="font-size: 14px; font-weight: 500;">No complaints found</div>
            </div>`;
        return;
    }

    tickets.forEach(t => {
        listEl.innerHTML += `
            <div class="ticket-card" id="ticket-card-${t.id}" onclick="openChat(${t.id}, '${t.ticket_number}', '${t.subject.replace(/'/g, "\\'")}', '${t.status}')">
                <div class="ticket-header">
                    <span class="ticket-id">${t.ticket_number}</span>
                    <span class="status-badge status-${t.status}">${t.status.replace('_', ' ')}</span>
                </div>
                <div class="ticket-subject">${t.subject}</div>
                <div class="ticket-date">${t.date}</div>
            </div>
        `;
    });
}

function filterTickets() {
    const q = document.getElementById("searchTickets").value.toLowerCase();
    const filtered = myTickets.filter(t => t.ticket_number.toLowerCase().includes(q) || t.subject.toLowerCase().includes(q));
    renderTicketList(filtered);
}

// Mobile View handling
function closeChatMobile() {
    document.getElementById("mainContainer").classList.remove("chat-active");
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
}

function renderMedia(mediaPath) {
    if (!mediaPath) return "";
    const ext = mediaPath.split('.').pop().toLowerCase();
    const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);
    if (isImage) {
        return `
            <div style="margin-top: 8px; border-radius: 8px; overflow: hidden; max-width: 250px; max-height: 200px; border: 1px solid var(--border-color);">
                <img src="${mediaPath}" style="width: 100%; height: auto; display: block; object-fit: cover; cursor: pointer;" onclick="window.open('${mediaPath}', '_blank')">
            </div>
        `;
    } else {
        const filename = mediaPath.split('/').pop().replace(/^\d+_/, '');
        return `
            <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 8px; font-size: 13px;">
                <i class="fa-solid fa-file-arrow-down" style="font-size: 16px; color: var(--accent);"></i>
                <a href="${mediaPath}" target="_blank" download style="color: var(--accent); text-decoration: none; font-weight: 600; word-break: break-all;">${filename}</a>
            </div>
        `;
    }
}

function handleFileSelect() {
    const fileInput = document.getElementById("chatFileInput");
    const previewContainer = document.getElementById("filePreviewContainer");
    const previewName = document.getElementById("filePreviewName");
    
    if (fileInput && fileInput.files.length > 0) {
        previewName.innerText = fileInput.files[0].name;
        previewContainer.classList.remove("hidden");
    } else {
        clearFileSelection();
    }
}

function clearFileSelection() {
    const fileInput = document.getElementById("chatFileInput");
    if (fileInput) fileInput.value = "";
    
    const previewContainer = document.getElementById("filePreviewContainer");
    if (previewContainer) previewContainer.classList.add("hidden");
    
    const previewName = document.getElementById("filePreviewName");
    if (previewName) previewName.innerText = "";
}

async function loadMessages(ticketId) {
    const chatBox = document.getElementById("chatBox");
    try {
        const response = await fetch(`/support/get_messages/${ticketId}`);
        const data = await response.json();
        
        chatBox.innerHTML = "";
        if(data.messages && data.messages.length > 0) {
            data.messages.forEach(m => {
                const isUser = (m.sender_type === "USER");
                const msgClass = isUser ? "msg-user" : "msg-admin";
                const senderLabel = isUser ? "" : `<div style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:6px; display:flex; align-items:center; gap:4px;"><i class="fa-solid fa-headset" style="font-size:10px;"></i> Support</div>`;
                
                chatBox.innerHTML += `
                    <div class="msg ${msgClass}">
                        ${senderLabel}
                        <div style="word-break: break-word;">${m.message || ""}</div>
                        ${renderMedia(m.media_path)}
                        <span class="msg-time">${m.time}</span>
                    </div>
                `;
            });
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
        } else {
            chatBox.innerHTML = `<div style="text-align:center; color: var(--secondary-text); font-size: 13px; margin-top:20px;">Say hello to start the conversation.</div>`;
        }
    } catch(e) {
        chatBox.innerHTML = `<div style="text-align:center; color: #dc2626; font-size: 13px; margin-top:20px;">Failed to load messages. Check connection.</div>`;
    }
}

async function openChat(ticketId, ticketNum, subject, status) {
    // UI Updates
    document.getElementById("emptyState").classList.add("hidden");
    const chatView = document.getElementById("chatView");
    chatView.classList.remove("hidden");
    
    // Mobile slide animation
    if(window.innerWidth <= 768) {
        document.getElementById("mainContainer").classList.add("chat-active");
    }
    
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
    const activeCard = document.getElementById(`ticket-card-${ticketId}`);
    if(activeCard) activeCard.classList.add('active');

    document.getElementById("chatSubject").innerText = subject;
    document.getElementById("chatTicketId").innerText = ticketNum;
    
    const badge = document.getElementById("chatStatusBadge");
    badge.className = `status-badge status-${status}`;
    badge.innerText = status.replace('_', ' ');

    document.getElementById("activeTicketId").value = ticketId;
    
    // Clear input and attachments on new ticket selection
    document.getElementById("replyInput").value = "";
    clearFileSelection();
    
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = `<div style="text-align:center; color: var(--secondary-text); font-size: 13px; margin-top:20px; padding: 20px;"><i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Loading...</div>`;
    
    await loadMessages(ticketId);
}

async function sendReply() {
    const ticketId = document.getElementById("activeTicketId").value;
    const inputEl = document.getElementById("replyInput");
    const message = inputEl.value.trim();
    const fileInput = document.getElementById("chatFileInput");
    const hasFile = fileInput && fileInput.files.length > 0;
    
    if((!message && !hasFile) || !ticketId) return;
    
    const formData = new FormData();
    formData.append("ticket_id", ticketId);
    if(message) formData.append("message", message);
    if(hasFile) formData.append("file", fileInput.files[0]);
    
    inputEl.value = ""; 
    clearFileSelection();
    inputEl.focus(); // Keep keyboard open on mobile
    
    const chatBox = document.getElementById("chatBox");
    const nowTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    // Optimistic UI update
    const tempId = 'temp-' + Date.now();
    chatBox.innerHTML += `
        <div class="msg msg-user" id="${tempId}" style="opacity: 0.6; transform: scale(0.98); transition: 0.2s;">
            <div style="word-break: break-word;">${message || "Sending file..."}</div>
            <span class="msg-time">${nowTime} <i class="fa-solid fa-spinner fa-spin" style="margin-left:2px; font-size:9px;"></i></span>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/support/send_message", { method: "POST", body: formData });
        if (response.ok) {
            await loadMessages(ticketId);
        } else {
            throw new Error("Failed to send");
        }
    } catch(e) {
        const tempMsg = document.getElementById(tempId);
        if(tempMsg) {
            tempMsg.style.border = '1px solid #dc2626';
            const timeSpan = tempMsg.querySelector('.msg-time');
            if(timeSpan) timeSpan.innerHTML = `Failed to send <i class="fa-solid fa-circle-exclamation" style="color:#dc2626;"></i>`;
        }
    }
}

function handleEnter(e) { if(e.key === "Enter") sendReply(); }

// Modal handlers
function openModal() { 
    const modal = document.getElementById("ticketModal");
    modal.style.display = "flex"; 
    // Small delay to allow display:flex to apply before animation
    setTimeout(() => {
        modal.querySelector('.modal').style.transform = 'translateX(0)';
    }, 10);
}

function closeModal() { 
    const modal = document.getElementById("ticketModal");
    const modalContent = modal.querySelector('.modal');
    modalContent.style.transform = 'translateX(100%)';
    setTimeout(() => {
        modal.style.display = "none"; 
    }, 300); // Wait for animation
}

// Close modal when clicking outside
document.getElementById('ticketModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

window.onload = () => {
    try {
        const parentTheme = window.parent.document.documentElement.getAttribute("data-theme");
        if(parentTheme) document.body.setAttribute("data-theme", parentTheme);
    } catch(e) {}
    renderTicketList(myTickets);
    
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'new') {
        openModal();
    }
};
</script>
</body>
</html>
