<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Entry & Inventory Ledger - BKNR ERP</title>
    <!-- Inter Font & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #1e293b;
            --accent-color: #2563eb;
            --bg-light: #f8fafc;
            --border-color: #cbd5e1;
            --text-dark: #334155;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Design */
        .sidebar {
            width: 260px;
            background-color: var(--primary-color);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar .brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
        }

        .sidebar .menu-item {
            padding: 12px 15px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .sidebar .menu-item:hover, .sidebar .menu-item.active {
            background-color: var(--secondary-color);
            color: var(--white);
        }

        /* Main Content Frame */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation Header */
        .header {
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .company-badge {
            background-color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        /* View Area Content */
        .content-container {
            padding: 25px 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Filter Controls Grid */
        .filters-panel {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            background-color: var(--white);
        }

        .form-control:focus {
            border-color: var(--accent-color);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--white);
            border: none;
            padding: 11px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* Main Data Table Wrapper */
        .table-responsive {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow-x: auto; /* Handles horizontal scroll on mobile screen perfectly */
            max-height: 500px;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
            min-width: 1200px; /* Forces responsive horizontal scrolling on small viewports */
        }

        thead th {
            background-color: #f1f5f9;
            color: var(--secondary-color);
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Inline Search Columns Row inside Table Head */
        .search-row th {
            background-color: #f8fafc;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .table-search-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }

        .table-search-input:focus {
            border-color: var(--accent-color);
        }

        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--text-dark);
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: #f8fafc;
        }

        /* Action Buttons */
        .btn-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 4px;
        }

        .btn-edit { color: var(--accent-color); }
        .btn-delete { color: #ef4444; }

        /* Responsive Mobile Utility Styles */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; }
            .sidebar .brand { margin-bottom: 10px; }
            .sidebar .menu-container { display: flex; flex-wrap: wrap; gap: 10px; }
            .sidebar .menu-item { margin-bottom: 0; padding: 8px 12px; font-size: 12px; }
            .header { padding: 15px; }
            .content-container { padding: 15px; }
            .filters-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Frame Component -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid cubic-radial fa-layer-group"></i>
            <span>BKNR ERP</span>
        </div>
        <nav class="menu-container">
            <a href="#" class="menu-item active"><i class="fa-solid fa-boxes-stacked"></i> Stock Ledger</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-users"></i> HR & Attendance</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-file-invoice-dollar"></i> Billing Logs</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-gears"></i> System Masters</a>
        </nav>
    </aside>

    <!-- Right Side Application Interface Wrapper -->
    <main class="main-content">
        <header class="header">
            <h1>Stock Entry Master Engine</h1>
            <div class="company-badge" id="currentCompanyBadge">Company ID: Loading...</div>
        </header>

        <section class="content-container">
            
            <!-- Global Query Control Structure -->
            <div class="filters-panel">
                <div class="form-group">
                    <label for="companySelect">Target Company Filter</label>
                    <select id="companySelect" class="form-control" onchange="updateCompanyContext()">
                        <!-- Dynamic options match directly to API values -->
                        <option value="BKNR9879">BKNR Operations Main</option>
                        <option value="BKNR002">BKNR Merchant Branch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="movementFilter">Cargo Movement Type</label>
                    <select id="movementFilter" class="form-control">
                        <option value="">All Movements</option>
                        <option value="IN">IN (Stock Intake)</option>
                        <option value="OUT">OUT (Dispatch)</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="fetchStockEntriesData()">
                    <i class="fa-solid fa-magnifying-glass"></i> Pull Records
                </button>
            </div>

            <!-- Main Data Grid Architecture -->
            <div class="table-responsive">
                <table id="stockEntryTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Batch Number</th>
                            <th>Species</th>
                            <th>Variety</th>
                            <th>Grade</th>
                            <th>Cargo Type</th>
                            <th>MC Count</th>
                            <th>Loose Pcs</th>
                            <th>Quantity (KG)</th>
                            <th>Product Value/KG</th>
                            <th>Inventory Value</th>
                            <th>HLSO Count</th>
                            <th>HOSO Count</th>
                            <th>Sales Ref Rate</th>
                            <th>Actions</th>
                        </tr>
                        <!-- Searchable Input row inserted inline into columns directly -->
                        <tr class="search-row">
                            <th></th>
                            <th><input type="text" class="table-search-input" placeholder="Search Batch..." onkeyup="filterTableByColumn(1, this.value)"></th>
                            <th><input type="text" class="table-search-input" placeholder="Search Species..." onkeyup="filterTableByColumn(2, this.value)"></th>
                            <th><input type="text" class="table-search-input" placeholder="Search Variety..." onkeyup="filterTableByColumn(3, this.value)"></th>
                            <th><input type="text" class="table-search-input" placeholder="Search Grade..." onkeyup="filterTableByColumn(4, this.value)"></th>
                            <th><input type="text" class="table-search-input" placeholder="Search Type..." onkeyup="filterTableByColumn(5, this.value)"></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <!-- Dynamic content row records map automatically here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- JavaScript REST Engine Integration Block -->
    <script>
        const API_BASE_URL = "/api/v1/bknr-erp";

        function updateCompanyContext() {
            const companyId = document.getElementById("companySelect").value;
            document.getElementById("currentCompanyBadge").innerText = `Company ID: ${companyId}`;
        }

        // Fetching Database entries synchronized without parameter mismatch
        async function fetchStockEntriesData() {
            const companyId = document.getElementById("companySelect").value;
            const movementType = document.getElementById("movementFilter").value;
            const tableBody = document.getElementById("stockTableBody");
            
            tableBody.innerHTML = `<tr><td colspan="15" style="text-align: center;"><i class="fa-solid fa-spinner fa-spin"></i> Fetching records from database cluster...</td></tr>`;
            
            try {
                let url = `${API_BASE_URL}/inventory/stock-entries?company_id=${encodeURIComponent(companyId)}`;
                if(movementType) {
                    url += `&cargo_type=${encodeURIComponent(movementType)}`;
                }

                const response = await fetch(url);
                const result = await response.json();
                
                if (result.status === "success" && result.data.length > 0) {
                    tableBody.innerHTML = "";
                    result.data.forEach(record => {
                        const row = document.createElement("tr");
                        // Maps perfectly to database columns architecture
                        row.innerHTML = `
                            <td>${record.id}</td>
                            <td><strong>${record.batch_number || '-'}</strong></td>
                            <td>${record.species || '-'}</td>
                            <td>${record.variety || '-'}</td>
                            <td>${record.grade || '-'}</td>
                            <td><span style="color: ${record.cargo_movement_type === 'IN' ? '#10b981' : '#f59e0b'}; font-weight: bold;">${record.cargo_movement_type || '-'}</span></td>
                            <td>${record.no_of_mc || 0}</td>
                            <td>${record.loose || 0}</td>
                            <td>${record.quantity ? record.quantity.toFixed(2) : '0.00'}</td>
                            <td>${record.product_kg_value ? record.product_kg_value.toFixed(2) : '0.00'}</td>
                            <td>${record.inventory_value ? record.inventory_value.toFixed(2) : '0.00'}</td>
                            <td>${record.hlso_count || 0}</td>
                            <td>${record.hoso_count || 0}</td>
                            <td>${record.sales_reference_rate ? record.sales_reference_rate.toFixed(2) : '0.00'}</td>
                            <td class="btn-actions">
                                <button class="btn-icon btn-edit" onclick="editRecord(${record.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn-icon btn-delete" onclick="deleteRecord(${record.id})"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="15" style="text-align: center; color: var(--text-muted);">No records found for the given criteria.</td></tr>`;
                }
            } catch (error) {
                console.error("Fetch operational failure:", error);
                tableBody.innerHTML = `<tr><td colspan="15" style="text-align: center; color: #ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Error loading server ledger data.</td></tr>`;
            }
        }

        // Instant Inline filtering functionality targeting selected columns
        function filterTableByColumn(columnIndex, query) {
            const filterValue = query.toLowerCase();
            const table = document.getElementById("stockEntryTable");
            const rows = table.getElementsByTagName("tr");

            // Skipping primary and secondary head elements
            for (let i = 2; i < rows.length; i++) {
                const td = rows[i].getElementsByTagName("td")[columnIndex];
                if (td) {
                    const textContent = td.textContent || td.innerText;
                    if (textContent.toLowerCase().indexOf(filterValue) > -1) {
                        rows[i].style.display = "";
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }
        }

        function editRecord(id) { alert(`Trigger Edit Context Mode for entry: ${id}`); }
        function deleteRecord(id) { alert(`Trigger Purge Request Execution sequence for entry: ${id}`); }

        // Initializing UI environment on page boot
        window.onload = () => {
            updateCompanyContext();
            fetchStockEntriesData();
        };
    </script>
</body>
</html>
