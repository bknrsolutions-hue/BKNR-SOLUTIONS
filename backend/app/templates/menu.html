<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BKNR ERP – Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* SAME STYLE - NO CHANGE */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f7f9;
}

.header {
  background: #0f172a;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header .company-title {
  font-size: 18px;
  font-weight: 700;
}

.header .logout {
  background: transparent;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 11px;
  margin-left: 15px;
  cursor: pointer;
  border: 1px solid #ef4444;
  color: #ef4444;
  font-weight: 700;
}

.header .logout:hover {
  background: #ef4444;
  color: white;
}

.header .user-info {
  font-size: 14px;
}

.top-menu {
  background: #ffffff;
  display: flex;
  gap: 10px;
  padding: 0 20px;
  border-bottom: 1px solid #e2e8f0;
}

.top-menu button {
  background: none;
  border: none;
  padding: 15px 12px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
}

.container {
  display: flex;
  height: calc(100vh - 105px);
}

.left-menu {
  width: 190px;
  background: #ffffff;
  border-right: 1px solid #e2e8f0;
  padding: 15px 12px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.frame-container {
  flex: 1;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="company-title">{{ request.session.get('company_code') }}</div>
  <div>
    <span class="user-info">{{ request.session.get('name') }}</span>
    <button class="logout" onclick="logout()">LOGOUT</button>
  </div>
</div>

<div class="top-menu">
  <button onclick="loadDash()">Dashboard</button>
  <button onclick="loadOps()">Operations</button>
</div>

<div class="container">
  <div id="sideMenu" class="left-menu"></div>
  <div class="frame-container">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
const permissions = ({{ request.session.get('permissions')|tojson }} || "ALL").toString();

function allow(key){
  try {
    return permissions.includes("ALL") || permissions.includes(key);
  } catch(e){
    return true;
  }
}

function openPage(route){
  document.getElementById("frame").src = route;
}

function loadDash(){
  document.getElementById("sideMenu").innerHTML = `
    <button onclick="openPage('/dashboard/processing_dashboard')">Processing</button>
    <button onclick="openPage('/dashboard/inventory_dashboard')">Inventory</button>
  `;

  // 🔥 MOST IMPORTANT FIX
  openPage('/dashboard/processing_dashboard');
}

function loadOps(){
  document.getElementById("sideMenu").innerHTML = `
    <button onclick="openPage('/processing/gate_entry')">Gate Entry</button>
    <button onclick="openPage('/processing/production')">Production</button>
  `;
}

async function logout(){
  await fetch("/auth/logout");
  window.location.href="/";
}

// 🔥 AUTO LOAD DASHBOARD
loadDash();
</script>

</body>
</html>
