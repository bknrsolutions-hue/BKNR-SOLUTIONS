<style>
/* 🌟 PREMIUM ENTERPRISE FIORI HORIZON (LIGHT THEME) */
:root {
    --primary-dark: #143465;       /* Deep Corporate Blue */
    --sidebar-bg: #ffffff;         /* Pure White */
    --sidebar-text: #475569;       /* Sleek Slate Gray */
    --sidebar-text-active: #2563eb;
    --accent-blue: #2563eb;        /* Vibrant Active Blue */
    --accent-light: #eff6ff;       /* Light Fiori Active Bg */
    --header-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --bg-light: #f1f5f9;           /* Crisp Cloud Gray Workspace */
    --header-h: 56px;
    --sidebar-w: 270px; 
    --border-color: #e2e8f0;
    --shadow-premium: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', Arial, sans-serif;
    background: var(--bg-light);
    color: var(--text-main);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Custom Sleek Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* OVERLAY DRAWER FOR ALL SCREENS */
.sidebar-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.3);
    z-index: 990; display: none;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.sidebar-overlay.show { display: block; }

.sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; bottom: 0; left: calc(-1 * var(--sidebar-w)); 
    z-index: 995;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.06);
    border-right: 1px solid var(--border-color);
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar.open { left: 0; }

/* Sidebar Premium Branding */
.sidebar-brand {
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--border-color);
    background: var(--sidebar-bg);
}

.brand-wrapper { display: flex; flex-direction: column; gap: 1px; }

.brand-title {
    font-weight: 800; font-size: 15px; letter-spacing: 0.8px;
    color: var(--primary-dark); display: flex; align-items: center; gap: 8px;
    text-transform: uppercase;
}
.brand-subtitle {
    font-size: 9px; font-weight: 700; color: var(--accent-blue);
    letter-spacing: 1.2px; text-transform: uppercase; margin-left: 22px;
}

.close-sidebar-btn {
    background: #f8fafc; border: 1px solid var(--border-color); color: var(--text-muted);
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
}
.close-sidebar-btn:hover { background: #fee2e2; color: #ef4444; border-color: #fecaca; }

.sidebar-menu {
    flex: 1; overflow-y: auto; padding: 12px 0;
}

/* Pillar Blocks Premium Headers */
.pillar-block { margin-bottom: 16px; }
.pillar-title {
    padding: 6px 20px; 
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8;
}

/* Menu Row Layouts */
.menu-wrapper { margin-bottom: 2px; }
.menu-item-row {
    margin: 0 8px; padding: 2px 4px; border-radius: 6px;
    transition: all 0.2s; display: flex; align-items: center; justify-content: space-between;
}
.menu-item-row:hover { background: #f8fafc; }

.menu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 8px; color: var(--sidebar-text); cursor: pointer;
    text-decoration: none; flex-grow: 1; overflow: hidden;
}
.menu-item-row:hover .menu-item { color: var(--primary-dark); }

.menu-item-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
.menu-item-left i { font-size: 14px; width: 20px; text-align: center; color: #94a3b8; flex-shrink: 0; transition: color 0.2s;}
.menu-item-row:hover .menu-item-left i { color: var(--accent-blue); }
.menu-item-label { font-size: 13px; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

.chevron-icon { font-size: 9px; color: #cbd5e1; transition: transform 0.2s; margin-left: auto; padding-right: 4px; }
.menu-item-row.open .chevron-icon { transform: rotate(90deg); color: var(--primary-dark); }

/* Submenu Architecture */
.submenu {
    max-height: 0; overflow: hidden; transition: max-height 0.25s ease-in-out;
    margin: 0 8px; background: #ffffff; border-radius: 6px;
}
.menu-item-row.open + .submenu { max-height: 2000px; padding: 4px 0; margin-top: 2px; }

.submenu-heading-block { margin-top: 2px; }
.submenu-heading-text {
    font-size: 11px; font-weight: 700; color: #64748b;
    padding: 8px 12px 8px 24px; cursor: pointer; display: flex; align-items: center;
    transition: all 0.15s; border-radius: 4px;
}
.submenu-heading-text:hover { color: var(--primary-dark); background: #f8fafc; }

.submenu-heading-text .sub-chevron { font-size: 8px; transition: transform 0.2s; margin-right: 8px; color: #94a3b8; }
.submenu-heading-block.open .submenu-heading-text .sub-chevron { transform: rotate(90deg); color: var(--primary-dark); }

.reports-container { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; }
.submenu-heading-block.open .reports-container { max-height: 2000px; }

/* Submenu Items & KPI Alignment */
.submenu-item-row { display: flex; align-items: center; justify-content: space-between; padding-right: 8px; margin: 1px 4px; border-radius: 4px; }
.submenu-item-row:hover { background: #f8fafc; }

.submenu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px 8px 24px; color: var(--sidebar-text);
    font-size: 12.5px; font-weight: 500; cursor: pointer; flex-grow: 1;
    text-decoration: none; overflow: hidden; white-space: nowrap; gap: 8px;
}
.submenu-item:hover { color: var(--primary-dark); }
.submenu-item.active { color: var(--accent-blue); font-weight: 600; background: var(--accent-light); border-left: 3px solid var(--accent-blue); padding-left: 21px; border-radius: 0 4px 4px 0;}
.submenu-heading-block .submenu-item { padding-left: 36px; }
.submenu-heading-block .submenu-item.active { padding-left: 33px; }

.submenu-item.disabled-link { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

.submenu-item span:first-child { display: flex; align-items: center; text-overflow: ellipsis; overflow: hidden; }

/* Balanced KPI Badges */
.kpi-badge {
    font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
    background: #f1f5f9; color: #64748b; text-transform: uppercase; flex-shrink: 0; border: 1px solid var(--border-color);
}
.submenu-item-row:hover .kpi-badge { background: #ffffff; border-color: #cbd5e1; color: var(--primary-dark); }
.submenu-item.active .kpi-badge { background: #ffffff; color: var(--accent-blue); border-color: #bfdbfe; }

.sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border-color); background: #f8fafc; }
.footer-quote { font-size: 9px; color: #94a3b8; font-style: italic; margin-bottom: 4px; }
.sidebar-footer .footer-powered { font-size: 10px; font-weight: 800; color: var(--primary-dark); letter-spacing: 0.5px; }

/* 🌟 WORKSPACE CONTAINER & HEADER DESIGN */
.app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.app-header {
    height: var(--header-h); 
    background: var(--header-bg);
    border-bottom: 1px solid var(--border-color);
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    position: sticky; top: 0; z-index: 999; 
    box-shadow: var(--shadow-premium);
}

.header-left-meta { display: flex; align-items: center; gap: 16px; overflow: hidden; }

.hamburger-trigger-btn {
    background: #ffffff; border: 1px solid var(--border-color); color: var(--primary-dark);
    padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.hamburger-trigger-btn:hover { background: #f8fafc; color: var(--accent-blue); border-color: #cbd5e1; }

.company-header-badge {
    background: var(--bg-light); color: var(--primary-dark); 
    padding: 6px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 700; 
    letter-spacing: 0.3px; white-space: nowrap; border: 1px solid var(--border-color);
}

.header-right-actions { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

#installBtn {
    background: var(--primary-dark); color: white; border: none; padding: 7px 14px; 
    border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; display: none; transition: 0.15s;
}
#installBtn:hover { background: var(--accent-blue); }

.user-profile { 
    font-size: 12.5px; font-weight: 600; color: #475569; 
    display: flex; align-items: center; gap: 8px; padding: 4px 14px; 
    border-right: 1px solid var(--border-color); 
}
.user-profile i { background: #f8fafc; padding: 6px; border-radius: 50%; color: var(--accent-blue); border: 1px solid var(--border-color); }

.logout-btn {
    color: #ef4444; font-size: 12.5px; font-weight: 600; cursor: pointer; 
    display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; transition: 0.15s;
}
.logout-btn:hover { background: #fef2f2; }

/* The Premium Workspace Frame */
.view-viewport { 
    flex: 1; display: flex; flex-direction: column; overflow: hidden; 
    padding: 16px; background: var(--bg-light); 
}

.iframe-wrapper {
    flex: 1; background: #ffffff; border-radius: 8px; overflow: hidden;
    box-shadow: var(--shadow-premium); border: 1px solid var(--border-color);
    display: flex; flex-direction: column; position: relative;
}

iframe { flex: 1; border: none; width: 100%; height: 100%; background: #ffffff; }

.main-page-footer {
    height: 32px; background: #ffffff; border-top: 1px solid var(--border-color);
    display: flex; align-items: center; justify-content: center; gap: 10px; color: #94a3b8; font-size: 10.5px;
    width: 100%; z-index: 10; padding: 0 16px;
}

@media (max-width: 768px) {
    .view-viewport { padding: 8px; }
    .company-header-badge { font-size: 11px; padding: 4px 8px; }
    .user-profile { padding-right: 0; border-right: none; }
    .user-profile span { display: none; }
    .logout-btn span { display: none; }
    .app-header { padding: 0 12px; }
}

const sidebarOverlay = document.getElementById('sidebarOverlay');

    try {
        const frameDoc = frame.contentDocument || frame.contentWindow.document;
        initializeSearchableColumns(frameDoc);
    } catch(e) {
        console.warn("Cross-origin sandbox boundary handled securely.");
    }
});

function renderOrganizedMenu() {
    let html = "";
    menuData.forEach(cat => {
        let hasVisible = false;
        
        if (cat.items) {
            hasVisible = cat.items.some(item => allow(item[0]) || item[5]);
        } else if (cat.subgroups) {
            hasVisible = cat.subgroups.some(sub => sub.items.some(item => allow(item[0])));
        }
        
        if (!hasVisible) return;

        html += `<div class="pillar-block">
                   <div class="pillar-title">${cat.title}</div>
                   <div class="menu-wrapper">`;

        if (cat.items) {
            cat.items.forEach(item => {
                const [permissionKey, route, icon, label, badge, isDisabled] = item;
                if (!isDisabled && !allow(permissionKey)) return;
                
                const disabledClass = isDisabled ? "disabled-link" : "";
                const badgeClass = isDisabled ? "kpi-badge disabled-badge" : "kpi-badge";
                const clickHandler = isDisabled ? `onclick="loadPage('#', this)"` : `onclick="loadPage('${route}', this)"`;

                html += `<div class="submenu-item-row">
                            <a class="submenu-item ${disabledClass}" href="javascript:void(0)" ${clickHandler}>
                                <span><i class="fa-solid ${icon}" style="margin-right:10px; font-size:12px; color:#94a3b8;"></i> ${label}</span>
                                <span class="${badgeClass}">${badge}</span>
                            </a>
                           </div>`;
            });
        } else if (cat.subgroups) {
            cat.subgroups.forEach(sub => {
                let allowedSubItems = sub.items.filter(item => allow(item[0]) || item[5]);
                if (allowedSubItems.length === 0) return;

                html += `<div class="submenu-heading-block">
                            <div class="submenu-heading-text" onclick="toggleReportsGroup(this)">
                                <span><i class="fa-solid fa-chevron-right sub-chevron"></i>${sub.name}</span>
                            </div>
                            <div class="reports-container">`;
                            
                allowedSubItems.forEach(item => {
                    const [permissionKey, route, icon, label, badge, isDisabled] = item;
                    const disabledClass = isDisabled ? "disabled-link" : "";
                    const badgeClass = isDisabled ? "kpi-badge disabled-badge" : "kpi-badge";
                    const clickHandler = isDisabled ? `onclick="loadPage('#', this)"` : `onclick="loadPage('${route}', this)"`;

                    html += `<div class="submenu-item-row">
                                <a class="submenu-item ${disabledClass}" href="javascript:void(0)" ${clickHandler}>
                                    <span><i class="fa-solid ${icon}" style="margin-right:10px; font-size:12px; color:#94a3b8;"></i> ${label}</span>
                                    <span class="${badgeClass}">${badge}</span>
                                </a>
                               </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    sidebarMenu.innerHTML = html;
}

function toggleReportsGroup(element) {
    const parentBlock = element.closest('.submenu-heading-block');
    const isOpen = parentBlock.classList.contains('open');
    
    const masterContainer = element.closest('.menu-wrapper');
    if(masterContainer) {
        masterContainer.querySelectorAll('.submenu-heading-block').forEach(block => {
            if(block !== parentBlock) {
                block.classList.remove('open');
            }
        });
    }

    if(isOpen) {
        parentBlock.classList.remove('open');
    } else {
        parentBlock.classList.add('open');
    }
}

function toggleSidebar(shouldOpen) {
    if (shouldOpen) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    }
}

function loadPage(url, element) {
    if(url === '#') {
        return; 
    }
    frame.src = url;
    document.querySelectorAll('.submenu-item').forEach(el => el.classList.remove('active'));
    
    if(element) {
        element.classList.add('active');
        
        const parentBlock = element.closest('.submenu-heading-block');
        if(parentBlock && !parentBlock.classList.contains('open')) {
            parentBlock.classList.add('open');
        }
    }
    toggleSidebar(false);
}

async function logout(){
    if(confirm("Terminate Secure Workspace Session?")) { 
        await fetch("/auth/logout"); 
        window.location.href="/"; 
    }
}

window.onload = () => {
    renderOrganizedMenu();
    if(allow("processing_dashboard")) {
        loadPage('/dashboard/processing_dashboard');
    } else if(allow("inventory_dashboard")) {
        loadPage('/dashboard/inventory_dashboard');
    } else {
        const firstSubmenuItem = document.querySelector('.submenu-item:not(.disabled-link)');
        if(firstSubmenuItem) {
            firstSubmenuItem.click();
        }
    }
};
