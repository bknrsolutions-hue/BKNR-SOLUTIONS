<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BKNR ERP – Full Enterprise Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA & Mobile Meta -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #0f172a; 
    --accent: #2563eb;
    --text: #1e293b;
    --header-h: 52px;
    --nav-h: 48px;
}

body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f1f5f9;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

/* TOP MNC HEADER */
.main-header {
    background: var(--primary);
    height: var(--header-h);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 24px; color: white; z-index: 2000;
}
.brand { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
.header-actions { display: flex; align-items: center; gap: 15px; }

#installBtn {
    background: var(--accent); color: white; border: none; padding: 6px 12px;
    border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; display: none;
}

.logout-btn {
    border: 1px solid #ef4444; color: #ef4444; padding: 4px 12px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.3s;
}
.logout-btn:hover { background: #ef4444; color: white; }

/* NAVIGATION BAR */
.nav-bar {
    background: #ffffff;
    height: var(--nav-h);
    display: flex; padding: 0 10px;
    border-bottom: 1px solid #e2e8f0;
    z-index: 1001; position: relative;
    overflow-x: auto; scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }

.nav-item {
    background: none; border: none; padding: 0 18px; height: 100%;
    font-size: 13px; font-weight: 600; color: #64748b;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: 0.2s; position: relative; white-space: nowrap;
}
.nav-item:hover, .nav-item.active { color: var(--accent); background: #f8fafc; }
.nav-item.active::after {
    content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent);
}

/* THE PREMIUM DROPDOWN - ZERO GAP */
.dropdown-menu {
    position: fixed;
    width: 290px;
    background: #ffffff;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    border: 1px solid #e2e8f0;
    border-top: none; 
    display: none;
    flex-direction: column;
    z-index: 9999;
    padding: 8px 0;
    max-height: 85vh;
    overflow-y: auto;
}
.dropdown-menu.show { display: flex; }

.dropdown-header {
    padding: 10px 18px 5px; font-size: 10px; color: #94a3b8;
    text-transform: uppercase; font-weight: 800; letter-spacing: 1px;
}

.dropdown-item {
    padding: 10px 18px; display: flex; align-items: center; gap: 12px;
    color: var(--text); font-size: 13px; font-weight: 500;
    transition: 0.2s; cursor: pointer; text-decoration: none;
}
.dropdown-item i { width: 18px; text-align: center; color: #94a3b8; font-size: 14px; }
.dropdown-item:hover { background: #eff6ff; color: var(--accent); padding-left: 24px; }
.dropdown-item:hover i { color: var(--accent); }

/* CONTENT AREA */
.main-container { flex: 1; position: relative; z-index: 1; }
iframe { width: 100%; height: 100%; border: none; background: white; }
</style>
</head>
<body>

<div class="main-header">
    <div class="brand"><i class="fa-solid fa-cube"></i> {{ request.session.get('company_code') }}</div>
    <div class="header-actions">
        <button id="installBtn"><i class="fa-solid fa-download"></i> INSTALL</button>
        <span style="font-size:13px; font-weight:500;"><i class="fa-regular fa-circle-user"></i> {{ request.session.get('name') }}</span>
        <div class="logout-btn" onclick="logout()">LOGOUT</div>
    </div>
</div>

<div class="nav-bar" id="topNav">
    <button class="nav-item active" onmouseover="showMenu(this, 'dash')"><i class="fa-solid fa-gauge"></i> Dashboards</button>
    <button class="nav-item" onmouseover="showMenu(this, 'ops')"><i class="fa-solid fa-gears"></i> Operations</button>
    <button class="nav-item" onmouseover="showMenu(this, 'reports')"><i class="fa-solid fa-file-invoice"></i> Reports</button>
    <button class="nav-item" onmouseover="showMenu(this, 'criteria')"><i class="fa-solid fa-list-check"></i> Criteria</button>
    <button class="nav-item" onmouseover="showMenu(this, 'summaries')"><i class="fa-solid fa-clipboard-list"></i> Summaries</button>
    <button class="nav-item" onmouseover="showMenu(this, 'bills')"><i class="fa-solid fa-wallet"></i> Bills & Accounts</button>
    <button class="nav-item" onmouseover="showMenu(this, 'attendance')"><i class="fa-solid fa-calendar-day"></i> Attendance</button>
    <button class="nav-item" onmouseover="showMenu(this, 'admin')"><i class="fa-solid fa-user-shield"></i> Admin</button>
</div>

<div id="dropMenu" class="dropdown-menu" onmouseleave="hideMenu()" onmouseenter="clearHideTimer()">
    <!-- Menu generated by JS -->
</div>

<div class="main-container">
    <iframe id="frame" name="frame" onmouseenter="hideMenu()"></iframe>
</div>

<script>
const permissions = {{ request.session.get('permissions')|tojson }};
function allow(key){ return permissions.includes("ALL") || permissions.includes(key); }

// --- COMPLETE DATA OBJECT (NO MISSING LINKS) ---
const menuData = {
    dash: {
        title: "Dashboards",
        items: [
            ['/dashboard/processing_dashboard', 'fa-chart-line', 'Processing Dashboard'],
            ['/dashboard/inventory_dashboard', 'fa-warehouse', 'Inventory Dashboard'],
            ['/dashboard/hr_dashboard', 'fa-user-tie', 'HR Dashboard'],
            ['/dashboard/costing_dashboard', 'fa-file-invoice-dollar', 'Costing Dashboard']
        ]
    },
    ops: {
        title: "Operations",
        items: [
            ['gate_entry', '/processing/gate_entry', 'fa-door-open', 'Gate Entry'],
            ['raw_material_purchasing', '/processing/raw_material_purchasing', 'fa-truck-ramp-box', 'RM Purchasing'],
            ['de_heading', '/processing/de_heading', 'fa-scissors', 'De-Heading'],
            ['grading', '/processing/grading', 'fa-filter', 'Grading'],
            ['peeling', '/processing/peeling', 'fa-hand-dots', 'Peeling'],
            ['soaking', '/processing/soaking', 'fa-droplet', 'Soaking'],
            ['production', '/processing/production', 'fa-industry', 'Production'],
            ['stock_entry', '/inventory/stock_entry', 'fa-boxes-stacked', 'Stock Entry'],
            ['pending_orders', '/inventory/pending_orders', 'fa-clock-rotate-left', 'Pending Orders'],
            ['general_store_entry', '/general_stock/entry', 'fa-shop', 'General Store Entry'],
            ['cold_storage_holding', '/inventory/cold_storage_holding', 'fa-snowflake', 'Cold Storage Holding']
        ]
    },
    reports: {
        title: "Processing Reports",
        items: [
            ['gate_entry_report', '/reports/gate_entry', 'fa-file-lines', 'Gate Entry Report'],
            ['rmp_report', '/reports/raw_material_purchasing', 'fa-file-invoice', 'RM Purchase Report'],
            ['de_heading_report', '/reports/de_heading', 'fa-file-medical', 'De-Heading Report'],
            ['grading_report', '/reports/grading_report', 'fa-file-shield', 'Grading Report'],
            ['peeling_report', '/reports/peeling_report', 'fa-file-import', 'Peeling Report'],
            ['soaking_report', '/reports/soaking_report', 'fa-file-word', 'Soaking Report'],
            ['production_report', '/reports/production_report', 'fa-file-export', 'Production Report'],
            ['floor_balance_report', '/reports/floor_balance_report', 'fa-scale-balanced', 'Floor Balance Report'],
            ['reprocess_report', '/reports/re-process', 'fa-arrows-rotate', 'Re-Process Report'],
            ['inventory_report', '/inventory/stock_report', 'fa-boxes-packing', 'Stock Status Report'],
            ['storage_cost_report', '/reports/storage_cost_report', 'fa-coins', 'Storage & Cost Report'],
            ['pending_orders_report', '/reports/pending_orders_report', 'fa-clock', 'Pending Orders Report'],
            ['sales_report', '/inventory/sales_report', 'fa-receipt', 'Sales Report'],
            ['gs_report', '/general_stock/report', 'fa-file-zipper', 'General Store Report'],
            ['cold_storage_holding_report', '/inventory/cold_storage_holding_report', 'fa-warehouse', 'Cold Storage Report']
        ]
    },
    criteria: {
        title: "Master Data",
        items: [
            ['suppliers', '/criteria/suppliers', 'fa-caret-right', 'Suppliers'],
            ['buyers', '/criteria/buyers', 'fa-caret-right', 'Buyers'],
            ['buyer_agents', '/criteria/buyer_agents', 'fa-caret-right', 'Buyer Agents'],
            ['species', '/criteria/species', 'fa-caret-right', 'Species'],
            ['varieties', '/criteria/varieties', 'fa-caret-right', 'Varieties'],
            ['grades', '/criteria/grades', 'fa-caret-right', 'Grades'],
            ['glazes', '/criteria/glazes', 'fa-caret-right', 'Glazes'],
            ['packing_styles', '/criteria/packing_styles', 'fa-caret-right', 'Packing Styles'],
            ['chemicals', '/criteria/chemicals', 'fa-caret-right', 'Chemicals'],
            ['freezers', '/criteria/freezers', 'fa-caret-right', 'Freezers'],
            ['countries', '/criteria/countries', 'fa-caret-right', 'Countries'],
            ['vehicle_numbers', '/criteria/vehicle_numbers', 'fa-caret-right', 'Vehicle Numbers'],
            ['production_at', '/criteria/production_at', 'fa-caret-right', 'Production At'],
            ['peeling_at', '/criteria/peeling_at', 'fa-caret-right', 'Peeling At'],
            ['production_types', '/criteria/production_types', 'fa-caret-right', 'Production Types'],
            ['purposes', '/criteria/purposes', 'fa-caret-right', 'Purposes'],
            ['purchasing_locations', '/criteria/purchasing_locations', 'fa-caret-right', 'Purchasing Locations'],
            ['grade_to_hoso', '/criteria/grade_to_hoso', 'fa-caret-right', 'Grade to HOSO'],
            ['hoso_hlso', '/criteria/hoso_hlso', 'fa-caret-right', 'HOSO & HLSO'],
            ['peeling_rates', '/criteria/peeling_rates', 'fa-caret-right', 'Peeling Rates'],
            ['contractors', '/criteria/contractors', 'fa-caret-right', 'Contractors'],

            ['production_for', '/criteria/production_for', 'fa-caret-right', 'Production For'],
            ['brands', '/criteria/brands', 'fa-caret-right', 'Brands'],
            ['vendors', '/criteria/vendors', 'fa-caret-right', 'Vendors'],
            ['hsn_codes', '/criteria/hsn_codes', 'fa-caret-right', 'HSN Codes'],
            ['cold_storage', '/inventory/cold_storage', 'fa-warehouse', 'Cold Storage Master']
        ]
    },
    summaries: {
        title: "Summaries",
        items: [
            ['processing_summary', '/summary/processing', 'fa-rectangle-list', 'Batch Summary'],
            ['processing_summary', '/summary/periodic-report', 'fa-calendar-days', 'Periodic Summary'],
            ['inventory_costing', '/summary/inventory_costing', 'fa-calculator', 'Inventory Costing'],
            ['floor_balance_value', '/summary/floor_balance_value', 'fa-scale-balanced', 'Floor Balance Value']
        ]
    },
    bills: {
        title: "Finance & Operations",
        items: [
            ['electricity_bills', '/api/electricity/entry', 'fa-bolt', 'Electricity Bills'],
            ['diesel_bills', '/api/diesel/entry', 'fa-gas-pump', 'Diesel Consumption'],
            ['packaging_bills', '/api/purchase/entry', 'fa-file-invoice-dollar', 'Purchase & Packaging'],
            ['logistics_bills', '/api/container/entry', 'fa-truck-fast', 'Logistics & Freight'],
            ['qa_testing', '/api/qa/entry', 'fa-microscope', 'QA Testing Charges'],
            ['other_expenses', '/api/expenses/entry', 'fa-receipt', 'Other Expenses']
        ]
    },
    attendance: {
        title: "HRMS",
        items: [
            ['employee_registration', '/attendance/employee/register', 'fa-id-card', 'Staff Registration'],
            ['employee_increment', '/attendance/employee-increment', 'fa-arrow-trend-up', 'Increment Details'],
            ['daily_attendance', '/attendance/daily', 'fa-calendar-check', 'Daily Attendance'],
            ['salary_report', '/attendance/salary/monthly-sheet', 'fa-money-check-dollar', 'Monthly Salary Sheet'],
            ['tax_master', '/attendance/tax-master', 'fa-file-shield', 'Payroll Master'],
            ['salary_advance', '/attendance/salary-advance', 'fa-hand-holding-dollar', 'Salary Advance']
        ]
    },
    admin: {
        title: "Administration",
        items: [
            ['add_user', '/admin/add_user', 'fa-user-plus', 'User Management']
        ]
    }
};

let hideTimer;
const dropMenu = document.getElementById('dropMenu');
const frame = document.getElementById('frame');

function showMenu(btn, key) {
    clearHideTimer();
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');

    const data = menuData[key];
    if (!data) return;

    let html = `<div class="dropdown-header">${data.title}</div>`;
    data.items.forEach(item => {
        let route, icon, label, permKey;
        if(item.length === 4) { [permKey, route, icon, label] = item; }
        else { [route, icon, label] = item; permKey = null; }

        if(!permKey || allow(permKey)) {
            html += `<div class="dropdown-item" onclick="loadPage('${route}')">
                        <i class="fa-solid ${icon}"></i> ${label}
                     </div>`;
        }
    });

    const rect = btn.getBoundingClientRect();
    dropMenu.style.left = rect.left + 'px';
    dropMenu.style.top = rect.bottom + 'px';
    dropMenu.innerHTML = html;
    dropMenu.classList.add('show');
}

function hideMenu() {
    hideTimer = setTimeout(() => {
        dropMenu.classList.remove('show');
    }, 150);
}

function clearHideTimer() { clearTimeout(hideTimer); }

function loadPage(url) {
    frame.src = url;
    dropMenu.classList.remove('show');
}

async function logout(){
    if(confirm("Secure Logout?")) { await fetch("/auth/logout"); window.location.href="/"; }
}

// Initial Load
window.onload = () => {
    if(allow("processing_dashboard")) {
        loadPage('/dashboard/processing_dashboard');
    } else {
        const ops = menuData.ops.items;
        for(let item of ops) {
            if(allow(item[0])) { loadPage(item[1]); break; }
        }
    }
};

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/service-worker.js");
}
</script>
</body>
</html>
