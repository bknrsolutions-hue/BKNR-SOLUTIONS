<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BKNR ERP 2.0 – Ultra Premium Suite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<style>
/* 🌟 NEXT-LEVEL MENU VARIABLES (DARK MODE FIRST) 🌟 */
:root {
    --bg-app: #0f172a;             
    --surface-panel: rgba(30, 41, 59, 0.92); 
    --glass-bg: rgba(15, 23, 42, 0.65); 
    
    --text-primary: #f8fafc;       
    --text-secondary: #94a3b8;     
    --text-tertiary: #64748b;      
    
    --accent-dark: #3b82f6;        
    --accent-blue: #60a5fa;        
    
    --border-light: rgba(255, 255, 255, 0.06); 
    --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.25);
    --glow-active: 0 8px 16px -4px rgba(59, 130, 246, 0.4); 

    --radius-panel: 24px;
    --radius-element: 12px;
    --header-h: 74px;
    --sidebar-w: 290px; 
}

/* 🌟 LIGHT MODE OVERRIDE 🌟 */
[data-theme="light"] {
    --bg-app: #f1f5f9;             
    --surface-panel: rgba(255, 255, 255, 0.92);      
    --glass-bg: rgba(255, 255, 255, 0.75); 
    
    --text-primary: #0f172a;       
    --text-secondary: #64748b;     
    --text-tertiary: #94a3b8;      
    
    --accent-dark: #2563eb;        
    --accent-blue: #3b82f6;        
    
    --border-light: rgba(0, 0, 0, 0.05);
    --shadow-float: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
    --shadow-soft: 0 4px 20px rgba(15, 23, 42, 0.04);
    --glow-active: 0 8px 16px -4px rgba(37, 99, 235, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-app);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s ease;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

.sidebar-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 990; display: none; opacity: 0; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.sidebar-overlay.show { display: block; opacity: 1; }

/* FLOATING SIDEBAR */
.sidebar {
    width: var(--sidebar-w);
    background: var(--surface-panel);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
    display: flex; flex-direction: column;
    position: fixed; top: 12px; bottom: 12px; left: calc(-1 * var(--sidebar-w) - 30px); 
    z-index: 995;
    border-radius: var(--radius-panel);
    box-shadow: var(--shadow-float);
    border: 1px solid var(--border-light);
    transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s ease, border-color 0.4s ease;
    margin-left: 12px;
}
.sidebar.open { left: 0; }

.sidebar-brand {
    height: 84px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; 
    border-bottom: 1px solid var(--border-light);
}

.brand-wrapper { display: flex; flex-direction: column; gap: 2px; }
.brand-title { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: var(--text-primary); display: flex; align-items: center; gap: 12px; }
.brand-title i { background: linear-gradient(135deg, var(--accent-blue), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; }
.brand-subtitle { font-size: 9px; font-weight: 800; color: var(--text-tertiary); letter-spacing: 3px; text-transform: uppercase; margin-left: 36px; }

.close-sidebar-btn {
    background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-light); color: var(--text-secondary);
    font-size: 14px; cursor: pointer; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
[data-theme="light"] .close-sidebar-btn { background: rgba(0, 0, 0, 0.03); }
.close-sidebar-btn:hover { color: var(--text-primary); transform: scale(1.08); background: var(--border-light); }

.sidebar-menu { flex: 1; overflow-y: auto; padding: 28px 0; }
.pillar-block { margin-bottom: 28px; }
.pillar-title { padding: 0 32px 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); }
.menu-wrapper { margin-bottom: 4px; }

.submenu-heading-text {
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    padding: 12px 24px 12px 32px; cursor: pointer; display: flex; align-items: center;
    transition: all 0.3s ease; margin: 0 16px; border-radius: var(--radius-element);
}
.submenu-heading-text:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.03); transform: translateX(2px); }
[data-theme="light"] .submenu-heading-text:hover { background: rgba(0, 0, 0, 0.02); }
.submenu-heading-text .sub-chevron { font-size: 10px; transition: transform 0.4s ease; margin-right: 14px; color: var(--text-tertiary); }
.submenu-heading-block.open .submenu-heading-text { color: var(--text-primary); }
.submenu-heading-block.open .submenu-heading-text .sub-chevron { transform: rotate(90deg); color: var(--accent-blue); }

.reports-container { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
.submenu-heading-block.open .reports-container { max-height: 2500px; padding: 6px 0; }

.submenu-item-row { display: flex; align-items: center; justify-content: space-between; margin: 2px 16px; border-radius: var(--radius-element); }
.submenu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; color: var(--text-secondary); font-size: 13.5px; font-weight: 600; cursor: pointer; flex-grow: 1;
    text-decoration: none; overflow: hidden; white-space: nowrap; gap: 10px; border-radius: var(--radius-element); transition: all 0.3s ease;
}
.submenu-item i { width: 24px; text-align: center; color: var(--text-tertiary); font-size: 15px; margin-right: 8px;}
.submenu-item:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.03); transform: translateX(4px); }
[data-theme="light"] .submenu-item:hover { background: rgba(0, 0, 0, 0.02); }
.submenu-item:hover i { color: var(--accent-blue); }

.submenu-item.active { color: #ffffff; background: linear-gradient(135deg, var(--accent-dark), var(--accent-blue)); box-shadow: var(--glow-active); font-weight: 700; }
.submenu-item.active i { color: #ffffff; }
.submenu-item.active:hover { transform: none; background: linear-gradient(135deg, var(--accent-dark), var(--accent-blue)); } 

.submenu-heading-block .submenu-item { padding-left: 50px; font-size: 13px; font-weight: 500;}
.submenu-heading-block .submenu-item.active { padding-left: 50px; font-weight: 600;}
.submenu-heading-block .submenu-item i { display: none; } 
.submenu-item.disabled-link { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

.kpi-badge {
    font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 20px;
    background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); 
    text-transform: uppercase; flex-shrink: 0; border: 1px solid var(--border-light); letter-spacing: 0.5px;
}
[data-theme="light"] .kpi-badge { background: rgba(0, 0, 0, 0.03); }

.sidebar-footer { padding: 28px; border-top: 1px solid var(--border-light); text-align: center;}
.footer-quote { font-size: 10.5px; color: var(--text-tertiary); margin-bottom: 8px; font-weight: 600;}
.sidebar-footer .footer-powered { font-size: 11px; font-weight: 800; color: var(--text-primary); letter-spacing: 1px; }

/* WORKSPACE CONTAINER & GLASS HEADER */
.app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px 12px 12px 0; gap: 12px; position: relative; }

.app-header {
    height: var(--header-h); 
    background: var(--glass-bg); 
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); 
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
    border-radius: var(--radius-panel); box-shadow: var(--shadow-soft); border: 1px solid var(--border-light);
    flex-shrink: 0; transition: background 0.4s ease; position: relative; z-index: 1000;
}

.header-left-meta { display: flex; align-items: center; gap: 16px; }

.hamburger-trigger-btn, .theme-toggle-btn {
    background: var(--surface-panel); border: 1px solid var(--border-light); 
    color: var(--text-secondary); border-radius: 50%; width: 44px; height: 44px;
    font-size: 15px; cursor: pointer; transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-soft);
}
.hamburger-trigger-btn:hover, .theme-toggle-btn:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

.header-right-actions { display: flex; align-items: center; gap: 14px; position: relative; }

/* 🌟 USER PROFILE CONSOLE WITH TOGGLE TRIGGER 🌟 */
.user-profile { 
    background: var(--surface-panel); font-size: 13px; font-weight: 700; color: var(--text-primary); 
    display: flex; align-items: center; gap: 10px; padding: 6px 16px 6px 6px;
    border-radius: 40px; border: 1px solid var(--border-light); cursor: pointer;
    user-select: none; transition: all 0.2s ease;
}
.user-profile:hover, .user-profile.active { border-color: var(--accent-blue); box-shadow: var(--shadow-soft); }
.user-profile .avatar { 
    width: 30px; height: 32px; background: linear-gradient(135deg, var(--accent-blue), #4f46e5); 
    color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; 
}
.user-profile .chevron-down-icon { font-size: 10px; color: var(--text-secondary); transition: transform 0.2s ease; }
.user-profile.active .chevron-down-icon { transform: rotate(180deg); }

/* 🌟 ULTRA PREMIUM DROPDOWN OVERLAY CONSOLE (FIXED STACKING ORDER) 🌟 */
.profile-dropdown-console {
    position: absolute; 
    top: calc(var(--header-h) + 6px); 
    right: 0px; 
    width: 340px;
    background: var(--surface-panel); 
    backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
    border-radius: 20px; 
    border: 1px solid var(--border-light); 
    box-shadow: var(--shadow-float);
    display: none; 
    flex-direction: column; 
    z-index: 999999 !important; /* 👈 Force-stacking index pool override to top-most layer */
    overflow: hidden; 
    padding: 16px; 
    gap: 16px;
    animation: dropSlide 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.profile-dropdown-console.show { display: flex; }

@keyframes dropSlide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🟢 DROPDOWN FILTERS LAYOUT SETUP */
.dropdown-filter-section { display: flex; flex-direction: column; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
.dropdown-filter-box { display: flex; flex-direction: column; gap: 4px; }
.dropdown-filter-box label { font-size: 8px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

.global-select-input {
    background: var(--bg-app); color: var(--text-primary); border: 1px solid var(--border-light);
    font-size: 12px; font-weight: 700; padding: 6px 28px 6px 10px; border-radius: 8px; outline: none;
    height: 34px; width: 100%; cursor: pointer; transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%2394a3b8'><path d='M0 3l5 5 5-5z'/></svg>");
    background-repeat: no-repeat; background-position: right 12px center;
}
.global-select-input:focus { border-color: var(--accent-blue); }

/* 🟢 DROPDOWN MENUS ENGINE */
.dropdown-menu-scroll-box { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding-right: 2px; }
.dropdown-pillar-block { display: flex; flex-direction: column; gap: 4px; }
.dropdown-pillar-title { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); padding-left: 6px; }
.dropdown-pillar-title.super-admin-title { color: #ef4444; }

.dropdown-submenu-list { display: flex; flex-direction: column; gap: 2px; }
.dropdown-item-row { display: flex; align-items: center; border-radius: 8px; transition: all 0.2s ease; }
.dropdown-submenu-item {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    padding: 8px 10px; color: var(--text-secondary); font-size: 12.5px; font-weight: 600; cursor: pointer;
    text-decoration: none; border-radius: 8px; transition: all 0.2s ease;
}
.dropdown-submenu-item i { width: 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; margin-right: 6px; }
.dropdown-submenu-item:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); transform: translateX(2px); }
[data-theme="light"] .dropdown-submenu-item:hover { background: rgba(0, 0, 0, 0.02); }
.dropdown-submenu-item:hover i { color: var(--accent-blue); }

.dropdown-submenu-item.active { color: #ffffff; background: linear-gradient(135deg, var(--accent-dark), var(--accent-blue)); font-weight: 700; }
.dropdown-submenu-item.active i { color: #ffffff; }

/* 🟢 DROPDOWN TERMINATE CONSOLE EXECUTOR */
.dropdown-logout-wrapper { border-top: 1px solid var(--border-light); padding-top: 10px; }
.dropdown-logout-btn {
    width: 100%; height: 38px; background: rgba(239, 68, 68, 0.06); border: 1px solid rgba(239, 68, 68, 0.15);
    color: #f87171; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease;
}
.dropdown-logout-btn:hover { background: #ef4444; color: #ffffff; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }

.iframe-wrapper {
    flex: 1; background: var(--bg-app); border-radius: var(--radius-panel); overflow: hidden;
    box-shadow: var(--shadow-float); border: 1px solid var(--border-light); display: flex; flex-direction: column; position: relative; z-index: 10;
}
iframe { flex: 1; border: none; width: 100%; height: 100%; background: transparent; }

@media (max-width: 1024px) {
    .app-container { padding: 8px; gap: 8px;}
    .iframe-wrapper { border-radius: 20px; }
    .user-profile span { display: none; } .user-profile { padding: 6px; }
    .app-header { padding: 0 16px; border-radius: 20px;}
    .profile-dropdown-console { width: calc(100vw - 32px); right: 0px; top: calc(var(--header-h) + 4px); }
}

@media (max-width: 600px) {
    .header-left-meta { gap: 12px; } .header-right-actions { gap: 12px; }
    .theme-toggle-btn, .hamburger-trigger-btn { width: 40px; height: 40px; font-size: 14px; }
    .app-header { padding: 0 12px; height: 64px;}
    .profile-dropdown-console { top: 54px; }
}
</style>
<link rel="stylesheet" href="/static/css/global-loader.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-wrapper">
            <div class="brand-title"><i class="fa-solid fa-layer-group"></i> MY ERP </div>
            <div class="brand-subtitle">WORKSPACE</div>
        </div>
        <button class="close-sidebar-btn" onclick="toggleSidebar(false)"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <div class="sidebar-menu" id="sidebarMenu"></div>

    <div class="sidebar-footer">
        <div class="footer-quote">Precision in every process.</div>
        <div class="footer-powered"><i class="fa-brands fa-hubspot" style="color:var(--accent-blue); margin-right:4px;"></i> HORIZON ENGINE</div>
    </div>
</div>

<div class="app-container">
    <div class="app-header">
        <div class="header-left-meta">
            <button class="hamburger-trigger-btn" onclick="toggleSidebar(true)" title="Menu">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>
        
        <div class="header-right-actions">
            <div class="theme-toggle-btn" onclick="toggleTheme()" id="themeIcon" title="Switch Mode">
                <i class="fa-solid fa-sun"></i>
            </div>
            
            <!-- 🌟 USER PROFILE CONSOLE WITH CHEVRON TRIGGER 🌟 -->
            <div class="user-profile" id="userProfileBtn" onclick="toggleProfileDropdown(event)">
                <div class="avatar"><i class="fa-solid fa-user-astronaut"></i></div>
                <span>{{ request.session.get('name') }}</span>
                <i class="fa-solid fa-chevron-down chevron-down-icon"></i>
            </div>

            <!-- 🌟 FULLY INTEGRATED PROFILE DROPDOWN DROP CONSOLE (TOP-MOST Z-INDEX) 🌟 -->
            <div class="profile-dropdown-console" id="profileDropdownConsole">
                
                <!-- 🟢 UNIVERSAL FILTERS SPLIT INSIDE CONSOLE -->
                <div class="dropdown-filter-section">
                    <div class="dropdown-filter-box">
                        <label>Production For</label>
                        <select id="global_production_for" class="global-select-input" onchange="broadcastUniversalFilters()">
                            <option value="">All Corporate Entities</option>
                            {% for c in companies %}
                            <option value="{{ c }}">{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="dropdown-filter-box">
                        <label>Plant Location</label>
                        <select id="global_plant_location" class="global-select-input" onchange="broadcastUniversalFilters()">
                            <option value="">All Active Plants</option>
                            {% for l in locations %}
                            <option value="{{ l }}">{{ l }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 🟢 COMPLEX DROPDOWN DYNAMIC ROUTING ENGINE -->
                <div class="dropdown-menu-scroll-box" id="dropdownMenuScrollBox"></div>

                <!-- 🟢 LOGOUT SECURE TERMINATION CONSOLE -->
                <div class="dropdown-logout-wrapper">
                    <button class="dropdown-logout-btn" onclick="logout()">
                        <i class="fa-solid fa-power-off"></i> Terminate Workspace
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="iframe-wrapper">
        <iframe id="frame" name="frame"></iframe>
    </div>
</div>

<script>
// 🌟 THEME TOGGLE LOGIC 🌟
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const newTheme = currentTheme === "dark" ? "light" : "dark";
    
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    updateThemeIcon(newTheme);
    
    try {
        const frameDoc = document.getElementById('frame').contentDocument || document.getElementById('frame').contentWindow.document;
        if(frameDoc) frameDoc.documentElement.setAttribute("data-theme", newTheme);
    } catch(e) {}
}

function updateThemeIcon(theme) {
    const icon = document.querySelector('#themeIcon i');
    if(theme === 'light') {
        icon.className = "fa-solid fa-moon"; 
    } else {
        icon.className = "fa-solid fa-sun"; 
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem("theme") || "dark";
    updateThemeIcon(savedTheme);
});

// 🌟 PROFILE DROPDOWN TOGGLE ENGINE 🌟
function toggleProfileDropdown(e) {
    if(e) e.stopPropagation();
    const consoleBox = document.getElementById("profileDropdownConsole");
    const profileBtn = document.getElementById("userProfileBtn");
    
    const isShowing = consoleBox.classList.contains("show");
    if(isShowing) {
        consoleBox.classList.remove("show");
        profileBtn.classList.remove("active");
    } else {
        consoleBox.classList.add("show");
        profileBtn.classList.add("active");
    }
}

// Close Dropdown Console when clicking anywhere outside
document.addEventListener("click", (e) => {
    const consoleBox = document.getElementById("profileDropdownConsole");
    const profileBtn = document.getElementById("userProfileBtn");
    if (consoleBox && !consoleBox.contains(e.target) && !profileBtn.contains(e.target)) {
        consoleBox.classList.remove("show");
        profileBtn.classList.remove("active");
    }
});

// 🌟 UNIVERSAL FILTERS SYNC SYSTEM 🌟
function broadcastUniversalFilters() {
    const pFor = document.getElementById("global_production_for").value;
    const pLoc = document.getElementById("global_plant_location").value;
    const iframe = document.getElementById("frame");
    
    if (!iframe || !iframe.src || iframe.src === "about:blank") return;
    
    try {
        let currentUrl = new URL(iframe.src, window.location.origin);
        
        if (pFor) {
            currentUrl.searchParams.set("production_for", pFor);
        } else {
            currentUrl.searchParams.delete("production_for");
        }
        
        if (pLoc) {
            currentUrl.searchParams.set("location", pLoc);
            currentUrl.searchParams.set("peeling_at", pLoc);
            currentUrl.searchParams.set("production_at", pLoc);
            currentUrl.searchParams.set("receiving_center", pLoc);
            currentUrl.searchParams.set("cold_storage_name", pLoc);
        } else {
            currentUrl.searchParams.delete("location");
            currentUrl.searchParams.delete("peeling_at");
            currentUrl.searchParams.delete("production_at");
            currentUrl.searchParams.delete("receiving_center");
            currentUrl.searchParams.delete("cold_storage_name");
        }
        
        iframe.src = currentUrl.toString();
    } catch(e) {
        console.warn("Universal filter injection synchronized.");
    }
}

// 🌟 AUTOMATIC DYNAMIC SIDEBAR INTERCEPTOR LINK EXTENSION 🌟
function loadPage(url, element) {
    if(url === '#') return;
    
    const pFor = document.getElementById("global_production_for").value;
    const pLoc = document.getElementById("global_plant_location").value;
    
    let targetUrl = new URL(url, window.location.origin);
    
    if (pFor) targetUrl.searchParams.set("production_for", pFor);
    if (pLoc) {
        targetUrl.searchParams.set("location", pLoc);
        targetUrl.searchParams.set("peeling_at", pLoc);
        targetUrl.searchParams.set("production_at", pLoc);
        targetUrl.searchParams.set("receiving_center", pLoc);
        targetUrl.searchParams.set("cold_storage_name", pLoc);
    }

    document.getElementById('frame').src = targetUrl.toString();
    
    document.querySelectorAll('.submenu-item, .dropdown-submenu-item').forEach(el => el.classList.remove('active'));
    
    if(element) {
        element.classList.add('active');
        const parentBlock = element.closest('.submenu-heading-block');
        if(parentBlock && !parentBlock.classList.contains('open')) {
            parentBlock.classList.add('open');
        }
    }
    
    toggleSidebar(false);
    document.getElementById("profileDropdownConsole").classList.remove("show");
    document.getElementById("userProfileBtn").classList.remove("active");
}

const sidebarMenu = document.getElementById('sidebarMenu');

function renderOrganizedMenu() {
    let html = "";
    sidebarMenuData.forEach(cat => {
        let hasVisible = false;
        if (cat.items) {
            hasVisible = cat.items.some(item => allow(item[0]));
        } else if (cat.subgroups) {
            hasVisible = cat.subgroups.some(sub => sub.items.some(item => allow(item[0])));
        }
        if (!hasVisible) return;

        html += `<div class="pillar-block"><div class="pillar-title">${cat.title}</div><div class="menu-wrapper">`;

        if (cat.items) {
            cat.items.forEach(item => {
                const [permissionKey, route, icon, label, badge] = item;
                if (!allow(permissionKey)) return;
                html += `<div class="submenu-item-row">
                            <a class="submenu-item" href="javascript:void(0)" onclick="loadPage('${route}', this)">
                                <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                <span class="kpi-badge">${badge}</span>
                            </a>
                           </div>`;
            });
        } else if (cat.subgroups) {
            cat.subgroups.forEach(sub => {
                let allowedSubItems = sub.items.filter(item => allow(item[0]));
                if (allowedSubItems.length === 0) return;

                html += `<div class="submenu-heading-block">
                            <div class="submenu-heading-text" onclick="toggleReportsGroup(this)">
                                <i class="fa-solid fa-chevron-right sub-chevron"></i><span>${sub.name}</span>
                            </div>
                            <div class="reports-container">`;
                            
                allowedSubItems.forEach(item => {
                    const [permissionKey, route, icon, label, badge] = item;
                    html += `<div class="submenu-item-row">
                                <a class="submenu-item" href="javascript:void(0)" onclick="loadPage('${route}', this)">
                                    <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                    <span class="kpi-badge">${badge}</span>
                                </a>
                               </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    sidebarMenu.innerHTML = html;
}

function renderDropdownConsoleMenu() {
    const consoleScrollBox = document.getElementById("dropdownMenuScrollBox");
    if(!consoleScrollBox) return;
    
    let html = "";
    dropdownConsoleMenuData.forEach(cat => {
        if (cat.roleRequired) {
            const hasRoleAccess = (currentUserRole === cat.roleRequired) || isDefaultSuperAdmin;
            if (!hasRoleAccess) return; 
        }

        let hasVisible = false;
        if (cat.items) {
            hasVisible = cat.items.some(item => allow(item[0]));
        } else if (cat.subgroups) {
            hasVisible = cat.subgroups.some(sub => sub.items.some(item => allow(item[0])));
        }
        if (!hasVisible) return;

        const titleClass = cat.roleRequired ? "dropdown-pillar-title super-admin-title" : "dropdown-pillar-title";
        html += `<div class="dropdown-pillar-block"><div class="${titleClass}">${cat.title}</div><div class="dropdown-submenu-list">`;

        if (cat.items) {
            cat.items.forEach(item => {
                const [permissionKey, route, icon, label, badge] = item;
                if (!allow(permissionKey)) return;
                const isSuperAdminBlock = cat.roleRequired ? "super-badge" : "";
                
                html += `<div class="dropdown-item-row">
                            <a class="dropdown-submenu-item" href="javascript:void(0)" onclick="loadPage('${route}', this)">
                                <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                <span class="kpi-badge ${isSuperAdminBlock}">${badge}</span>
                            </a>
                           </div>`;
            });
        } else if (cat.subgroups) {
            cat.subgroups.forEach(sub => {
                let allowedSubItems = sub.items.filter(item => allow(item[0]));
                if (allowedSubItems.length === 0) return;

                html += `<div class="submenu-heading-block">
                            <div class="submenu-heading-text" style="margin:0; padding:8px 6px;" onclick="toggleReportsGroup(this)">
                                <i class="fa-solid fa-chevron-right sub-chevron"></i><span>${sub.name}</span>
                            </div>
                            <div class="reports-container">`;
                            
                allowedSubItems.forEach(item => {
                    const [permissionKey, route, icon, label, badge] = item;
                    html += `<div class="dropdown-item-row" style="margin:2px 0 2px 14px;">
                                <a class="dropdown-submenu-item" href="javascript:void(0)" onclick="loadPage('${route}', this)">
                                    <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                    <span class="kpi-badge">${badge}</span>
                                </a>
                               </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    consoleScrollBox.innerHTML = html;
}

function toggleReportsGroup(element) {
    const parentBlock = element.closest('.submenu-heading-block');
    const isOpen = parentBlock.classList.contains('open');
    const masterContainer = element.closest('.menu-wrapper') || element.closest('.dropdown-submenu-list');
    if(masterContainer) {
        masterContainer.querySelectorAll('.submenu-heading-block').forEach(block => {
            if(block !== parentBlock) block.classList.remove('open');
        });
    }
    if(isOpen) parentBlock.classList.remove('open');
    else parentBlock.classList.add('open');
}

function toggleSidebar(shouldOpen) {
    if (shouldOpen) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    }
}

function logout() {
    if(confirm("Terminate Secure Workspace Session?")) {
        window.top.location.href = "/auth/logout";
    }
}

    renderOrganizedMenu();
    renderDropdownConsoleMenu();
    if(allow("processing_dashboard")) {
        loadPage('/dashboard/processing_dashboard');
    } else if(allow("inventory_dashboard")) {
        loadPage('/dashboard/inventory_dashboard');
    } else {
        const firstSubmenuItem = document.querySelector('.submenu-item:not(.disabled-link)');
        if(firstSubmenuItem) firstSubmenuItem.click();
    }
};
