<html lang="en">

<style>
/* 🌟 NEXT-LEVEL MENU VARIABLES (DARK MODE FIRST) 🌟 */
:root {
    --bg-app: #0f172a;             
    --surface-panel: rgba(30, 41, 59, 0.92); /* Added slight transparency for glass effect */
    --glass-bg: rgba(15, 23, 42, 0.65); 
    
    --text-primary: #f8fafc;       
    --text-secondary: #94a3b8;     
    --text-tertiary: #64748b;      
    
    --accent-dark: #3b82f6;        
    --accent-blue: #60a5fa;        
    
    --border-light: rgba(255, 255, 255, 0.06); /* Softer, more premium border */
    --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.25);
    --glow-active: 0 8px 16px -4px rgba(59, 130, 246, 0.4); /* Glow for active elements */

    --radius-panel: 24px;
    --radius-element: 12px;
    --header-h: 74px;
    --sidebar-w: 290px; 
}

/* 🌟 LIGHT MODE OVERRIDE 🌟 */
[data-theme="light"] {
    --bg-app: #f1f5f9;             
    --surface-panel: rgba(255, 255, 255, 0.92);      
    --glass-bg: rgba(255, 255, 255, 0.75); 
    
    --text-primary: #0f172a;       
    --text-secondary: #64748b;     
    --text-tertiary: #94a3b8;      
    
    --accent-dark: #2563eb;        
    --accent-blue: #3b82f6;        
    
    --border-light: rgba(0, 0, 0, 0.05);
    --shadow-float: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
    --shadow-soft: 0 4px 20px rgba(15, 23, 42, 0.04);
    --glow-active: 0 8px 16px -4px rgba(37, 99, 235, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-app);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s ease;
}

/* Invisible elegant scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* 🌟 OVERLAY 🌟 */
.sidebar-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 990; display: none; opacity: 0; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.sidebar-overlay.show { display: block; opacity: 1; }

/* 🌟 FLOATING SIDEBAR 🌟 */
.sidebar {
    width: var(--sidebar-w);
    background: var(--surface-panel);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); /* Premium Glass */
    display: flex; flex-direction: column;
    position: fixed; top: 12px; bottom: 12px; left: calc(-1 * var(--sidebar-w) - 30px); 
    z-index: 995;
    border-radius: var(--radius-panel);
    box-shadow: var(--shadow-float);
    border: 1px solid var(--border-light);
    transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s ease, border-color 0.4s ease;
    margin-left: 12px;
}
.sidebar.open { left: 0; }

/* 🌟 BRANDING AREA 🌟 */
.sidebar-brand {
    height: 84px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; 
    border-bottom: 1px solid var(--border-light);
    transition: border-color 0.3s ease;
}

.brand-wrapper { display: flex; flex-direction: column; gap: 2px; }

.brand-title {
    font-weight: 800; font-size: 20px; letter-spacing: -0.5px;
    color: var(--text-primary); display: flex; align-items: center; gap: 12px;
}
.brand-title i {
    background: linear-gradient(135deg, var(--accent-blue), #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-size: 24px;
    filter: drop-shadow(0 2px 4px rgba(96, 165, 250, 0.3)); /* Icon glow */
}

.brand-subtitle {
    font-size: 9px; font-weight: 800; color: var(--text-tertiary);
    letter-spacing: 3px; text-transform: uppercase; margin-left: 36px;
}

.close-sidebar-btn {
    background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-light); 
    color: var(--text-secondary);
    font-size: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
[data-theme="light"] .close-sidebar-btn { background: rgba(0, 0, 0, 0.03); }
.close-sidebar-btn:hover { color: var(--text-primary); transform: scale(1.08); background: var(--border-light); }

/* 🌟 MENU NAVIGATION 🌟 */
.sidebar-menu { flex: 1; overflow-y: auto; padding: 28px 0; }

.pillar-block { margin-bottom: 28px; }
.pillar-title {
    padding: 0 32px 10px; 
    font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary);
}
.pillar-title.super-admin-title {
    color: #ef4444;
}

.menu-wrapper { margin-bottom: 4px; }

.submenu-heading-text {
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    padding: 12px 24px 12px 32px; cursor: pointer; display: flex; align-items: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); margin: 0 16px; border-radius: var(--radius-element);
}
.submenu-heading-text:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.03); transform: translateX(2px); }
[data-theme="light"] .submenu-heading-text:hover { background: rgba(0, 0, 0, 0.02); }

.submenu-heading-text .sub-chevron { 
    font-size: 10px; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    margin-right: 14px; color: var(--text-tertiary); 
}
.submenu-heading-block.open .submenu-heading-text { color: var(--text-primary); }
.submenu-heading-block.open .submenu-heading-text .sub-chevron { transform: rotate(90deg); color: var(--accent-blue); }

.reports-container { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.submenu-heading-block.open .reports-container { max-height: 2500px; padding: 6px 0; }

/* Menu Items */
.submenu-item-row { display: flex; align-items: center; justify-content: space-between; margin: 2px 16px; border-radius: var(--radius-element); transition: all 0.3s ease;}

.submenu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; color: var(--text-secondary);
    font-size: 13.5px; font-weight: 600; cursor: pointer; flex-grow: 1;
    text-decoration: none; overflow: hidden; white-space: nowrap; gap: 10px;
    border-radius: var(--radius-element); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.submenu-item i { width: 24px; text-align: center; color: var(--text-tertiary); font-size: 15px; transition: color 0.3s ease; margin-right: 8px;}
.submenu-item:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.03); transform: translateX(4px); }
[data-theme="light"] .submenu-item:hover { background: rgba(0, 0, 0, 0.02); }
.submenu-item:hover i { color: var(--accent-blue); }

/* Premium Active State */
.submenu-item.active { 
    color: #ffffff; 
    background: linear-gradient(135deg, var(--accent-dark), var(--accent-blue)); 
    box-shadow: var(--glow-active);
    font-weight: 700;
}
.submenu-item.active i { color: #ffffff; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
.submenu-item.active:hover { transform: none; background: linear-gradient(135deg, var(--accent-dark), var(--accent-blue)); } 

.submenu-heading-block .submenu-item { padding-left: 50px; font-size: 13px; font-weight: 500;}
.submenu-heading-block .submenu-item.active { padding-left: 50px; font-weight: 600;}
.submenu-heading-block .submenu-item i { display: none; } 

.submenu-item.disabled-link { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

/* Premium Badges */
.kpi-badge {
    font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 20px;
    background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); 
    text-transform: uppercase; flex-shrink: 0; border: 1px solid var(--border-light);
    letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
}
[data-theme="light"] .kpi-badge { background: rgba(0, 0, 0, 0.03); }
.submenu-item:hover .kpi-badge { color: var(--text-primary); background: var(--bg-app); border-color: transparent; }
.submenu-item.active .kpi-badge { 
    background: rgba(255,255,255,0.25); 
    color: #ffffff; 
    border: none; 
    box-shadow: none;
    backdrop-filter: blur(4px);
}
.kpi-badge.super-badge { border-color: rgba(239, 68, 68, 0.3); color: #ef4444; background: rgba(239, 68, 68, 0.05); } 
.submenu-item.active .kpi-badge.super-badge { color: #fff; background: rgba(255,255,255,0.25); }

/* Sidebar Footer */
.sidebar-footer { padding: 28px; border-top: 1px solid var(--border-light); text-align: center; transition: border-color 0.3s ease;}
.footer-quote { font-size: 10.5px; color: var(--text-tertiary); margin-bottom: 8px; font-weight: 600;}
.sidebar-footer .footer-powered { font-size: 11px; font-weight: 800; color: var(--text-primary); letter-spacing: 1px; }

/* 🌟 WORKSPACE CONTAINER & GLASS HEADER 🌟 */
.app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px 12px 12px 0; gap: 12px;}

.app-header {
    height: var(--header-h); 
    background: var(--glass-bg); 
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); /* Stronger premium blur */
    display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
    border-radius: var(--radius-panel);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border-light);
    flex-shrink: 0;
    transition: background 0.4s ease, border-color 0.4s ease;
}

.header-left-meta { display: flex; align-items: center; gap: 20px; }

/* Premium Header Buttons */
.hamburger-trigger-btn, .theme-toggle-btn, .logout-btn {
    background: var(--surface-panel); border: 1px solid var(--border-light); 
    color: var(--text-secondary); border-radius: 50%; width: 44px; height: 44px;
    font-size: 15px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-soft);
}
.hamburger-trigger-btn:hover, .theme-toggle-btn:hover { 
    color: var(--accent-blue); 
    box-shadow: var(--shadow-float); 
    transform: translateY(-2px); 
    border-color: var(--accent-blue);
}
.logout-btn:hover { 
    color: #ef4444; 
    box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.4); 
    transform: translateY(-2px); 
    border-color: rgba(239, 68, 68, 0.3);
}

.company-header-badge {
    background: var(--surface-panel);
    color: var(--text-primary); 
    font-size: 13.5px; font-weight: 800; 
    letter-spacing: 0.5px; padding: 10px 20px;
    border-radius: 30px; /* Pill shape for premium feel */
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-soft); border: 1px solid var(--border-light);
    transition: all 0.3s ease;
}
.company-header-badge::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    background: #34C759; border-radius: 50%; box-shadow: 0 0 10px rgba(52, 199, 89, 0.6);
}

.header-right-actions { display: flex; align-items: center; gap: 16px; }

.user-profile { 
    background: var(--surface-panel);
    font-size: 13.5px; font-weight: 700; color: var(--text-primary); 
    display: flex; align-items: center; gap: 12px; padding: 6px 20px 6px 6px;
    border-radius: 40px; box-shadow: var(--shadow-soft);
    border: 1px solid var(--border-light);
    transition: all 0.3s ease;
    cursor: pointer;
}
.user-profile:hover { transform: translateY(-1px); box-shadow: var(--shadow-float); }
.user-profile .avatar { 
    width: 32px; height: 32px; 
    background: linear-gradient(135deg, var(--accent-blue), #4f46e5); 
    color: #FFF; border-radius: 50%; display: flex; 
    align-items: center; justify-content: center; font-size: 13px; 
    box-shadow: 0 4px 10px rgba(96, 165, 250, 0.3);
}

.iframe-wrapper {
    flex: 1; background: var(--bg-app); /* Matches theme seamlessly */
    border-radius: var(--radius-panel); overflow: hidden;
    box-shadow: var(--shadow-float); border: 1px solid var(--border-light);
    display: flex; flex-direction: column; position: relative;
    transition: background 0.4s ease, border-color 0.4s ease;
}

iframe { flex: 1; border: none; width: 100%; height: 100%; background: transparent; }

@media (max-width: 1024px) {
    .app-container { padding: 8px; gap: 8px;}
    .iframe-wrapper { border-radius: 20px; }
    .company-header-badge { font-size: 12px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-profile span { display: none; } 
    .user-profile { padding: 6px; }
    .app-header { padding: 0 16px; border-radius: 20px;}
}

@media (max-width: 600px) {
    .company-header-badge { display: none; } 
    .header-left-meta { gap: 12px; }
    .header-right-actions { gap: 12px; }
    .theme-toggle-btn, .logout-btn, .hamburger-trigger-btn { width: 40px; height: 40px; font-size: 14px; }
    .user-profile .avatar { width: 28px; height: 28px; font-size: 12px;}
    .app-header { padding: 0 12px; height: 64px;}
}
</style>

<script>
// 🌟 THEME TOGGLE LOGIC 🌟
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const newTheme = currentTheme === "dark" ? "light" : "dark";
    
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    updateThemeIcon(newTheme);
    
    try {
        const frameDoc = document.getElementById('frame').contentDocument || document.getElementById('frame').contentWindow.document;
        if(frameDoc) frameDoc.documentElement.setAttribute("data-theme", newTheme);
    } catch(e) {}
}

function updateThemeIcon(theme) {
    const icon = document.querySelector('#themeIcon i');
    if(theme === 'light') {
        icon.className = "fa-solid fa-moon"; 
    } else {
        icon.className = "fa-solid fa-sun"; 
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem("theme") || "dark";
    updateThemeIcon(savedTheme);
});

// 🌟 MASTER IFRAME INJECTOR 🌟
const frame = document.getElementById('frame');
frame.addEventListener('load', () => {
    try {
        const frameDoc = frame.contentDocument || frame.contentWindow.document;
        const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
        
        frameDoc.documentElement.setAttribute("data-theme", currentTheme);
        
        if (!frameDoc.getElementById('master-theme-enforcer')) {
            let enforceLink = frameDoc.createElement("link");
            enforceLink.id = "master-theme-enforcer";
            enforceLink.rel = "stylesheet";
            enforceLink.href = "/static/css/bknr-standard.css?v=" + new Date().getTime(); 
            frameDoc.head.appendChild(enforceLink);
        }

        if (!frameDoc.getElementById('nuclear-dark-mode')) {
            let nuclearStyle = frameDoc.createElement("style");
            nuclearStyle.id = 'nuclear-dark-mode';
            nuclearStyle.innerHTML = `
                html[data-theme="dark"] body, 
                html[data-theme="dark"] .section, 
                html[data-theme="dark"] .card, 
                html[data-theme="dark"] .kpi-card, 
                html[data-theme="dark"] .rm-summary-box, 
                html[data-theme="dark"] .chart-box, 
                html[data-theme="dark"] .bg-white { background-color: #1e293b !important; background: #1e293b !important; color: #f8fafc !important; border-color: #334155 !important; }
                html[data-theme="dark"] table th, 
                html[data-theme="dark"] table td, 
                html[data-theme="dark"] th[style*="sticky"], 
                html[data-theme="dark"] td[style*="sticky"],
                html[data-theme="dark"] .sticky-col { background-color: #1e293b !important; background: #1e293b !important; color: #f8fafc !important; border-color: #334155 !important; }
                html[data-theme="dark"] thead th { background-color: #0f172a !important; background: #0f172a !important; }
                html[data-theme="dark"] .grand-total-row td { background-color: #0f172a !important; color: #60a5fa !important; }
            `;
            frameDoc.head.appendChild(nuclearStyle);
        }

        if(typeof initializeSearchableColumns === "function") {
            initializeSearchableColumns(frameDoc);
        }
    } catch(e) {
        console.warn("Iframe injection blocked.");
    }
});

// 🌟 BACKEND CONSTANTS FOR ROLE BASED ACCESS 🌟
const permissions = {{ request.session.get('permissions')|tojson|default("[]") }};
const currentUserRole = "{{ request.session.get('role', '') }}"; 
const currentUserEmail = "{{ request.session.get('email', '') }}"; 

// 🔴 MASTER OVERRIDE FOR DEFAULT SUPER ADMIN 🔴
const isDefaultSuperAdmin = (currentUserEmail === "bknr.solutions@gmail.com");

function allow(key){ 
    if (isDefaultSuperAdmin) return true;
    if (!permissions) return false;
    return permissions.includes("ALL") || permissions.includes(key); 
}

function initializeSearchableColumns(doc) {
    const selects = doc.querySelectorAll('select');
    selects.forEach(select => {
        if (!select.dataset.searchable) {
            select.dataset.searchable = "true";
        }
    });
}

// 🌟 DYNAMIC MENU DATA 🌟
const menuData = [
    {
        title: "DASHBOARDS",
        items: [
            ['processing_dashboard', '/dashboard/processing_dashboard', 'fa-chart-simple', 'Processing', 'LIVE'],
            ['inventory_dashboard', '/dashboard/inventory_dashboard', 'fa-warehouse', 'Inventory', 'LIVE'],
            ['hr_command_center', '/dashboard/hr_command_center', 'fa-user-tie', 'HR & Staff', 'LIVE'],
            ['costing_dashboard', '/dashboard/costing_dashboard', 'fa-file-invoice-dollar', 'Costing & Fin', 'LIVE']
        ]
    },
    {

        subgroups: [
            {

                items: [
                    ['gate_entry', '/processing/gate_entry', 'fa-door-open', 'Gate Entry', 'Ops-1'],
                    ['raw_material_purchasing', '/processing/raw_material_purchasing', 'fa-truck-ramp-box', 'RM Purchasing', 'Ops-2'],
                    ['de_heading', '/processing/de_heading', 'fa-scissors', 'De-Heading', 'WIP'],
                    ['grading', '/processing/grading', 'fa-filter', 'Grading', 'WIP'],
                    ['peeling', '/processing/peeling', 'fa-hand-dots', 'Peeling', 'WIP'],
                    ['soaking', '/processing/soaking', 'fa-droplet', 'Soaking', 'WIP'],
                    ['production', '/processing/production', 'fa-industry', 'Production', 'WIP']
                ]
            },
            {
                name: "Inventory",
                items: [
                    ['stock_entry', '/inventory/stock_entry', 'fa-boxes-stacked', 'Stock Entry', 'Stock'],
                    ['pending_orders', '/inventory/pending_orders', 'fa-clock-rotate-left', 'Pending Orders', 'Orders'],
                    ['cold_storage_holding', '/inventory/cold_storage_holding', 'fa-snowflake', 'Cold Storage Holding', 'Cold'],
                    ['general_store_entry', '/general_stock/entry', 'fa-shop', 'General Store Entry', 'Store']
                ]
            }
        ]
    },
    {
        title: "FINANCE",
        subgroups: [
            {
                name: "Commercial Bills",
                items: [
                    ['electricity_bills', '/api/electricity/entry', 'fa-bolt', 'Electricity Bills', 'Exp'],
                    ['diesel_bills', '/api/diesel/entry', 'fa-gas-pump', 'Diesel Consumption', 'Exp'],

const sidebarMenu = document.getElementById('sidebarMenu');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

function renderOrganizedMenu() {
    let html = "";
    menuData.forEach(cat => {
        if (cat.roleRequired) {
            const hasRoleAccess = (currentUserRole === cat.roleRequired) || isDefaultSuperAdmin;
            if (!hasRoleAccess) return; 
        }

        let hasVisible = false;
        
        if (cat.items) {
            hasVisible = cat.items.some(item => allow(item[0]) || item[5]);
        } else if (cat.subgroups) {
            hasVisible = cat.subgroups.some(sub => sub.items.some(item => allow(item[0])));
        }
        
        if (!hasVisible) return;

        const titleClass = cat.roleRequired ? "pillar-title super-admin-title" : "pillar-title";

        html += `<div class="pillar-block">
                   <div class="${titleClass}">${cat.title}</div>
                   <div class="menu-wrapper">`;

        if (cat.items) {
            cat.items.forEach(item => {
                const [permissionKey, route, icon, label, badge, isDisabled] = item;
                if (!isDisabled && !allow(permissionKey)) return;
                
                const disabledClass = isDisabled ? "disabled-link" : "";
                
                const isSuperAdminBlock = cat.roleRequired ? "super-badge" : "";
                const badgeClass = isDisabled ? `kpi-badge disabled-badge ${isSuperAdminBlock}` : `kpi-badge ${isSuperAdminBlock}`;
                
                const clickHandler = isDisabled ? `onclick="loadPage('#', this)"` : `onclick="loadPage('${route}', this)"`;

                html += `<div class="submenu-item-row">
                            <a class="submenu-item ${disabledClass}" href="javascript:void(0)" ${clickHandler}>
                                <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                <span class="${badgeClass}">${badge}</span>
                            </a>
                           </div>`;
            });
        } else if (cat.subgroups) {
            cat.subgroups.forEach(sub => {
                let allowedSubItems = sub.items.filter(item => allow(item[0]) || item[5]);
                if (allowedSubItems.length === 0) return;

                html += `<div class="submenu-heading-block">
                            <div class="submenu-heading-text" onclick="toggleReportsGroup(this)">
                                <i class="fa-solid fa-chevron-right sub-chevron"></i><span>${sub.name}</span>
                            </div>
                            <div class="reports-container">`;
                            
                allowedSubItems.forEach(item => {
                    const [permissionKey, route, icon, label, badge, isDisabled] = item;
                    const disabledClass = isDisabled ? "disabled-link" : "";
                    const badgeClass = isDisabled ? "kpi-badge disabled-badge" : "kpi-badge";
                    const clickHandler = isDisabled ? `onclick="loadPage('#', this)"` : `onclick="loadPage('${route}', this)"`;

                    html += `<div class="submenu-item-row">
                                <a class="submenu-item ${disabledClass}" href="javascript:void(0)" ${clickHandler}>
                                    <div><i class="fa-solid ${icon}"></i> ${label}</div>
                                    <span class="${badgeClass}">${badge}</span>
                                </a>
                               </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    sidebarMenu.innerHTML = html;
}

function toggleReportsGroup(element) {
    const parentBlock = element.closest('.submenu-heading-block');
    const isOpen = parentBlock.classList.contains('open');
    
    const masterContainer = element.closest('.menu-wrapper');
    if(masterContainer) {
        masterContainer.querySelectorAll('.submenu-heading-block').forEach(block => {
            if(block !== parentBlock) {
                block.classList.remove('open');
            }
        });
    }

    if(isOpen) {
        parentBlock.classList.remove('open');
    } else {
        parentBlock.classList.add('open');
    }
}

function toggleSidebar(shouldOpen) {
    if (shouldOpen) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('show');
    } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    }
}

function loadPage(url, element) {
    if(url === '#') { return; }
    document.getElementById('frame').src = url;
    document.querySelectorAll('.submenu-item').forEach(el => el.classList.remove('active'));
    
    if(element) {
        element.classList.add('active');
        const parentBlock = element.closest('.submenu-heading-block');
        if(parentBlock && !parentBlock.classList.contains('open')) {
            parentBlock.classList.add('open');
        }
    }
    
    toggleSidebar(false);
}

function logout() {
    if(confirm("Terminate Secure Workspace Session?")) {
        window.top.location.href = "/auth/logout";
    }
}

window.onload = () => {
    renderOrganizedMenu();
    if(allow("processing_dashboard")) {
        loadPage('/dashboard/processing_dashboard');
    } else if(allow("inventory_dashboard")) {
        loadPage('/dashboard/inventory_dashboard');
    } else {
        const firstSubmenuItem = document.querySelector('.submenu-item:not(.disabled-link)');
        if(firstSubmenuItem) {
            firstSubmenuItem.click();
        }
    }
};
