<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FLOOR BALANCE DASHBOARD | BKNR ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary:#143465; --accent: #3b82f6; --border:#d6dde7; --bg:#f4f6f9;
  --card:#ffffff; --text:#1f2937; --muted:#64748b; --danger: #dc2626; --warning: #f59e0b;
}
*{box-sizing:border-box; font-family: 'Inter', sans-serif;}
body{margin:0; background:var(--bg); color:var(--text); overflow-x: hidden;}

/* --- HEADER --- */
.header-dash { background: #fff; padding: 12px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
.header-titles h2{margin:0; font-size:16px; color:var(--primary); font-weight: 800;}
.grand-total { background: var(--primary); color: #fff; padding: 6px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; }

/* --- GRID SYSTEM --- */
.dashboard-grid { display: grid; grid-template-columns: 1fr 0px 0px; gap: 0px; padding: 15px; transition: all 0.3s ease-in-out; }
.dashboard-grid.active-side { grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 15px; }

.panel { background: #fff; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
.panel-title { padding: 10px 15px; background: #f8fafc; font-weight: 800; font-size: 10px; border-bottom: 1px solid var(--border); color: var(--muted); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

.side-panel { opacity: 0; visibility: hidden; }
.active-side .side-panel { opacity: 1; visibility: visible; }

.table-scroll { overflow-y: auto; flex: 1; }
.dash-table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
.dash-table th { position: sticky; top: 0; background: #f8fafc; padding: 10px; border-bottom: 2px solid var(--border); text-align: left; color: var(--muted); z-index: 20; }
.dash-table td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; color: var(--primary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Hierarchy Classes */
.group-row { background: #f1f5f9 !important; cursor: pointer; border-left: 4px solid var(--primary); }
.sub-group-row { background: #ffffff !important; display: none; cursor: pointer; border-left: 4px solid var(--accent); } 
.spec-row { background: #fff !important; display: none; cursor: pointer; border-left: 4px solid var(--warning); }
.batch-row { background: #fff !important; display: none; cursor: pointer; border-left: 4px solid #10b981; font-weight: 700 !important; }
.leaf-row { background: #fffbeb !important; display: none; font-size: 10px; color: var(--muted); }
.is-rejected { color: var(--danger) !important; }

/* Side Table Specific Styles */
.side-group-row { background: #f8fafc !important; cursor: pointer; font-weight: 800 !important; border-left: 3px solid var(--primary); }
.side-leaf-row { display: none; background: #fff !important; font-weight: 400 !important; }

.toggle-icon { transition: transform 0.2s; margin-right: 5px; width: 10px; display: inline-block; text-align: center; }
.expanded > td > .toggle-icon { transform: rotate(90deg); color: var(--accent); }
</style>
</head>
<body>

<div class="header-dash">
    <div class="header-titles"><h2>Floor Balance Analysis Dashboard</h2></div>
    <div class="grand-total" id="gt_display">TOTAL: 0.00 KG</div>
</div>

<div class="dashboard-grid" id="mainGrid">
    <div class="panel">
        <div class="panel-title"><span><i class="fa-solid fa-sitemap"></i> Batch Hierarchy</span></div>
        <div class="table-scroll">
            <table class="dash-table">
                <thead><tr><th>Location / Batch Details</th><th style="text-align:right">Weight</th></tr></thead>
                <tbody id="hierarchyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="panel side-panel">
        <div class="panel-title"><span>Variety Analysis</span> <span id="vLabel" style="color:var(--accent)"></span></div>
        <div class="table-scroll">
            <table class="dash-table">
                <thead><tr><th>Variety Name</th><th style="text-align:right">Qty</th></tr></thead>
                <tbody id="varietyBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="panel side-panel">
        <div class="panel-title"><span>Count Analysis</span> <span id="cLabel" style="color:var(--accent)"></span></div>
        <div class="table-scroll">
            <table class="dash-table">
                <thead><tr><th>Count Details</th><th style="text-align:right">Qty</th></tr></thead>
                <tbody id="countBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="dataStore" style="display:none;">
    {% for r in rows_batch %}
    <span class="r-item" data-loc="{{r.location}}" data-comp="{{r.production_for}}" data-spec="{{r.species}}" data-batch="{{r.batch}}" data-var="{{r.variety}}" data-rejfor="{{r.rejection_for}}" data-cnt="{{r.count}}" data-qty="{{r.available_qty}}" data-rej="{{r.is_rejection}}"></span>
    {% endfor %}
</div>

<script>
let allData = [];
window.onload = () => {
    document.querySelectorAll(".r-item").forEach(el => {
        allData.push({...el.dataset, qty: parseFloat(el.dataset.qty)});
    });
    renderHierarchy();
    const total = allData.reduce((s, i) => s + i.qty, 0);
    document.getElementById('gt_display').innerText = `TOTAL: ${total.toFixed(2)} KG`;
};

function renderHierarchy() {
    const tbody = document.getElementById('hierarchyBody');
    const tree = {};
    
    // Grouping Logic: Loc -> Comp -> Spec -> Batch
    allData.forEach(d => {
        if(!tree[d.loc]) tree[d.loc] = { total: 0, comps: {} };
        tree[d.loc].total += d.qty;
        
        if(!tree[d.loc].comps[d.comp]) tree[d.loc].comps[d.comp] = { total: 0, specs: {} };
        tree[d.loc].comps[d.comp].total += d.qty;
        
        if(!tree[d.loc].comps[d.comp].specs[d.spec]) tree[d.loc].comps[d.comp].specs[d.spec] = { total: 0, batches: {} };
        tree[d.loc].comps[d.comp].specs[d.spec].total += d.qty;

        if(!tree[d.loc].comps[d.comp].specs[d.spec].batches[d.batch]) tree[d.loc].comps[d.comp].specs[d.spec].batches[d.batch] = { total: 0, items: [] };
        tree[d.loc].comps[d.comp].specs[d.spec].batches[d.batch].total += d.qty;
        tree[d.loc].comps[d.comp].specs[d.spec].batches[d.batch].items.push(d);
    });

    Object.keys(tree).sort().forEach((loc, lIdx) => {
        const lId = `l-${lIdx}`;
        let trL = createRow("group-row", `<td><span class="toggle-icon">▶</span> ${loc}</td><td style="text-align:right">${tree[loc].total.toFixed(2)}</td>`);
        trL.onclick = () => { toggle(trL, lId); syncFilters('loc', loc, trL.classList.contains('expanded')); };
        tbody.appendChild(trL);

        Object.keys(tree[loc].comps).sort().forEach((comp, cIdx) => {
            const cId = `c-${lIdx}-${cIdx}`;
            let trC = createRow(`sub-group-row ${lId}`, `<td style="padding-left:15px;"><span class="toggle-icon">▶</span> ${comp}</td><td style="text-align:right">${tree[loc].comps[comp].total.toFixed(2)}</td>`);
            trC.onclick = (e) => { e.stopPropagation(); toggle(trC, cId); syncFilters('comp', comp, trC.classList.contains('expanded'), loc); };
            tbody.appendChild(trC);

            Object.keys(tree[loc].comps[comp].specs).sort().forEach((spec, sIdx) => {
                const sId = `s-${lIdx}-${cIdx}-${sIdx}`;
                let trS = createRow(`spec-row ${cId}`, `<td style="padding-left:30px;"><span class="toggle-icon">▶</span> ${spec}</td><td style="text-align:right">${tree[loc].comps[comp].specs[spec].total.toFixed(2)}</td>`);
                trS.onclick = (e) => { e.stopPropagation(); toggle(trS, sId); syncFilters('spec', spec, trS.classList.contains('expanded'), loc, comp); };
                tbody.appendChild(trS);

                Object.keys(tree[loc].comps[comp].specs[spec].batches).sort().forEach((batch, bIdx) => {
                    const bId = `b-${lIdx}-${cIdx}-${sIdx}-${bIdx}`;
                    let trB = createRow(`batch-row ${sId}`, `<td style="padding-left:45px;"><span class="toggle-icon">▶</span> Batch: ${batch}</td><td style="text-align:right">${tree[loc].comps[comp].specs[spec].batches[batch].total.toFixed(2)}</td>`);
                    trB.onclick = (e) => { e.stopPropagation(); toggle(trB, bId); };
                    tbody.appendChild(trB);

                    tree[loc].comps[comp].specs[spec].batches[batch].items.forEach(item => {
                        let vDisplay = item.rej === "True" ? `${item.var} (${item.rejfor})` : item.var;
                        tbody.appendChild(createRow(`leaf-row ${bId} ${item.rej === 'True' ? 'is-rejected' : ''}`, `<td style="padding-left:60px;">${vDisplay} | Count: ${item.cnt}</td><td style="text-align:right">${item.qty.toFixed(2)}</td>`));
                    });
                });
            });
        });
    });
}

function syncFilters(level, value, isExpanded, loc=null, comp=null) {
    const grid = document.getElementById('mainGrid');
    if (!isExpanded) { grid.classList.remove('active-side'); return; }
    grid.classList.add('active-side');
    let filtered = allData;
    if (level === 'loc') filtered = allData.filter(d => d.loc === value);
    if (level === 'comp') filtered = allData.filter(d => d.loc === loc && d.comp === value);
    if (level === 'spec') filtered = allData.filter(d => d.loc === loc && d.comp === comp && d.spec === value);
    updateSummary(filtered, value);
}

function updateSummary(data, label) {
    document.getElementById('vLabel').innerText = `[${label}]`;
    document.getElementById('cLabel').innerText = `[${label}]`;
    
    const vGroup = {};
    data.forEach(d => {
        let vKey = d.rej === "True" ? d.rejfor : d.var;
        if(!vGroup[vKey]) vGroup[vKey] = { total: 0, items: [] };
        vGroup[vKey].total += d.qty;
        vGroup[vKey].items.push(d);
    });
    renderSideTable('varietyBody', vGroup, 'v-group');

    const cGroup = {};
    data.forEach(d => {
        let cKey = d.cnt;
        if(!cGroup[cKey]) cGroup[cKey] = { total: 0, items: [] };
        cGroup[cKey].total += d.qty;
        cGroup[cKey].items.push(d);
    });
    renderSideTable('countBody', cGroup, 'c-group');
}

function renderSideTable(tbodyId, groupData, classPrefix) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    
    Object.entries(groupData).sort((a,b) => b[1].total - a[1].total).forEach(([key, val], idx) => {
        const gId = `${classPrefix}-${idx}`;
        let trG = createRow("side-group-row", `<td><span class="toggle-icon">▶</span> ${key}</td><td style="text-align:right">${val.total.toFixed(2)}</td>`);
        trG.onclick = () => toggle(trG, gId);
        tbody.appendChild(trG);
        
        val.items.forEach(item => {
            let info = `B: ${item.batch} | ${item.spec}`;
            tbody.appendChild(createRow(`side-leaf-row ${gId}`, `<td style="padding-left:20px; color:var(--muted); font-size:10px;">${info}</td><td style="text-align:right">${item.qty.toFixed(2)}</td>`));
        });
    });
}

function createRow(cls, html) { let tr = document.createElement('tr'); tr.className = cls; tr.innerHTML = html; return tr; }

function toggle(row, targetClass) {
    const isExpanding = !row.classList.contains('expanded');
    row.classList.toggle('expanded');
    document.querySelectorAll(`.${targetClass}`).forEach(child => {
        child.style.display = isExpanding ? "table-row" : "none";
        if (!isExpanding && child.classList.contains('expanded')) {
            const subClass = Array.from(child.classList).find(c => c.startsWith('c-') || c.startsWith('s-') || c.startsWith('b-') || c.startsWith('v-group-') || c.startsWith('c-group-'));
            if(subClass) toggle(child, subClass);
        }
    });
}
</script>
</body>
</html>
