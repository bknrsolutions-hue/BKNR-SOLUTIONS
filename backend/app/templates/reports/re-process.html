<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="30"> <title>RE-PROCESS REPORT | BKNR ERP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root{ --primary:#0f172a; --accent:#2563eb; --border:#cbd5e1; --bg:#f1f5f9; }
    body{ margin:0; background:var(--bg); font-family:Inter, sans-serif; overflow:hidden; display:flex; flex-direction:column; height:100vh; }
    .header{ background:#fff; padding:12px 20px; border-bottom:2px solid var(--primary); display:flex; justify-content:space-between; align-items:center; }
    .header h2{ margin:0; font-size:15px; font-weight:800; color:var(--primary); }
    
    .section{ flex:1; margin:10px 15px; background:#fff; border:1px solid var(--border); overflow:hidden; display:flex; flex-direction:column; border-radius:8px; }
    .table-wrap{ flex:1; overflow:auto; }
    table{ width:100%; border-collapse:collapse; min-width:1800px; }

    thead th{ background:#f8fafc; padding:12px 8px; font-size:10px; font-weight:800; text-transform:uppercase; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:10; }
    tbody td{ padding:10px 8px; font-size:11px; border-bottom:1px solid #f1f5f9; text-align:center; white-space:nowrap; }

    .row-date-group { background: #f8fafc !important; font-weight: 800; text-align: left !important; }
    .batch-id { color:var(--accent); font-weight:bold; font-family:monospace; background:#eff6ff; padding:4px 8px; border-radius:4px; border:1px solid #dbeafe; }
    .val-cell { color: #166534; font-weight: 700; }
    tfoot td{ background:#f1f5f9; font-weight:800; font-size:13px; border-top:2px solid var(--primary); position:sticky; bottom:0; padding:15px; }
    .search-box { padding:8px; width:300px; border:1px solid var(--border); border-radius:6px; font-size:12px; }
</style>
</head>
<body>

<div class="header">
    <h2><i class="fas fa-microchip"></i> LIVE RE-PROCESS TRACKING</h2>
    <div>
        <input type="text" id="searchBox" class="search-box" placeholder="Search Batch ID, Variety, Purpose...">
    </div>
</div>

<div class="section">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th width="50">#</th>
                    <th width="100">Date</th>
                    <th width="180">Generated Batch ID</th>
                    <th width="140">Original Batch</th>
                    <th width="120">Purpose</th>
                    <th width="200">Variety</th>
                    <th width="100">Grade</th>
                    <th width="100">Species</th>
                    <th width="100">Freezer</th>
                    <th width="80">Glaze (%)</th>
                    <th width="120">In-Qty (Kg)</th>
                    <th width="120">Rate (₹)</th>
                    <th width="150">Total Value (₹)</th>
                    <th width="150">Production At</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr>
                    <td colspan="10" style="text-align:right">TOTALS:</td>
                    <td id="grand_qty">0.00</td>
                    <td></td>
                    <td id="grand_val">0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
const rawData = [
    {% for r in rows %}
    {
        date: "{{ r.date }}",
        new_id: "{{ r.new_batch_id }}",
        orig_batch: "{{ r.original_batch }}",
        type: "{{ r.reprocess_type }}",
        variety: "{{ r.variety }}",
        grade: "{{ r.grade }}",
        species: "{{ r.species }}",
        freezer: "{{ r.freezer }}",
        glaze: "{{ r.glaze }}",
        qty: {{ r.in_qty or 0 }},
        rate: {{ r.product_kg_value or 0 }},
        value: {{ r.inventory_value or 0 }},
        prod_at: "{{ r.production_at }}"
    },
    {% endfor %}
];

function applyFilters() {
    const q = document.getElementById("searchBox").value.toLowerCase();
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let filtered = rawData.filter(d => !q || Object.values(d).join(' ').toLowerCase().includes(q));
    let gQty = 0, gVal = 0;

    const groups = {};
    filtered.forEach(d => {
        if(!groups[d.date]) groups[d.date] = { items: [], subQty: 0, subVal: 0 };
        groups[d.date].items.push(d);
        groups[d.date].subQty += d.qty;
        groups[d.date].subVal += d.value;
        gQty += d.qty;
        gVal += d.value;
    });

    Object.keys(groups).sort().reverse().forEach(date => {
        tbody.innerHTML += `<tr class="row-date-group"><td colspan="10"><i class="far fa-calendar-check"></i> DATE: ${date}</td><td>${groups[date].subQty.toFixed(2)}</td><td></td><td>₹${groups[date].subVal.toLocaleString('en-IN')}</td><td></td></tr>`;
        groups[date].items.forEach((r, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.date}</td>
                    <td><span class="batch-id">${r.new_id}</span></td>
                    <td style="font-family:monospace; font-weight:600">${r.orig_batch}</td>
                    <td><span style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-weight:bold">${r.type}</span></td>
                    <td style="text-align:left; font-weight:600">${r.variety}</td>
                    <td style="font-weight:bold; color:#1e293b">${r.grade}</td>
                    <td>${r.species}</td>
                    <td>${r.freezer}</td>
                    <td>${r.glaze}%</td>
                    <td style="font-weight:bold; background:#f0fdf4">${r.qty.toFixed(2)}</td>
                    <td style="color:#2563eb; font-weight:600">₹${r.rate.toFixed(2)}</td>
                    <td class="val-cell">₹${r.value.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                    <td>${r.prod_at}</td>
                </tr>`;
        });
    });
    document.getElementById("grand_qty").innerText = gQty.toFixed(2) + " Kg";
    document.getElementById("grand_val").innerText = "₹" + gVal.toLocaleString('en-IN', {minimumFractionDigits: 2});
}

document.getElementById("searchBox").oninput = applyFilters;
applyFilters();
</script>
</body>
</html>
