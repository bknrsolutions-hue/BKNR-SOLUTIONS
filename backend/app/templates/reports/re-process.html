<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        function syncThemeFromParent() {
            try {
                if (window.parent && window.parent.document) {
                    const parentTheme = window.parent.document.documentElement.getAttribute("data-theme");
                    if (parentTheme) { document.documentElement.setAttribute("data-theme", parentTheme); }
                }
            } catch(e) {}
        }
        syncThemeFromParent();
    </script>
<meta charset="UTF-8">
<title>RE-PROCESS REPORT | ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>:root {
    /* Standard theme variables mapped to global standard styles */
    --primary: var(--text);
    --accent: var(--accent);
    --border: var(--border);
    --bg: var(--bg);
    --header: var(--card-bg);
    --text: var(--text);
    --text-muted: var(--text-muted);
    --muted: var(--text-muted);
    --danger: var(--cancelled-text);
    --success: var(--completed-text);
    --card-bg: var(--card-bg);
    --header-bg: var(--header-bg);
    --row-hover: var(--row-hover);
    --processing-bg: var(--processing-bg);

    /* Report specific variables mapping */
    --bg-light: var(--bg);
    --panel-bg: var(--card-bg);
    --sidebar-bg: var(--bg);
    --primary-dark: var(--text);
    --accent-blue: var(--accent);
    --accent-glow: var(--accent);
    --text-main: var(--text);
    --border-color: var(--border);
    --table-header-bg: var(--header-bg);
    
    /* Finance / Others specific mapping */
    --card: var(--card-bg);
}



*{box-sizing:border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0;}
body{
 background:var(--bg); height:100vh;
 display:flex; flex-direction:column; overflow:hidden; color:var(--text); -webkit-font-smoothing: antialiased;
}

/* ================= HEADER & SEARCH ================= */
.header{ background:var(--header); padding:10px 15px; border-bottom:1px solid var(--border); }
.header-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.header h2{ margin:0; font-size:14px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:0.5px; }

/* 🟢 FILTERS - FORCED TO SINGLE ROW WITH HORIZONTAL SCROLL ENGINE FOR MOBILE */
.filters{
 margin-top:8px; display:flex; flex-wrap: nowrap !important; overflow-x: auto !important;
 gap:12px; background:var(--header-bg); padding:10px; border-radius:6px; border:1px solid var(--border);
 -webkit-overflow-scrolling: touch; justify-content: flex-start; scrollbar-width: thin;
}
.filters::-webkit-scrollbar { height: 4px; }
.filters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.fbox{ display:flex; flex-direction:column; gap:2px; flex-shrink: 0 !important; min-width: 120px; }
.fbox label{ font-size:8px; font-weight:700; color:var(--primary); text-transform:uppercase; }

select,input[type=date],#searchBox{ padding:6px; font-size:11px; border:1px solid var(--border); border-radius:4px; background:var(--card-bg); outline:none; height:32px !important; color: var(--primary); font-weight: 600; }
#searchBox{ min-width: 200px !important; width: 200px !important; border-left:4px solid var(--accent); }
#f_fy { border: 1.5px solid var(--accent); font-weight: 700; color: var(--accent); }

@media(max-width: 600px) {
    .filters { gap: 12px; padding: 8px; overflow-y: hidden; }
    .fbox { min-width: 110px; }
    select, input[type=date], #searchBox { font-size: 10px; padding: 4px 6px; }
    #searchBox { min-width: 150px !important; width: 150px !important; }
}

/* ================= CORPORATE TABS STRUCT ================= */
.tabs-container {
    display: flex;
    background: var(--card-bg);
    padding: 0 15px;
    border-bottom: 2px solid var(--primary);
    flex-shrink: 0;
}
.tab-btn {
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
}
.tab-btn:hover {
    color: var(--accent);
}
.tab-btn.active {
    color: var(--accent);
}
.tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--accent);
}

/* ================= TABLE AREA ================= */
.section{ flex:1; margin:5px; background:var(--card-bg); border:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.table-wrap{ flex:1; overflow:auto; width: 100%; -webkit-overflow-scrolling: touch; } 

table{ width:100%; border-collapse:collapse; table-layout:fixed; min-width: 1400px; } 

thead th{
 background:var(--header-bg); padding:12px 4px; font-size:10px; font-weight:700;
 text-transform:uppercase; border-bottom:2px solid var(--border);
 border-right:1px solid #e2e8f0; position:sticky; top:0; z-index:10;
 color: var(--text); letter-spacing: 0.5px; text-align: center; white-space: nowrap;
}

tbody td{
 padding:8px 4px; font-size:9.5px; border-bottom:1px solid #f1f5f9;
 border-right:1px solid #f8fafc; text-align:center;
 white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
 font-weight: 600; color: var(--primary);
}

.row-date-group { background: #f8fafc !important; }
.row-date-group td { 
    border-bottom: 2px solid var(--border); 
    font-size: 11px; 
    font-weight: 800 !important; 
    color: var(--primary); 
    padding: 10px 15px;
    text-align: left !important;
}

tbody tr:hover:not(.row-date-group){background:#f1f7ff; cursor:pointer;}

.empty-state { padding: 80px 20px; text-align: center; color: var(--text-muted); }
.empty-state i { font-size: 40px; margin-bottom: 15px; color: var(--accent); opacity: 0.5; }

/* Column Widths */
.w-sl { width: 45px; } .w-dt { width: 90px; } .w-gb { width: 140px; } .w-ob { width: 110px; }
.w-pf { width: 150px; } .w-pp { width: 100px; } .w-var { width: 110px; } .w-gr { width: 80px; }
.w-sp { width: 80px; } .w-fr { width: 80px; } .w-gz { width: 60px; } .w-qt { width: 100px; }
.w-rt { width: 90px; } .w-vl { width: 150px; } .w-loc { width: 120px; }

/* ================= FOOTER ================= */
tfoot td{ 
    background:var(--header-bg); font-weight:800; font-size:11px; color:var(--primary);
    border-top:2px solid var(--primary); position:sticky; bottom:0; z-index:10; padding:12px; white-space: nowrap;
}

@media print {
    .header, .filters, .tabs-container { display: none !important; }
    .section { border: none !important; margin: 0 !important; }
    .table-wrap{ background: var(--card-bg) !important; overflow: visible !important; }
    table { min-width: 100% !important; table-layout: auto !important; }
}
</style>
<link rel="stylesheet" href="/static/css/global-loader.css?v=skel8">
<link rel="stylesheet" href="/static/css/bknr-standard.css?v=skel3">
<link rel="stylesheet" href="/static/css/bknr-columns.css">
</head>

<body>

<div class="header">
    <div class="header-top">
        <h2>RE-PROCESS & OUT TRACKING</h2>
        <div style="font-size: 11px; color: var(--text-muted);">
            {{ today_date }}
        </div>
    </div>
    
    <div class="filters">
        <div class="fbox">
            <label style="color:var(--accent)">Financial Year *</label>
            <select id="f_fy" onchange="changeFY(this.value)">
                <option value="">-- SELECT FY --</option>
                {% set start_yr = 2024 %}
                {% set end_yr = 2027 %}
                {% for y in range(start_yr, end_yr) %}
                <option value="{{ y }}" {% if selected_fy == y|string %}selected{% endif %}>FY {{ y }}-{{ y+1 }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="fbox"><label>From</label><input type="date" id="f_from" onchange="applyFilters()"></div>
        <div class="fbox"><label>To</label><input type="date" id="f_to" onchange="applyFilters()"></div>
        <div class="fbox">
            <label>Search Filters</label>
            <input type="text" id="searchBox" placeholder="Quick Search Batch, Variety, Grade..." onkeyup="applyFilters()">
        </div>
    </div>
</div>

<div class="tabs-container">
    <button class="tab-btn active" id="tab-reprocess" onclick="switchTab('reprocess')"><i class="fa-solid fa-arrows-rotate"></i> Reprocess</button>
    <button class="tab-btn" id="tab-sales" onclick="switchTab('sales')"><i class="fa-solid fa-cart-shopping"></i> Sales Out</button>
    <button class="tab-btn" id="tab-storing" onclick="switchTab('storing')"><i class="fa-solid fa-warehouse"></i> Storing Out</button>
</div>

<div class="section">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th class="w-sl">#</th>
                    <th class="w-dt">Date</th>
                    <th class="w-gb">Generated Batch</th>
                    <th class="w-ob">Original Batch</th>
                    <th class="w-pf">Production For</th>
                    <th class="w-pp">Purpose</th>
                    <th class="w-var">Variety</th>
                    <th class="w-gr">Grade</th>
                    <th class="w-sp">Species</th>
                    <th class="w-fr">Freezer</th>
                    <th class="w-gz">Glaze</th>
                    <th class="w-qt">In-Qty</th>
                    <th class="w-rt">Rate</th>
                    <th class="w-vl">Total Value</th>
                    <th class="w-loc">Production At</th>
                </tr>
            </thead>
            <tbody id="tbody">
                </tbody>
            <tfoot>
                <tr>
                    <td colspan="11" style="text-align:right">GRAND TOTALS:</td>
                    <td id="grand_qty" style="text-align:right">0.00</td>
                    <td></td>
                    <td id="grand_val" style="text-align:right">₹0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
let currentTab = 'reprocess';

const datasets = {
    reprocess: [
        {% for r in rows_reprocess %}
        {
            date: "{{ r.date.strftime('%Y-%m-%d') if r.date else '' }}",
            display_date: "{{ r.date.strftime('%d-%m-%Y') if r.date else '' }}",
            new_id: "{{ r.new_batch_id }}",
            orig_batch: "{{ r.original_batch }}",
            prod_for: "{{ r.production_for }}",
            type: "{{ r.reprocess_type }}",
            variety: "{{ r.variety }}",
            grade: "{{ r.grade }}",
            species: "{{ r.species }}",
            freezer: "{{ r.freezer }}",
            glaze: "{{ r.glaze }}",
            qty: parseFloat("{{ r.in_qty or 0 }}"),
            rate: parseFloat("{{ r.product_kg_value or 0 }}"),
            value: parseFloat("{{ r.inventory_value or 0 }}"),
            prod_at: "{{ r.production_at }}"
        },
        {% endfor %}
    ],
    sales: [
        {% for r in rows_sales %}
        {
            date: "{{ r.date.strftime('%Y-%m-%d') if r.date else '' }}",
            display_date: "{{ r.date.strftime('%d-%m-%Y') if r.date else '' }}",
            new_id: "{{ r.new_batch_id }}",
            orig_batch: "{{ r.original_batch }}",
            prod_for: "{{ r.production_for }}",
            type: "{{ r.reprocess_type }}",
            variety: "{{ r.variety }}",
            grade: "{{ r.grade }}",
            species: "{{ r.species }}",
            freezer: "{{ r.freezer }}",
            glaze: "{{ r.glaze }}",
            qty: parseFloat("{{ r.in_qty or 0 }}"),
            rate: parseFloat("{{ r.product_kg_value or 0 }}"),
            value: parseFloat("{{ r.inventory_value or 0 }}"),
            prod_at: "{{ r.production_at }}"
        },
        {% endfor %}
    ],
    storing: [
        {% for r in rows_storing %}
        {
            date: "{{ r.date.strftime('%Y-%m-%d') if r.date else '' }}",
            display_date: "{{ r.date.strftime('%d-%m-%Y') if r.date else '' }}",
            new_id: "{{ r.new_batch_id }}",
            orig_batch: "{{ r.original_batch }}",
            prod_for: "{{ r.production_for }}",
            type: "{{ r.reprocess_type }}",
            variety: "{{ r.variety }}",
            grade: "{{ r.grade }}",
            species: "{{ r.species }}",
            freezer: "{{ r.freezer }}",
            glaze: "{{ r.glaze }}",
            qty: parseFloat("{{ r.in_qty or 0 }}"),
            rate: parseFloat("{{ r.product_kg_value or 0 }}"),
            value: parseFloat("{{ r.inventory_value or 0 }}"),
            prod_at: "{{ r.production_at }}"
        },
        {% endfor %}
    ]
};

function changeFY(val) {
    const url = new URL(window.location.href);
    url.searchParams.set('fy', val || '');
    window.location.href = url.toString();
}

function switchTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${tabName}`).classList.add('active');
    applyFilters();
}

function applyFilters() {
    const fyVal = document.getElementById("f_fy").value;
    const tbody = document.getElementById("tbody");
    const q = document.getElementById("searchBox").value.toLowerCase();
    const f1 = document.getElementById("f_from").value;
    const f2 = document.getElementById("f_to").value;

    if(!fyVal) {
        tbody.innerHTML = `<tr><td colspan="15" class="empty-state"><i class="fa-solid fa-arrows-rotate"></i><br><b>Financial Year Not Selected</b><br><span style="font-size: 11px;">Please select a Financial Year from the filter to view data.</span></td></tr>`;
        document.getElementById("grand_qty").innerText = "0.00 Kg";
        document.getElementById("grand_val").innerText = "₹0.00";
        return;
    }

    let activeData = datasets[currentTab] || [];
    tbody.innerHTML = "";
    
    let filtered = activeData.filter(d => {
        let ok = true;
        if(f1 && d.date < f1) ok = false;
        if(f2 && d.date > f2) ok = false;
        if(q && !Object.values(d).join(' ').toLowerCase().includes(q)) ok = false;
        return ok;
    });

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="15" class="empty-state"><i class="fa-regular fa-folder-open"></i><br><b>No Records Found</b><br><span style="font-size: 11px;">No data matches the selected criteria in this tab.</span></td></tr>`;
        document.getElementById("grand_qty").innerText = "0.00 Kg";
        document.getElementById("grand_val").innerText = "₹0.00";
        return;
    }

    let gQty = 0, gVal = 0;
    const groups = {};
    
    filtered.forEach(d => {
        if(!groups[d.date]) groups[d.date] = { items: [], subQty: 0, subVal: 0, display: d.display_date };
        groups[d.date].items.push(d);
        groups[d.date].subQty += d.qty;
        groups[d.date].subVal += d.value;
        gQty += d.qty;
        gVal += d.value;
    });

    Object.keys(groups).sort().reverse().forEach(dateKey => {
        const group = groups[dateKey];
        tbody.innerHTML += `
            <tr class="row-date-group">
                <td colspan="11">DATE: ${group.display}</td>
                <td style="text-align:right;">${group.subQty.toFixed(2)}</td>
                <td></td>
                <td style="text-align:right;">₹${group.subVal.toLocaleString('en-IN', {maximumFractionDigits:2})}</td>
                <td></td>
            </tr>`;
        
        group.items.forEach((r, i) => {
            // 🟢 FIXED: Removed the manual '%' symbol so it renders cleanly from database data
            tbody.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.display_date}</td>
                    <td>${r.new_id}</td>
                    <td>${r.orig_batch}</td>
                    <td>${r.prod_for}</td>
                    <td>${r.type}</td>
                    <td>${r.variety}</td>
                    <td>${r.grade}</td>
                    <td>${r.species}</td>
                    <td>${r.freezer}</td>
                    <td>${r.glaze}</td>
                    <td style="text-align:right;">${r.qty.toFixed(2)}</td>
                    <td style="text-align:right;">${r.rate.toFixed(2)}</td>
                    <td style="text-align:right;">${r.value.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                    <td style="font-size: 9px; color: var(--text-muted); text-align: center;">${r.prod_at}</td>
                </tr>`;
        });
    });

    document.getElementById("grand_qty").innerText = gQty.toFixed(2) + " Kg";
    document.getElementById("grand_val").innerText = "₹" + gVal.toLocaleString('en-IN', {minimumFractionDigits: 2});
}

window.onload = applyFilters;
</script>
<script src="/static/js/global-loader.js?v=skel9"></script>
</body>
</html>
