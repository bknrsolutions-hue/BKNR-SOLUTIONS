<body>
<div class="site-shell">
  <main class="login-only-shell">
    <aside class="auth-panel" id="login">
      <div class="form-side">
        <div class="form-brand">
          <a class="brand" href="#login" aria-label="ERP login">
            <span class="brand-mark">BK</span>
            <span class="brand-copy">
              <strong>ERP</strong>
              <span>Account Access</span>
            </span>
          </a>
          <span class="form-badge">Secure</span>
        </div>

        <div id="registerBox" class="card">
          <h2>Company Registration</h2>
          <div class="form-group"><label>Company Name</label><input id="company_name" type="text" required></div>
          <div class="form-group"><label>Your Name</label><input id="user_name" type="text" required></div>
          <div class="form-group"><label>Designation</label><input id="designation" type="text" required></div>
          <div class="form-group"><label>Phone Number</label><input id="mobile" type="tel" pattern="[0-9]{10}" title="Must be exactly 10 digits" required></div>
          <div class="form-group"><label>Email Address</label><input id="email" type="email" required></div>
          <div class="form-group"><label>Company Address</label><textarea id="address" rows="2" required></textarea></div>
          <button id="btn-reg" onclick="sendOTP()">Send OTP</button>
          <div id="regErr" class="msg error"></div>
          <div class="link">Already Registered? <span onclick="showBox('loginBox')">Login</span></div>
        </div>

        <div id="otpBox" class="card">
          <h2>OTP Verification</h2>
          <div class="form-group">
            <label>Enter OTP</label>
            <input id="otp" maxlength="4" inputmode="numeric" style="text-align:center;font-size:1.3rem;font-weight:900;" required>
          </div>
          <button id="btn-otp" onclick="verifyOTP()">Verify OTP</button>
          <div id="otpErr" class="msg error"></div>
        </div>

        <div id="passBox" class="card">
          <h2>Set Login Password</h2>
          <div class="form-group"><label>Password</label><input id="pass1" type="password" maxlength="20" required></div>
          <div class="form-group"><label>Confirm Password</label><input id="pass2" type="password" maxlength="20" required></div>
          <button id="btn-pass" onclick="savePassword()">Save Password</button>
          <div id="passErr" class="msg error"></div>
          <div id="passOk" class="msg success"></div>
        </div>

          <h2>Login</h2>

            <div class="form-group"><label>Company ID</label><input id="login_company_id" type="text" autocomplete="organization" required></div>
            <div class="form-group"><label>Email</label><input id="login_email" type="email" autocomplete="email" required></div>
            <div class="form-group">
              <label for="login_pwd">Password</label>
              <div class="password-field">
                <input id="login_pwd" type="password" maxlength="20" autocomplete="current-password" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Show password">Show</button>
              </div>

            <button id="btn-login" type="submit">Login</button>
          </form>
          <div id="loginErr" class="msg error"></div>
          <div class="link"><span onclick="showBox('registerBox')">Register</span> | <span onclick="showBox('forgotBox')">Forgot Password?</span></div>
        </div>

        </div>

          <div id="forgotErr" class="msg error"></div>
          <div id="forgotOk" class="msg success"></div>
          <div class="link"><span onclick="showBox('loginBox')">Back to Login</span></div>

<script>
const BASE = "/auth";
let regEmail = sessionStorage.getItem("bknr_reg_email") || "";

async function readResponse(res, fallbackMessage) {
  const text = await res.text();
  let data = {};
  if (text) {
    try {
      data = JSON.parse(text);
    } catch (error) {
      data = { detail: text };
    }
  }
  if (!res.ok && !data.detail) data.detail = fallbackMessage;
  return data;
}

function getErrorMessage(data, fallbackMessage) {
  const detail = data && data.detail;
  if (Array.isArray(detail) && detail.length) return detail[0].msg || fallbackMessage;
  if (typeof detail === "string" && detail.trim()) return detail.replace(/\n/g, "<br>");
  return fallbackMessage;
}

function togglePasswordVisibility() {
  const input = document.getElementById("login_pwd");
  const button = input.parentElement.querySelector(".password-toggle");
  const showPassword = input.type === "password";

  input.type = showPassword ? "text" : "password";
  button.textContent = showPassword ? "Hide" : "Show";
  button.setAttribute("aria-label", showPassword ? "Hide password" : "Show password");
}

function showBox(id, shouldScroll = true) {
  document.querySelectorAll(".card").forEach((card) => {
    card.style.display = "none";
  });
  document.getElementById(id).style.display = "block";
  document.querySelectorAll(".msg").forEach((msg) => {
    msg.style.display = "none";
  });
  if (shouldScroll) {
    document.getElementById("login").scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

showBox("loginBox", false);

async function sendOTP() {
  const regErr = document.getElementById("regErr");
  const btn = document.getElementById("btn-reg");
  regErr.style.display = "none";

  const emailInput = document.getElementById("email").value.trim();
  const mobileInput = document.getElementById("mobile").value.trim();

  if (!emailInput || !mobileInput || !document.getElementById("company_name").value.trim()) {
    regErr.innerHTML = "Please fill out all required fields.";
    regErr.style.display = "block";
    return;
  }

  const originalText = btn.innerHTML;
  btn.innerHTML = "Processing...";
  btn.disabled = true;

  try {
    const res = await fetch(`${BASE}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        company_name: document.getElementById("company_name").value.trim(),
        user_name: document.getElementById("user_name").value.trim(),
        designation: document.getElementById("designation").value.trim(),
        address: document.getElementById("address").value.trim(),
        mobile: mobileInput,
        email: emailInput.toLowerCase()
      })
    });

    const data = await readResponse(res, "Registration failed");
    btn.innerHTML = originalText;
    btn.disabled = false;

    if (res.ok) {
      regEmail = emailInput.toLowerCase();
      sessionStorage.setItem("bknr_reg_email", regEmail);
      showBox("otpBox");
    } else {
      regErr.innerHTML = getErrorMessage(data, "Registration failed");
      regErr.style.display = "block";
    }
  } catch (error) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    regErr.innerHTML = error.message || "Server connection failed.";
    regErr.style.display = "block";
  }
}

async function verifyOTP() {
  const otpErr = document.getElementById("otpErr");
  const btn = document.getElementById("btn-otp");
  otpErr.style.display = "none";

  const originalText = btn.innerHTML;
  btn.innerHTML = "Verifying...";
  btn.disabled = true;

  try {
    const res = await fetch(`${BASE}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: regEmail || sessionStorage.getItem("bknr_reg_email") || "",
        otp: document.getElementById("otp").value.trim()
      })
    });

    const data = await readResponse(res, "Invalid OTP");
    btn.innerHTML = originalText;
    btn.disabled = false;

    if (res.ok) {
      if (data.user_exists) {
        alert("Email verified successfully! You can now log in.");
        showBox("loginBox");
      } else {
        showBox("passBox");
      }
    } else {
      otpErr.innerHTML = getErrorMessage(data, "Invalid OTP");
      otpErr.style.display = "block";
    }
  } catch (error) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    otpErr.innerHTML = error.message || "Server connection failed.";
    otpErr.style.display = "block";
  }
}

async function savePassword() {
  const passErr = document.getElementById("passErr");
  const passOk = document.getElementById("passOk");
  const btn = document.getElementById("btn-pass");
  passErr.style.display = "none";
  passOk.style.display = "none";

  const p1 = document.getElementById("pass1").value;
  const p2 = document.getElementById("pass2").value;

  if (!p1 || p1 !== p2) {
    passErr.innerHTML = "Passwords do not match.";
    passErr.style.display = "block";
    return;
  }

  regEmail = regEmail || sessionStorage.getItem("bknr_reg_email") || "";
  if (!regEmail) {
    passErr.innerHTML = "OTP session expired. Please register again and verify OTP.";
    passErr.style.display = "block";
    return;
  }

  const originalText = btn.innerHTML;
  btn.innerHTML = "Saving...";
  btn.disabled = true;

  try {
    const res = await fetch(`${BASE}/set-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: regEmail,
        password: p1.substring(0, 20)
      })
    });

    const data = await readResponse(res, "Failed to set password");
    btn.innerHTML = originalText;
    btn.disabled = false;

    if (res.ok) {
      sessionStorage.removeItem("bknr_reg_email");
      passOk.innerHTML = `Account registered. Company ID: <b>${data.company_id}</b><br>Pending approval by Super Admin. You will be able to log in once approved.`;
      passOk.style.display = "block";
      setTimeout(() => showBox("loginBox"), 8000);
    } else {
      passErr.innerHTML = getErrorMessage(data, "Failed to set password");
      passErr.style.display = "block";
    }
  } catch (error) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    passErr.innerHTML = error.message || "Server connection failed.";
    passErr.style.display = "block";
  }
}

async function doLogin(event) {
  if (event) event.preventDefault();
  const loginErr = document.getElementById("loginErr");
  const btn = document.getElementById("btn-login");
  loginErr.style.display = "none";

  const originalText = btn.innerHTML;
  btn.innerHTML = "Authenticating...";
  btn.disabled = true;

  try {
    const res = await fetch(`${BASE}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        company_id: document.getElementById("login_company_id").value.trim(),
        email: document.getElementById("login_email").value.trim().toLowerCase(),
        password: document.getElementById("login_pwd").value.substring(0, 20)
      })
    });

    const data = await readResponse(res, "Invalid credentials");
    btn.innerHTML = originalText;
    btn.disabled = false;

    if (res.ok) {
      if (data.status === "otp_required") {
        loginEmail = document.getElementById("login_email").value.trim().toLowerCase();
        loginCompanyId = document.getElementById("login_company_id").value.trim();
        showBox("loginOtpBox");
      } else {
        window.location.replace(data.next_page || "/home");
      }
    } else {
      if (res.status === 403 && data.status === "unverified") {
        regEmail = document.getElementById("login_email").value.trim().toLowerCase();
        sessionStorage.setItem("bknr_reg_email", regEmail);
        loginErr.innerHTML = getErrorMessage(data, "Email not verified. Redirecting to OTP verification...");
        loginErr.style.display = "block";
        loginErr.style.background = "#ecfdf5";
        loginErr.style.color = "#166534";
        loginErr.style.border = "1px solid rgba(22, 101, 52, 0.08)";
        setTimeout(() => showBox("otpBox"), 2000);
      } else {
        loginErr.innerHTML = getErrorMessage(data, "Invalid credentials");
        loginErr.style.display = "block";
        loginErr.style.background = "#fef2f2";
        loginErr.style.color = "#991b1b";
        loginErr.style.border = "1px solid rgba(153, 27, 27, 0.08)";
      }
    }
  } catch (error) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    loginErr.innerHTML = error.message || "Server connection failed.";
    loginErr.style.display = "block";
    loginErr.style.background = "#fef2f2";
    loginErr.style.color = "#991b1b";
    loginErr.style.border = "1px solid rgba(153, 27, 27, 0.08)";
  }
}
