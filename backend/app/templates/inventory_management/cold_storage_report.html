<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BKNR | Cold Storage Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0; --bg: #f1f5f9;
            --header: #ffffff; --text: #1e293b; --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); }

        .header { background: var(--header); padding: 10px 15px; border-bottom: 2px solid var(--primary); }
        .filters {
            margin-top: 8px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px; background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid var(--border);
        }
        .fbox { display: flex; flex-direction: column; gap: 2px; }
        .fbox label { font-size: 8px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        select, input { padding: 5px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; outline: none; background: white; }
        #searchBox { grid-column: span 2; border-left: 3px solid var(--accent); }

        .summary-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 15px; background: #fff; border-bottom: 1px solid var(--border); }
        .s-card { background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid var(--border); border-left: 4px solid var(--border); }
        .s-card span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .s-card b { font-size: 16px; display: block; margin-top: 2px; }
        .blue { border-left-color: var(--accent); } .red { border-left-color: var(--danger); } .green { border-left-color: var(--success); }

        .tabs { display: flex; background: #fff; padding: 0 15px; border-bottom: 1px solid var(--border); gap: 20px; }
        .tab { padding: 12px 5px; font-size: 11px; font-weight: 800; cursor: pointer; border-bottom: 3px solid transparent; color: #64748b; text-transform: uppercase; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .section { flex: 1; margin: 5px; background: #fff; border: 1px solid var(--border); display: none; overflow: hidden; flex-direction: column; }
        .section.active { display: flex; }
        .table-wrap { flex: 1; overflow: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1800px; table-layout: fixed; }
        thead th { background: #f1f5f9; padding: 10px; font-size: 10px; font-weight: 800; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); color: var(--primary); }
        tbody td { padding: 8px; font-size: 10px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f8fafc; text-align: center; }
        .qty-bold { font-weight: 700; color: var(--primary); }
    </style>
<link rel="stylesheet" href="/static/css/global-loader.css">
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size:14px; font-weight: 800;">BKNR | CS INVENTORY DASHBOARD</h2>
    <div class="filters">
        <div class="fbox"><label>From</label><input type="date" id="f_from"></div>
        <div class="fbox"><label>To</label><input type="date" id="f_to"></div>
        <div class="fbox"><label>Storage</label><select id="f_storage"><option value="all">All Storage</option></select></div>
        <div class="fbox"><label>Batch</label><select id="f_batch"><option value="all">All Batches</option></select></div>
        <input id="searchBox" placeholder="Search batch, variety, species...">
    </div>
</div>

<div class="summary-strip">
    <div class="s-card blue"><span>Total Inward</span><b id="sum_in">0 MC</b></div>
    <div class="s-card red"><span>Total Outward</span><b id="sum_out">0 MC</b></div>
    <div class="s-card green"><span>Net Stock</span><b id="sum_closing">0 MC</b></div>
    <div class="s-card" style="background:var(--primary); color:#fff; border:none;"><span>Inventory Value</span><b id="sum_val">₹ 0.00</b></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('report', this)">MOVEMENT LEDGER</div>
    <div class="tab" onclick="switchTab('stock', this)">STOCK BALANCE</div>
</div>

<div class="section active" id="reportSection">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:100px">Date</th>
                    <th style="width:150px">Cold Storage</th>
                    <th style="width:120px">Batch #</th>
                    <th style="width:80px">Type</th>
                    <th style="width:120px">Species</th>
                    <th style="width:150px">Variety</th>
                    <th style="width:100px">Grade</th>
                    <th style="width:80px">MC</th>
                    <th style="width:100px">Quantity</th>
                    <th style="width:130px">Inv Value</th>
                    <th style="width:100px">Status</th>
                </tr>
            </thead>
            <tbody id="reportTbody"></tbody>
        </table>
    </div>
</div>

<div class="section" id="stockSection">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:150px">Cold Storage</th>
                    <th style="width:120px">Batch #</th>
                    <th style="width:150px">Variety</th>
                    <th style="width:100px">Grade</th>
                    <th style="width:100px">Bal MC</th>
                    <th style="width:120px">Bal Qty (KG)</th>
                    <th style="width:150px">Valuation</th>
                </tr>
            </thead>
            <tbody id="stockTbody"></tbody>
        </table>
    </div>
</div>

<script>
// Data safely parsed from Python/Jinja
const rawData = [
    {% for r in rows %}
    {
        in_date: "{{ r.in_date or '' }}",
        cold_storage_name: "{{ r.cold_storage_name or '' }}",
        batch_number: "{{ r.batch_number or '' }}",
        cargo_movement_type: ("{{ r.cargo_movement_type or 'IN' }}").toUpperCase().trim(),
        species: "{{ r.species or '' }}",
        variety: "{{ r.variety or '' }}",
        grade: "{{ r.grade or '' }}",
        no_of_mc: parseFloat("{{ r.no_of_mc or 0 }}") || 0,
        quantity: parseFloat("{{ r.quantity or 0 }}") || 0,
        inventory_value: parseFloat("{{ r.inventory_value or 0 }}") || 0,
        status: "{{ r.status or 'HOLDING' }}".toUpperCase()
    },
    {% endfor %}
];

function switchTab(type, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(type + 'Section').classList.add('active');
}

function applyFilters() {
    const f1 = document.getElementById('f_from').value;
    const f2 = document.getElementById('f_to').value;
    const fs = document.getElementById('f_storage').value;
    const fb = document.getElementById('f_batch').value;
    const q = document.getElementById('searchBox').value.toLowerCase();

    const filtered = rawData.filter(d => {
        if(f1 && d.in_date < f1) return false;
        if(f2 && d.in_date > f2) return false;
        if(fs !== 'all' && d.cold_storage_name !== fs) return false;
        if(fb !== 'all' && d.batch_number !== fb) return false;
        if(q && !Object.values(d).join(' ').toLowerCase().includes(q)) return false;
        return true;
    });

    render(filtered);
}

function render(data) {
    let tin = 0, tout = 0, tval = 0;
    const rBody = document.getElementById('reportTbody');
    const sBody = document.getElementById('stockTbody');
    
    rBody.innerHTML = "";
    sBody.innerHTML = "";

    const stockMap = {};

    data.forEach(r => {
        const isIN = r.cargo_movement_type === 'IN';
        const val = r.inventory_value;
        const mc = r.no_of_mc;
        const qty = r.quantity;

        // KPI Calculations
        if(isIN) { 
            tin += mc; 
            tval += val; 
        } else { 
            tout += mc; 
            tval -= Math.abs(val); 
        }

        // Report Table
        rBody.innerHTML += `
            <tr>
                <td>${r.in_date}</td>
                <td>${r.cold_storage_name}</td>
                <td><b>${r.batch_number}</b></td>
                <td style="color:${isIN ? 'var(--success)' : 'var(--danger)'}; font-weight:800">${r.cargo_movement_type}</td>
                <td>${r.species}</td><td>${r.variety}</td><td>${r.grade}</td>
                <td class="qty-bold">${mc}</td>
                <td class="qty-bold">${qty.toFixed(2)}</td>
                <td style="font-weight:600">₹ ${val.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                <td>${r.status}</td>
            </tr>`;

        // Stock Balancing Logic
        const key = `${r.cold_storage_name}|${r.batch_number}|${r.variety}|${r.grade}`;
        if(!stockMap[key]) stockMap[key] = { ...r, no_of_mc: 0, quantity: 0, inventory_value: 0 };
        const factor = isIN ? 1 : -1;
        stockMap[key].no_of_mc += (mc * factor);
        stockMap[key].quantity += (qty * factor);
        stockMap[key].inventory_value += (val * factor);
    });

    // Stock Balance Table
    Object.values(stockMap).forEach(s => {
        if(Math.abs(s.quantity) > 0.001) {
            sBody.innerHTML += `
                <tr>
                    <td>${s.cold_storage_name}</td><td><b>${s.batch_number}</b></td>
                    <td>${s.variety}</td><td>${s.grade}</td>
                    <td class="qty-bold">${s.no_of_mc}</td>
                    <td class="qty-bold" style="color:var(--accent)">${s.quantity.toFixed(2)}</td>
                    <td style="font-weight:600">₹ ${s.inventory_value.toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                </tr>`;
        }
    });

    // Update Summary Cards
    document.getElementById('sum_in').innerText = tin + " MC";
    document.getElementById('sum_out').innerText = tout + " MC";
    document.getElementById('sum_closing').innerText = (tin - tout) + " MC";
    document.getElementById('sum_val').innerText = "₹ " + tval.toLocaleString('en-IN', {minimumFractionDigits: 2});
}

// Startup logic
document.addEventListener('DOMContentLoaded', () => {
    const s_el = document.getElementById('f_storage');
    const b_el = document.getElementById('f_batch');
    
    const stores = [...new Set(rawData.map(d => d.cold_storage_name))].filter(Boolean).sort();
    const batches = [...new Set(rawData.map(d => d.batch_number))].filter(Boolean).sort();
    
    stores.forEach(s => s_el.innerHTML += `<option value="${s}">${s}</option>`);
    batches.forEach(b => b_el.innerHTML += `<option value="${b}">${b}</option>`);

    applyFilters();
    
    document.querySelectorAll('input, select').forEach(el => el.onchange = applyFilters);
    document.getElementById('searchBox').oninput = applyFilters;
});
</script>
<script src="/static/js/global-loader.js"></script>
</body>
</html>
