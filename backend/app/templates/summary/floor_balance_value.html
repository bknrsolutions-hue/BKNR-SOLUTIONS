<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        function syncThemeFromParent() {
            try {
                if (window.parent && window.parent.document) {
                    const parentTheme = window.parent.document.documentElement.getAttribute("data-theme");
                    if (parentTheme) { document.documentElement.setAttribute("data-theme", parentTheme); }
                }
            } catch(e) {}
        }
        syncThemeFromParent();
    </script>
<meta charset="UTF-8">
<title>FLOOR BALANCE VALUE | ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>:root {
    /* Standard theme variables mapped to global standard styles */
    --primary: var(--text);
    --accent: var(--accent);
    --border: var(--border);
    --bg: var(--bg);
    --header: var(--card-bg);
    --text: var(--text);
    --text-muted: var(--text-muted);
    --muted: var(--text-muted);
    --danger: var(--cancelled-text);
    --success: var(--completed-text);
    --card-bg: var(--card-bg);
    --header-bg: var(--header-bg);
    --row-hover: var(--row-hover);
    --processing-bg: var(--processing-bg);

    /* Report specific variables mapping */
    --bg-light: var(--bg);
    --panel-bg: var(--card-bg);
    --sidebar-bg: var(--bg);
    --primary-dark: var(--text);
    --accent-blue: var(--accent);
    --accent-glow: var(--accent);
    --text-main: var(--text);
    --border-color: var(--border);
    --table-header-bg: var(--header-bg);
    
    /* Finance / Others specific mapping */
    --card: var(--card-bg);
}



*{box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0;}
body{
 background:var(--bg); height:100vh;
 display:flex; flex-direction:column; overflow:hidden; color:var(--text); -webkit-font-smoothing: antialiased;
}

/* ================= HEADER & FILTERS ================= */
.header{ background:var(--header); padding:8px 12px; border-bottom:2px solid var(--primary); }
.header h2{ margin:0; font-size:13px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:0.5px; }

.filters{
 margin-top:6px; display:flex; flex-wrap: nowrap !important; overflow-x: auto !important;
 gap:12px; background:var(--header-bg); padding:6px; border-radius:4px; border:1px solid var(--border);
 -webkit-overflow-scrolling: touch; justify-content: flex-start; scrollbar-width: thin;
}
.filters::-webkit-scrollbar { height: 4px; }
.filters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.fbox{ display:flex; flex-direction:column; gap:1px; flex-shrink: 0 !important; min-width: 120px; }
.fbox label{ font-size:8px; font-weight:700; color:var(--primary); text-transform:uppercase; }

select,input[type=text],#searchBox{ padding:3px 5px; font-size:10px; border:1px solid var(--border); border-radius:4px; background:var(--card-bg); outline:none; height:32px !important; color: var(--primary); font-weight: 600; width: 100%; }
#searchBox{ min-width: 200px !important; width: 200px !important; border-left:3px solid var(--accent); }

@media (max-width: 768px) {
    .header { padding: 6px 10px; }
    .header h2 { font-size: 11px; }
    .filters { gap: 12px; padding: 4px; overflow-y: hidden; }
    .fbox { min-width: 110px; }
    select, #searchBox { font-size: 9.5px; padding: 2px 4px; }
    .fbox label { font-size: 7.5px; }
    #searchBox { min-width: 150px !important; width: 150px !important; }
}

/* Floor Balance shared UI: keep quantity and value screens visually identical. */
body { background:transparent; color:var(--text-main); }
.dashboard-wrapper { display:flex; flex-direction:column; width:100%; height:100vh; }
.sidebar { width:100%; flex-shrink:0; z-index:100; display:flex; flex-direction:column; padding:8px 10px; background:var(--card-bg); border-bottom:1px solid var(--border-color); }
.sidebar h2 { margin:0 0 6px; color:var(--text-muted); font-size:8px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
.sidebar .filters { margin:0; padding:0 0 4px; border:0; border-radius:0; background:transparent; }
.sidebar .fbox { width:130px; min-width:130px; gap:2px; }
.sidebar .fbox label { color:var(--text-muted); font-size:7.5px; }
.sidebar select,.sidebar input,#searchBox { width:100% !important; min-width:0 !important; height:32px !important; padding:5px 6px; color:var(--text-main); background:var(--slate-bg); border:1px solid var(--border-color); font-size:10.5px; font-weight:600; }
.main-content { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; background:var(--slate-bg); }
.header-top { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:8px 10px; background:var(--card-bg); border-bottom:1px solid var(--border-color); }
.header-top h2 { margin:0; color:var(--primary-dark); font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
.header-meta { display:flex; align-items:center; gap:12px; color:var(--text-muted); font-size:8px; font-weight:700; }
.btn-print { min-height:28px; padding:5px 9px; color:var(--card-bg); background:var(--accent-blue); font-size:8px; }
.section { border-radius:var(--radius-premium); border-color:var(--border-color); }
.table-wrap { background:var(--card-bg) !important; }
thead th { color:var(--text-muted) !important; background:var(--slate-bg) !important; border-color:var(--border-color) !important; font-weight:700; }
tbody td { color:var(--text-main) !important; background:var(--card-bg); border-color:var(--border-color) !important; }
tbody tr:hover td { background:var(--row-hover) !important; }
.row-loc td,.row-comp td,.row-var td { color:var(--text-main) !important; border-color:var(--border-color) !important; }
.row-loc td { background:var(--header-bg) !important; border-left:3px solid var(--accent-blue) !important; }
.row-comp td { background:var(--row-even) !important; }
.row-var td { background:var(--card-bg) !important; color:var(--text-muted) !important; }
.batch-bold,.qty-bold,.val-column,.tag,.source-tag { color:var(--text-main) !important; }
tfoot td { color:var(--primary-dark) !important; background:var(--slate-bg) !important; border-color:var(--border-color) !important; }
#net_value,#net_qty { color:var(--accent-blue) !important; }

@media(min-width:992px){
    .dashboard-wrapper{flex-direction:row}
    .sidebar{width:220px;height:100vh;padding:18px 14px;border-right:1px solid var(--border-color);border-bottom:0}
    .sidebar .filters{flex-direction:column;gap:10px;overflow-x:visible !important;flex-wrap:wrap !important}
    .sidebar .fbox{width:100%;min-width:0}
    .sidebar select,.sidebar input,#searchBox{height:38px !important;font-size:12px !important}
}

/* ================= ACTIONS ================= */
.actions{ background:var(--card-bg); padding:4px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
#rowCount{ font-size:10px; font-weight:700; color:var(--accent); }
.btn-print { font-size:10px; cursor:pointer; color:#fff; background:var(--primary); padding:6px 12px; border-radius:4px; font-weight:700; border:none; display:flex; align-items:center; gap:4px; text-transform: uppercase; }
.btn-print:hover { opacity: 0.9; }

/* ================= TABLE AREA ================= */
.section{ flex:1; margin:4px; background:var(--card-bg); border:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.table-wrap{ flex: 1; overflow: auto; width: 100%; background: var(--card-bg) !important; -webkit-overflow-scrolling: touch; position: relative; } 

table{ width:100%; border-collapse:collapse; table-layout:fixed; min-width: 1100px; } 

thead th{
 background:var(--header-bg); padding:8px 4px; font-size:9.5px; font-weight:800;
 text-transform:uppercase; border-bottom:2px solid var(--border);
 border-right:1px solid var(--border-color); position:sticky; top:0; z-index:20;
 color: var(--text); letter-spacing: 0.3px; white-space: nowrap;
}

tbody td{
 padding:6px 4px; font-size:9.5px; border-bottom:1px solid var(--border-color);
 border-right:1px solid var(--border-color); text-align:center;
 white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
 font-weight: 600; color: var(--primary);
}
tbody tr:hover{ background:var(--row-hover); cursor:pointer; }

/* 🌟 FRACTIONAL WIDTH COLUMNS MATRIX SYSTEM */
.w-sl { width: 45px; }       
.w-loc { width: 130px; }    
.w-pf { width: 140px; }       
.w-bt { width: 100px; }     
.w-src { width: 95px; }     
.w-sp { width: 110px; }     
.w-var { width: 110px; }      
.w-ct { width: 80px; }     
.w-qt { width: 110px; }     
.w-am { width: 130px; }     

/* 🟢 SUBROWS INTERNAL MATRIX */
.row-loc td { background: var(--header-bg) !important; text-align: left !important; padding-left: 12px !important; color: var(--primary-dark) !important; font-size: 9.5px; font-weight: 800; }
.row-comp td { background: var(--row-even) !important; text-align: left !important; padding-left: 24px !important; color: var(--text-main) !important; font-size: 9.5px; font-weight: 700; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.row-var td { background: var(--header-bg) !important; text-align: left !important; padding-left: 36px !important; color: var(--text-muted) !important; font-size: 9.5px; font-weight: 700; border-bottom: 1px solid var(--border); }

.qty-bold { text-align: right !important; font-weight: 800; padding-right: 8px !important; }
.val-column { text-align: right !important; padding-right: 8px !important; font-weight: 600; color: var(--primary); }
.batch-bold { color: var(--primary); font-weight: 600; }

.tag { color: var(--text); font-weight: 600; font-size: 9.5px; display: inline-block; }
.source-tag { font-size: 9.5px; font-weight: 600; }

/* ================= STICKY FOOTER MATRIX ================= */
tfoot { position: sticky; bottom: 0; z-index: 30; }
tfoot td{ 
    background:var(--header-bg); font-weight:800; font-size:9.5px; color:var(--primary);
    border-top:2px solid var(--border); padding:10px 4px; white-space: nowrap;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
}

/* ================= HARD PRINTER ENGINE ================= */
@media print {
    @page { size: A4 landscape; margin: 5mm; }
    body { background: #fff; height: auto; overflow: visible; color: #000; }
    .header, .actions, button { display: none !important; }
    .section { border: none; margin: 0; overflow: visible; }
    .table-wrap{ background: #fff !important; overflow: visible; width: 100%; }
    table { width: 100% !important; table-layout: fixed !important; border: 1px solid #000 !important; }
    thead th { background: #0f172a !important; color: #fff !important; border: 1px solid #000 !important; }
    tbody td { border: 1px solid #000 !important; font-size: 8px !important; }
    tfoot td { background: #f1f5f9 !important; border-top: 2px solid #000 !important; }
}

/* ================= 📱 ULTRA COMPACT MOBILE VIEW OVERRIDES ================= */
@media (max-width: 768px) {
    table { display: table !important; min-width: 800px !important; }
    thead { display: table-header-group !important; }
    tbody { display: table-row-group !important; }
    tr { display: table-row !important; background: transparent !important; }
    
    /* 🔴 గ్యాప్ తగ్గించడానికి ప్యాడింగ్ 6px నుండి 2px కి తగ్గించాను */
    thead th { padding: 4px 2px !important; font-size: 9px !important; }
    tbody td { display: table-cell !important; font-size: 9px !important; padding: 4px 2px !important; }
    
    td::before { content: "" !important; display: none !important; }
    tfoot { display: table-footer-group !important; position: sticky !important; bottom: 0 !important; z-index: 30 !important; }
    tfoot tr { display: table-row !important; }
    tfoot td { display: table-cell !important; padding: 4px 2px !important; font-size: 9px !important; }
}

/* Final shared cascade — identical visual language to Floor Balance Tracker. */
html,body { color:var(--text-main) !important; }
body { background:transparent !important; }
.dashboard-wrapper { display:flex !important; flex-direction:column; height:100vh; width:100%; }
.sidebar { width:100%; padding:8px 10px; background:var(--card-bg) !important; border-bottom:1px solid var(--border-color); }
.sidebar h2,.fbox label { color:var(--text-muted) !important; }
.sidebar .filters { margin:0; padding:0 0 4px; border:0; background:transparent !important; }
.sidebar select,.sidebar input,#searchBox { color:var(--text-main) !important; background:var(--slate-bg) !important; border-color:var(--border-color) !important; }
.main-content { display:flex; flex:1; flex-direction:column; min-width:0; overflow:hidden; background:var(--slate-bg) !important; }
.header-top { padding:8px 10px; background:var(--card-bg) !important; border-bottom:1px solid var(--border-color); }
.header-top h2 { color:var(--primary-dark) !important; font-size:10px; }
.header-meta,#rowCount { color:var(--text-muted) !important; }
.section { margin:4px; background:var(--card-bg) !important; border:1px solid var(--border-color) !important; border-radius:var(--radius-premium); }
.table-wrap { background:var(--card-bg) !important; }
thead th { padding:6px 2px; color:var(--text-muted) !important; background:var(--slate-bg) !important; border:1px solid var(--border-color) !important; font-size:8px; font-weight:700; }
tbody td { padding:6px 3px; color:var(--text-main) !important; background:var(--card-bg) !important; border:1px solid var(--border-color) !important; font-size:8.5px; font-weight:600; }
tbody tr:hover td { color:var(--text-main) !important; background:var(--row-hover) !important; }
.row-loc td { color:var(--primary-dark) !important; background:var(--header-bg) !important; border-left:3px solid var(--accent-blue) !important; }
.row-comp td { color:var(--text-main) !important; background:var(--row-even) !important; }
.row-var td { color:var(--text-muted) !important; background:var(--card-bg) !important; }
.batch-bold,.qty-bold,.val-column,.tag,.source-tag { color:var(--text-main) !important; }
tfoot td { color:var(--primary-dark) !important; background:var(--slate-bg) !important; border-color:var(--border-color) !important; }

@media(min-width:768px){thead th{padding:8px 4px;font-size:9px}tbody td{padding:8px 6px;font-size:10.5px}}

    .dashboard-wrapper{flex-direction:row}
    .sidebar{width:220px;height:100vh;padding:18px 14px;border-right:1px solid var(--border-color);border-bottom:0}
    .sidebar .filters{flex-direction:column;gap:10px;overflow-x:visible !important;flex-wrap:wrap !important}
    .sidebar .fbox{width:100%;min-width:0}

</head>

<body>

<div class="dashboard-wrapper">
<aside class="sidebar">
    <h2>Report Filters</h2>
    <div class="filters">
        <div class="fbox">
            <label>Location</label>
            <select id="f_location" onchange="applyFilters()">
                <option value="">All Locations</option>
                {% for l in rows_batch|map(attribute='location')|unique %}
                <option value="{{ l }}">{{ l }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="fbox">
            <label>Production For</label>
            <select id="f_production" onchange="applyFilters()">
                <option value="">All Stocks</option>
                {% for p in rows_batch|map(attribute='production_for')|unique %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="fbox">
            <label>Variety</label>
            <select id="f_variety" onchange="applyFilters()">
                <option value="">All Varieties</option>
                {% for v in rows_batch|map(attribute='variety')|unique %}
                <option value="{{ v }}">{{ v }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="fbox">
            <label>Global Filter</label>
            <input id="searchBox" placeholder="Search by Batch, Species, Source..." oninput="applyFilters()">
        </div>
    </div>
</aside>

<main class="main-content">
<div class="header-top">
    <h2>Floor Balance Value Summary</h2>
    <div class="header-meta">
        <span>Company: {{ company_id }}</span>
        <span id="rowCount">0 Records Found</span>
        <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
    </div>
</div>

<div class="section">
    <div class="table-wrap">
        <table id="rmpTable">
            <thead>
                <tr>
                    <th class="w-sl">#</th>
                    <th class="w-loc">Location</th>
                    <th class="w-pf">Production For</th>
                    <th class="w-bt">Batch No</th>
                    <th class="w-src">Source</th>
                    <th class="w-sp">Species</th>
                    <th class="w-var">Variety</th>
                    <th class="w-ct">Count</th>
                    <th class="w-qt" style="text-align: right; padding-right: 8px;">Qty (Kg)</th>
                    <th class="w-am" style="text-align: right; padding-right: 8px;">Value (₹)</th> 
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr>
                    <td class="w-sl"></td>
                    <td class="w-loc"></td>
                    <td class="w-pf"></td>
                    <td class="w-bt"></td>
                    <td class="w-src"></td>
                    <td class="w-sp"></td>
                    <td class="w-var"></td>
                    <td class="w-ct" style="text-align:right; padding-right: 8px;">GRAND TOTAL:</td>
                    <td class="w-qt qty-bold" id="net_qty" style="text-align: right;">0.00</td>
                    <td class="w-am qty-bold" id="net_value" style="text-align: right;">0.00</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
</main>
</div>

<script>
const rawData = [
    {% for r in rows_batch %}
    {
        location: "{{ r.location or 'Floor' }}",
        production_for: "{{ r.production_for or 'General Stock' }}",
        batch: "{{ r.batch }}",
        species: "{{ r.species }}",
        variety: "{{ r.variety }}",
        count: "{{ r.count }}",
        qty: {{ r.available_qty or 0 }},
        value: {{ r.value or 0 }},
        source: "{{ r.source or 'RMP' }}"
    },
    {% endfor %}
];

function applyFilters() {
    const fLoc = document.getElementById("f_location").value;
    const fProd = document.getElementById("f_production").value;
    const fVar = document.getElementById("f_variety").value;
    const q = document.getElementById("searchBox").value.toLowerCase();
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let filtered = rawData.filter(d => {
        let ok = true;
        if(fLoc && d.location !== fLoc) ok = false;
        if(fProd && d.production_for !== fProd) ok = false;
        if(fVar && d.variety !== fVar) ok = false;
        if(q && !Object.values(d).join(' ').toLowerCase().includes(q)) ok = false;
        return ok;
    });

    filtered.sort((a, b) => a.location.localeCompare(b.location) || a.production_for.localeCompare(b.production_for));

    const tree = {};
    let grandQty = 0;
    let grandValue = 0;

    filtered.forEach(d => {
        if(!tree[d.location]) tree[d.location] = { qty: 0, val: 0, comps: {} };
        if(!tree[d.location].comps[d.production_for]) tree[d.location].comps[d.production_for] = { qty: 0, val: 0, vars: {} };
        if(!tree[d.location].comps[d.production_for].vars[d.variety]) tree[d.location].comps[d.production_for].vars[d.variety] = { qty: 0, val: 0, items: [] };
        
        tree[d.location].qty += d.qty;
        tree[d.location].val += d.value;
        tree[d.location].comps[d.production_for].qty += d.qty;
        tree[d.location].comps[d.production_for].val += d.value;
        tree[d.location].comps[d.production_for].vars[d.variety].qty += d.qty;
        tree[d.location].comps[d.production_for].vars[d.variety].val += d.value;
        tree[d.location].comps[d.production_for].vars[d.variety].items.push(d);
        
        grandQty += d.qty;
        grandValue += d.value;
    });

    let sl = 1;
    for(let l in tree){
        insertSubRow(`${l} TOTAL`, tree[l].qty, tree[l].val, "row-loc");
        for(let c in tree[l].comps){
            insertSubRow(`-- ${c} TOTAL`, tree[l].comps[c].qty, tree[l].comps[c].val, "row-comp");
            for(let v in tree[l].comps[c].vars){
                insertSubRow(`---- ${v} TOTAL`, tree[l].comps[c].vars[v].qty, tree[l].comps[c].vars[v].val, "row-var");
                tree[l].comps[c].vars[v].items.forEach(item => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="w-sl" style="color:var(--text-muted);">${sl++}</td>
                        <td class="w-loc" style="text-align:left;">${item.location}</td>
                        <td class="w-pf" style="text-align:left;">${item.production_for}</td>
                        <td class="w-bt batch-bold">${item.batch}</td>
                        <td class="w-src"><span class="source-tag">${item.source}</span></td>
                        <td class="w-sp">${item.species}</td>
                        <td class="w-var"><span class="tag">${item.variety}</span></td>
                        <td class="w-ct">${item.count}</td>
                        <td class="w-qt qty-bold">${item.qty.toFixed(2)}</td>
                        <td class="w-am val-column">₹${item.value.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }
    }
    
    document.getElementById("rowCount").innerText = `${filtered.length} Records Found`;
    document.getElementById("net_qty").innerText = grandQty.toFixed(2);
    document.getElementById("net_value").innerText = "₹" + grandValue.toLocaleString('en-IN',{minimumFractionDigits:2});
}

function insertSubRow(label, qty, val, cls) {
    const tr = document.createElement("tr");
    tr.className = cls;
    tr.innerHTML = `
        <td colspan="8" style="padding-left:12px; text-align:left;">${label}</td>
        <td class="qty-bold">${qty.toFixed(2)}</td>
        <td class="qty-bold">₹${val.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
    `;
    document.getElementById("tbody").appendChild(tr);
}

applyFilters();
</script>

</body>
