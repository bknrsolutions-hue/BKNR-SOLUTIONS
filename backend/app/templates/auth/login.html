<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In - BKNR ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<style>
:root {
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --accent: #0ea5e9;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #0b0f19;
  --card-bg: rgba(17, 24, 39, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --border-focus: rgba(59, 130, 246, 0.4);
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --glass-bg: rgba(15, 23, 42, 0.6);
  --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

[data-theme="light"] {
  --primary: #0f5fa8;
  --primary-hover: #082f57;
  --accent: #13a8d8;
  --success: #0f8f6b;
  --danger: #b42345;
  --bg: #eef6ff;
  --card-bg: rgba(255, 255, 255, 0.9);
  --border: rgba(15, 95, 168, 0.15);
  --border-focus: rgba(15, 95, 168, 0.4);
  --text: #0f172a;
  --text-muted: #475569;
  --glass-bg: rgba(255, 255, 255, 0.8);
  --shadow: 0 20px 40px rgba(15, 95, 168, 0.08);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  transition: background 0.3s ease, border-color 0.3s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Background Gradients */
body::before {
  content: "";
  position: absolute;
  top: -20%;
  left: -10%;
  width: 50%;
  height: 60%;
  background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

body::after {
  content: "";
  position: absolute;
  bottom: -20%;
  right: -10%;
  width: 50%;
  height: 60%;
  background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

.auth-container {
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 10;
}

.back-home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 700;
  margin-bottom: 24px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  transition: all 0.2s;
}

.back-home-btn::before {
  content: "<";
  font-weight: 900;
}

.back-home-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
  transform: translateX(-2px);
}

.auth-card {
  padding: 34px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--card-bg);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.auth-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 26px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}

.auth-header-copy strong {
  display: block;
  font-size: 1.15rem;
  font-weight: 900;
  color: var(--text);
}

.auth-header-copy span {
  display: block;
  margin-top: 3px;
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 600;
}

.brand-badge {
  padding: 5px 10px;
  border-radius: 20px;
  color: var(--primary);
  background: rgba(59, 130, 246, 0.1);
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid rgba(59, 130, 246, 0.15);
}

h2 {
  margin-bottom: 20px;
  font-size: 1.35rem;
  font-weight: 800;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

label {
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input {
  width: 100%;
  min-height: 42px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  background: rgba(0, 0, 0, 0.12);
  font-size: 0.9rem;
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
}

[data-theme="light"] input {
  background: #ffffff;
}

input:focus {
  border-color: var(--primary);
  background: rgba(0, 0, 0, 0.2);
  box-shadow: 0 0 0 4px var(--border-focus);
}

[data-theme="light"] input:focus {
  background: #ffffff;
}

.password-field {
  position: relative;
}

.password-field input {
  padding-right: 74px;
}

.password-toggle {
  position: absolute;
  top: 50%;
  right: 8px;
  width: 58px;
  min-height: 28px;
  margin: 0;
  padding: 0;
  transform: translateY(-50%);
  border: 0;
  border-radius: 6px;
  color: var(--primary);
  background: rgba(59, 130, 246, 0.1);
  font-size: 0.72rem;
  font-weight: 800;
  cursor: pointer;
  text-transform: uppercase;
}

.password-toggle:hover {
  background: rgba(59, 130, 246, 0.18);
}

button[type="submit"] {
  width: 100%;
  min-height: 44px;
  margin-top: 12px;
  padding: 11px 18px;
  border: none;
  border-radius: 8px;
  color: #ffffff;
  background: var(--primary);
  box-shadow: 0 8px 18px rgba(59, 130, 246, 0.25);
  cursor: pointer;
  font-size: 0.92rem;
  font-weight: 800;
  transition: all 0.2s;
}

button[type="submit"]:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(59, 130, 246, 0.35);
}

.btn-spinner {
  display: inline-block;
  width: 13px;
  height: 13px;
  margin-right: 8px;
  border: 2px solid rgba(255, 255, 255, 0.45);
  border-top-color: #ffffff;
  border-radius: 50%;
  vertical-align: -2px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.links-row {
  margin-top: 20px;
  color: var(--text-muted);
  text-align: center;
  font-size: 0.82rem;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.links-row a {
  color: var(--primary);
  cursor: pointer;
  font-weight: 800;
  text-decoration: none;
}

.links-row a:hover {
  text-decoration: underline;
}

.msg {
  display: none;
  margin-top: 14px;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 0.82rem;
  line-height: 1.45;
  font-weight: 700;
}

.error {
  color: var(--danger);
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

@media (max-width: 600px) {
  body {
    align-items: flex-start;
    min-height: 100svh;
    padding: 10px;
    overflow-y: auto;
  }

  body::before,
  body::after {
    width: 70%;
    height: 42%;
    opacity: 0.7;
  }

  .auth-container {
    max-width: 100%;
    margin-top: 4px;
  }

  .back-home-btn {
    margin-bottom: 8px;
    padding: 5px 9px;
    font-size: 0.72rem;
    border-radius: 14px;
  }

  .auth-card {
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
  }

  .auth-header {
    margin-bottom: 14px;
    padding-bottom: 10px;
    gap: 10px;
  }

  .auth-header-copy strong {
    font-size: 0.98rem;
  }

  .auth-header-copy span {
    margin-top: 1px;
    font-size: 0.68rem;
  }

  .brand-badge {
    padding: 4px 7px;
    font-size: 0.58rem;
    letter-spacing: 0.3px;
  }

  h2 {
    margin-bottom: 12px;
    font-size: 1.08rem;
  }

  .form-group {
    gap: 4px;
    margin-bottom: 10px;
  }

  label {
    font-size: 0.66rem;
    letter-spacing: 0.35px;
  }

  input {
    min-height: 36px;
    padding: 8px 11px;
    border-radius: 7px;
    font-size: 0.82rem;
  }

  .password-field input {
    padding-right: 60px;
  }

  .password-toggle {
    right: 6px;
    width: 48px;
    min-height: 24px;
    font-size: 0.62rem;
  }

  button[type="submit"] {
    min-height: 38px;
    margin-top: 6px;
    padding: 9px 14px;
    border-radius: 7px;
    font-size: 0.82rem;
  }

  .links-row {
    margin-top: 12px;
    padding-top: 10px;
    font-size: 0.72rem;
  }

  .msg {
    margin-top: 10px;
    padding: 9px;
    font-size: 0.74rem;
  }
}

@media (max-width: 380px) {
  body {
    padding: 8px;
  }

  .auth-card {
    padding: 14px;
  }

  .auth-header {
    align-items: flex-start;
  }

  .links-row {
    gap: 8px;
    font-size: 0.68rem;
  }
}
</style>
</head>
<body>
<div class="auth-container">
  <a class="back-home-btn" href="/">Back to Homepage</a>
  
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-header-copy">
        <strong>BKNR ERP Portal</strong>
        <span>Secure Session Login</span>
      </div>
      <span class="brand-badge">Gateway</span>
    </div>

    <h2>Sign In</h2>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Company ID</label>
        <input id="login_company_id" type="text" autocomplete="organization" placeholder="e.g. BKNR0001" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input id="login_email" type="email" autocomplete="email" placeholder="name@domain.com" required>
      </div>
      <div class="form-group">
        <label for="login_pwd">Password</label>
        <div class="password-field">
          <input id="login_pwd" type="password" maxlength="20" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Show password">Show</button>
        </div>
      </div>
      <button id="btn-login" type="submit">Access Workspace</button>
    </form>
    
    <div id="loginErr" class="msg error"></div>
    
    <div class="links-row">
      <a href="/auth/register">Create Account</a>
      <a href="/auth/forgot-password">Forgot Password?</a>
    </div>
  </div>
</div>

<script>
const BASE = "/auth";

function togglePasswordVisibility() {
  const input = document.getElementById("login_pwd");
  const button = input.parentElement.querySelector(".password-toggle");
  const showPassword = input.type === "password";

  input.type = showPassword ? "text" : "password";
  button.textContent = showPassword ? "Hide" : "Show";
  button.setAttribute("aria-label", showPassword ? "Hide password" : "Show password");
}

async function doLogin(event) {
  if (event) event.preventDefault();
  const loginErr = document.getElementById("loginErr");
  const btn = document.getElementById("btn-login");
  loginErr.style.display = "none";

  const originalText = btn.innerHTML;
  btn.innerHTML = "<span class='btn-spinner'></span>Authenticating...";
  btn.disabled = true;

  try {
    const res = await fetch(`${BASE}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        company_id: document.getElementById("login_company_id").value.trim(),
        email: document.getElementById("login_email").value.trim().toLowerCase(),
        password: document.getElementById("login_pwd").value.substring(0, 20)
      })
    });

    const data = await res.json();
    btn.innerHTML = originalText;
    btn.disabled = false;

    if (res.ok) {
      window.location.replace(data.next_page || "/home");
    } else {
      loginErr.innerHTML = data.detail || "Invalid credentials";
      loginErr.style.display = "block";
    }
  } catch (error) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    loginErr.innerHTML = "Server connection failed.";
    loginErr.style.display = "block";
  }
}
</script>
</body>
</html>
