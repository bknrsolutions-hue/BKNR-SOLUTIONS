<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | BKNR ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ===== DESIGN TOKENS — Matches login.html ===== */
:root {
  --primary-color: #004b93;
  --btn-bg: #002b5c;
  --btn-hover: #001a3a;
  --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 25%, #e2e8f0 75%, #cbd5e1 100%);
  --card-bg: #ffffff;
  --text-main: #0f172a;
  --text-muted: #475569;
  --border-color: rgba(15, 23, 42, 0.08);
  --input-focus-border: rgba(0, 75, 147, 0.4);
  --success-bg: #f0fdf4;
  --success-text: #166534;
  --error-bg: #fef2f2;
  --error-text: #991b1b;
}

* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-gradient);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

/* ===== CARD ===== */
.card-wrapper {
  width: 100%;
  max-width: 440px;
  animation: cubicFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cubicFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 14px;
  padding: 2.75rem 2.5rem 2rem 2.5rem;
  box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
}

/* ===== BRANDING HEADER ===== */
.brand-header {
  text-align: center;
  margin-bottom: 2rem;
}

.brand-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, #004b93 0%, #002b5c 100%);
  border-radius: 12px;
  margin-bottom: 1rem;
  box-shadow: 0 4px 16px rgba(0, 43, 92, 0.18);
}

.brand-logo svg {
  width: 26px;
  height: 26px;
  fill: none;
  stroke: #ffffff;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.brand-name {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--primary-color);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.15rem;
}

/* ===== HEADINGS ===== */
h2 {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 0.3rem;
  text-align: center;
  letter-spacing: -0.03em;
}

.subtitle {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1.75rem;
  text-align: center;
  line-height: 1.45;
  font-weight: 400;
}

/* ===== FORM ELEMENTS ===== */
.form-group {
  margin-bottom: 1.1rem;
  display: flex;
  flex-direction: column;
}

label {
  font-size: 0.75rem;
  color: var(--text-main);
  font-weight: 600;
  margin-bottom: 0.35rem;
  display: block;
  letter-spacing: 0.01em;
}

input[type="password"],
input[type="text"] {
  width: 100%;
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  font-size: 0.88rem;
  color: var(--text-main);
  background: #f8fafc;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  box-sizing: border-box;
  font-weight: 400;
}

input[type="password"]:focus,
input[type="text"]:focus {
  outline: none;
  background: #ffffff;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px var(--input-focus-border);
}

input.input-error {
  border-color: #ef4444 !important;
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12) !important;
}

/* Password strength indicator */
.strength-bar-wrap {
  margin-top: 6px;
  display: flex;
  gap: 4px;
}

.strength-bar-wrap span {
  flex: 1;
  height: 3px;
  border-radius: 9999px;
  background: #e2e8f0;
  transition: background 0.3s ease;
}

.strength-label {
  font-size: 0.68rem;
  font-weight: 600;
  margin-top: 4px;
  display: block;
  min-height: 1em;
  letter-spacing: 0.02em;
}

/* ===== BUTTON ===== */
button[type="submit"] {
  background: var(--btn-bg);
  color: #fff;
  width: 100%;
  margin-top: 0.5rem;
  padding: 11px;
  border: none;
  border-radius: 6px;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.01em;
  box-shadow: 0 2px 4px rgba(0, 43, 92, 0.1);
}

button[type="submit"]:hover {
  background: var(--btn-hover);
  box-shadow: 0 4px 12px rgba(0, 43, 92, 0.2);
  transform: translateY(-0.5px);
}

button[type="submit"]:disabled {
  background: #94a3b8;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ===== MESSAGES ===== */
.msg {
  display: none;
  padding: 10px;
  margin-top: 12px;
  border-radius: 6px;
  text-align: center;
  font-size: 0.78rem;
  line-height: 1.4;
  font-weight: 600;
}

.error {
  background: var(--error-bg);
  color: var(--error-text);
  border: 1px solid rgba(153, 27, 27, 0.08);
}

.success {
  background: var(--success-bg);
  color: var(--success-text);
  border: 1px solid rgba(22, 101, 52, 0.08);
}

/* ===== BACK LINK ===== */
.back-link {
  margin-top: 1.25rem;
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 400;
}

.back-link a {
  color: var(--primary-color);
  font-weight: 600;
  text-decoration: none;
}

.back-link a:hover {
  text-decoration: underline;
}

/* ===== FOOTER DISCLAIMER ===== */
.disclaimer-box {
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(15, 23, 42, 0.05);
  font-size: 0.65rem;
  color: #94a3b8;
  line-height: 1.5;
  text-align: center;
  font-weight: 400;
  letter-spacing: -0.01em;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .card {
    padding: 2rem 1.5rem 1.5rem 1.5rem;
    border-radius: 10px;
  }
}
</style>
</head>
<body>

<div class="card-wrapper">
  <div class="card">

    <!-- Branding Header -->
    <div class="brand-header">
      <div class="brand-logo">
        <!-- Shield icon -->
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand-name">BKNR ERP — Secure Access Recovery</div>
    </div>

    <h2>Set New Password</h2>
    <p class="subtitle">Create a strong password to regain access to your enterprise account.</p>

    <!-- Hidden token is inside the form -->
    <form id="resetForm" method="post" action="/auth/reset-password" onsubmit="return handleSubmit(event)">
      <input type="hidden" name="token" value="{{ token }}">

      <!-- New Password -->
      <div class="form-group">
        <label for="password">New Password <span style="color:#94a3b8;font-weight:400;">(max 20 chars)</span></label>
        <input
          type="password"
          id="password"
          name="password"
          maxlength="20"
          placeholder="Enter new password"
          required
          oninput="checkStrength(this.value)"
        >
        <!-- Strength bar -->
        <div class="strength-bar-wrap" id="strengthBars">
          <span id="bar1"></span>
          <span id="bar2"></span>
          <span id="bar3"></span>
          <span id="bar4"></span>
        </div>
        <span class="strength-label" id="strengthLabel" style="color:#94a3b8;"></span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          placeholder="Re-enter your password"
          maxlength="20"
          required
          oninput="checkMatch()"
        >
        <span class="strength-label" id="matchLabel" style="color:#94a3b8;"></span>
      </div>

      <button type="submit" id="btn-submit">Update Password</button>

      <div id="errMsg" class="msg error"></div>
      <div id="okMsg"  class="msg success"></div>
    </form>

    <div class="back-link">
      Remember your password? <a href="/">Back to Login</a>
    </div>

    <div class="disclaimer-box">
      ⚠️ This is a secure one-time recovery link. It expires after use. All access events are recorded in the BKNR audit ledger.
    </div>

  </div>
</div>

<script>
/* ===== PASSWORD STRENGTH ===== */
const bars = [
  document.getElementById('bar1'),
  document.getElementById('bar2'),
  document.getElementById('bar3'),
  document.getElementById('bar4'),
];
const strengthLabel = document.getElementById('strengthLabel');

const strengthLevels = [
  { color: '#ef4444', label: 'Weak',      labelColor: '#991b1b' },
  { color: '#f97316', label: 'Fair',      labelColor: '#9a3412' },
  { color: '#eab308', label: 'Good',      labelColor: '#854d0e' },
  { color: '#22c55e', label: 'Strong ✓', labelColor: '#166534' },
];

function getStrengthScore(pwd) {
  let score = 0;
  if (pwd.length >= 6)  score++;
  if (pwd.length >= 10) score++;
  if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) score++;
  return score; // 0–4
}

function checkStrength(pwd) {
  // Reset
  bars.forEach(b => { b.style.background = '#e2e8f0'; });
  strengthLabel.textContent = '';

  if (!pwd) return;

  const score = Math.min(getStrengthScore(pwd), 4);
  const level = strengthLevels[score - 1] || strengthLevels[0];

  for (let i = 0; i < score; i++) {
    bars[i].style.background = level.color;
  }
  strengthLabel.textContent = level.label;
  strengthLabel.style.color = level.labelColor;

  checkMatch(); // re-validate match if already typed
}

/* ===== CONFIRM MATCH ===== */
const matchLabel = document.getElementById('matchLabel');
const confirmInput = document.getElementById('confirm_password');
const pwdInput = document.getElementById('password');

function checkMatch() {
  const p1 = pwdInput.value;
  const p2 = confirmInput.value;

  if (!p2) {
    matchLabel.textContent = '';
    confirmInput.classList.remove('input-error');
    return;
  }

  if (p1 === p2) {
    matchLabel.textContent = 'Passwords match ✓';
    matchLabel.style.color = '#166534';
    confirmInput.classList.remove('input-error');
  } else {
    matchLabel.textContent = 'Passwords do not match';
    matchLabel.style.color = '#991b1b';
    confirmInput.classList.add('input-error');
  }
}

/* ===== FORM SUBMIT ===== */
function handleSubmit(e) {
  const errMsg = document.getElementById('errMsg');
  const okMsg  = document.getElementById('okMsg');
  const btn    = document.getElementById('btn-submit');

  errMsg.style.display = 'none';
  okMsg.style.display  = 'none';

  const p1 = pwdInput.value.trim();
  const p2 = confirmInput.value.trim();

  if (!p1 || !p2) {
    errMsg.innerHTML = 'Please fill in both password fields.';
    errMsg.style.display = 'block';
    return false;
  }

  if (p1 !== p2) {
    errMsg.innerHTML = 'Passwords do not match. Please re-enter.';
    errMsg.style.display = 'block';
    confirmInput.classList.add('input-error');
    confirmInput.focus();
    return false;
  }

  if (p1.length < 6) {
    errMsg.innerHTML = 'Password must be at least 6 characters long.';
    errMsg.style.display = 'block';
    pwdInput.focus();
    return false;
  }

  // All good — show loading state and allow native form POST
  btn.innerHTML = 'Updating...';
  btn.disabled = true;
  return true; // allows form to POST normally
}
</script>

</body>
</html>
