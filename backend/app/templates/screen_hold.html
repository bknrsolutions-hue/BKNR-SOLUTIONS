<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Temporarily Unavailable</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    :root {
        --bg: #eef6ff;
        --panel: #ffffff;
        --border: #dbeafe;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: "Plus Jakarta Sans", Inter, system-ui, sans-serif;
        padding: 24px;
    }
    .hold-panel {
        width: min(520px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 24px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        text-align: center;
    }
    .icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        margin: 0 auto 14px;
        background: #dbeafe;
        color: var(--accent);
        font-size: 24px;
        font-weight: 900;
    }
    h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.3;
        font-weight: 800;
    }
    p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
    }
    .swal2-popup {
        border-radius: 10px !important;
        font-family: "Plus Jakarta Sans", Inter, system-ui, sans-serif !important;
    }
</style>
</head>
<body>
    <main class="hold-panel">
        <div class="icon">!</div>
        <h1>Screen Temporarily Unavailable</h1>
        <p>{{ message }}</p>
    </main>

    <script>
        const holdMessage = {{ message|tojson }};
        if (window.Swal) {
            Swal.fire({
                icon: "warning",
                title: "Screen Temporarily Unavailable",
                text: holdMessage,
                confirmButtonText: "OK",
                confirmButtonColor: "#2563eb",
                allowOutsideClick: false
            });
        } else {
            alert(holdMessage);
        }
    </script>
</body>
</html>
