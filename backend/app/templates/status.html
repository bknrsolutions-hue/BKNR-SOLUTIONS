<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status - BKNR ERP</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #090d16;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.06);
            --text: #f8fafc;
            --text-muted: #cbd5e1;
            --success: #10b981;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .status-header {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            padding: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }
        .status-header i { font-size: 2.2rem; color: var(--success); }
        .status-title { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .status-desc { font-size: 0.9rem; color: var(--text-muted); }
        .status-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin-bottom: 20px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .status-row:last-child { border-bottom: none; }
        .service-name { font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
        .service-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
        
        <div class="status-header">
            <i class="fa-solid fa-circle-check"></i>
            <div>
                <div class="status-title">All Systems Operational</div>
                <div class="status-desc">Active ping verified. No incidents reported in the last 90 days.</div>
            </div>
        </div>

        <div class="status-card">
            <h2 style="font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">Core Services</h2>
            <div class="status-row">
                <span class="service-name"><i class="fa-solid fa-server" style="color: var(--primary);"></i> FastAPI Application Server</span>
                <span class="service-badge">Operational</span>
            </div>
            <div class="status-row">
                <span class="service-name"><i class="fa-solid fa-database" style="color: #6366f1;"></i> PostgreSQL Database Instance</span>
                <span class="service-badge">Operational</span>
            </div>
            <div class="status-row">
                <span class="service-name"><i class="fa-solid fa-bell" style="color: #f59e0b;"></i> Background Snapshot Scheduler</span>
                <span class="service-badge">Operational</span>
            </div>
            <div class="status-row">
                <span class="service-name"><i class="fa-solid fa-envelope" style="color: #ec4899;"></i> SMTP Transactional Mailer Gateway</span>
                <span class="service-badge">Operational</span>
            </div>
        </div>
    </div>
</body>
</html>
