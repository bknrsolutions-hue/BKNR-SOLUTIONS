[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
addopts =
    --strict-markers
    --tb=short
    --durations=10
markers =
    unit: pure unit tests with no external database
    database: tests requiring SVBK_TEST_DATABASE_URL
    api: FastAPI request/response tests
    auth: authentication and session tests
    tenant: multi-tenant isolation tests
    integration: ERP workflow integration tests
    security: safe security regression tests
    slow: slower tests excluded from quick local runs
filterwarnings =
    ignore::DeprecationWarning
